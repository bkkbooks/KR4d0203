body:
  text: 湖山集卷三宋吳芾撰五言古詩和胡經仲中秋平生惡暗昧虛空光陸離心與此月同不容一毫疵恨月有圓缺不得常清竒每欲語天公仍斫此桂枝青冥去無路思慮空勞疲明知此意苦殷勤長我隨去年西湖上爛醉吟悲辭今年巧相覔似欲叙離思西風為披拂浮雲無蔽虧坐開百壺酒與月論襟期永結無情歡謝此世上兒吾友胡夫子豪蕩笑墨釐擬借月顔色為君鑒薄帷告之且痛飲行樂當及時和閭丘莘叟中秋玩月平生愛明月夜坐長忘眠每見氷輪上兩足先跰躚清賞意未足常恐雲油然老來有餘興猶不減少年今嵗值秋半一醉擬留連無何山雨來不見觚稜圓尚意閏餘夕百分棹觥船居然遂此願使我喜欲顛引滿對清影席地仍幕天豈知賢伯仲亦愛此嬋娟與我嗜好同清夜聳詩肩此景已買斷初不用一錢况復有佳句還與月爭妍愧我無好語濫繼聨珠篇酒為偷兒所竊我性苦拙疏與世不相偶平生不如意往往十八九何以遣此懷賴有樽中酒去冬釀碧香頗不計升斗凖擬與親朋興來一聚首庶幾牢落中時時開笑口偷兒何好事一夕負之走可惜數十壺化為一烏有昔聞韋秀才有酒盜不取今我乃致冦退省良可醜無乃造物者知我疏慵久恐我醉時狂未免自遺咎用此警昏迷意在鞭其後顧我雖無知自愛豈不厚從今誓改圖停此傳杯手炷香捧茶甌閉門清自守坐對古聖賢永作忘年友和董伯玉不向東山久韻讀書想前人往往得師友每愛釣渭濵頗喜耕谷口夫豈與世違甘心卧巖藪升沉自有時此意君知不野外小過從出門欲何向所幸得夫君相與樂間曠年來既倦遊老去那病忘且復對酒樽尚須時一訪我暫出山去常憂蕙帳空聞君東山樂愛君古人風日暮君不來碧雲蔽髙穹凌晨戒僮僕駕言將徂東塵緣嗟未斷俗事頗相關雖懷林下趣坐失山中閒時令清夜裏夢繞雲水灣寄語猿鶴伴明朝歸故山雲氣滿户庭嵐光入窗牖是中有佳處不出吾座右邇來獨何事未免踆踆走三讀寄佳篇臨風嗟嘆久和王朝議韻晚日轉雲頭長空收雨腳稍覺暑氣清獨坐傾桑落興來或醉吟接䍦還倒著胸中了無憂事事俱脫略緬懷我友朋蹤蹟東西各幾欲往從之恨被微官縳此來得夫子臭味頗相若傾蓋便論心開懷不我却新詩一何工清思渺寥廓才如李杜雄句壓曹劉弱顧我志意衰筆力不如昨明時百無用正恐填溝壑公餘幸少閒對酒且深酌拭目看諸公衮衮登臺閣和樓大防韻嗟余本何人纍然居海嶠家世業為農有田在巖窔春到耦妻耕寒來從母漂屋角日誅茆杖頭時荷蓧逮冠知讀書聊為起家兆有琴既無絃有劍亦無鞘僥幸厠末科安敢綴天彯但期竊斗升活此老與少豈謂暮年中亦誤䝉收召曽未著微勞遽使登華要自度老無能共知愚不肖縱未遭人非難逃天日照儻不速休官寧免淵明笑矯矯淵明賢千載誰能紹瓶粟雖無儲風標松比峭詩篇雖不多筆力天與妙顧余豈能詩微吟蚯蚓竅可笑不自量輒欲賡髙調二車真豪英逸如千里驃又如禮樂器肅然在宗廟有美頎而長視容清且瞭自應轉明時與國增光耀胡為佐一州從容陪坐嘯乘興來湖山欲看余把釣濯足玩水雲縱目觀野燒喜余和陶作舉杯為余釂草具雖蕭疏亦復為余嚼余已學淵明公方跂周召出處既不侔無由逺相呌願公保令名求賢行有詔二月晦日惜春有感春半年已除舊聞詩人語老夫始信之倍覺傷時序方春未來時屈指朝朝數十分擬春來欲與春為主那知事已乖十日九風雨縱得暫時晴應酬紛萬緒舉眼看枝頭春事已如許還憶故園花連年成間阻南園亦可人雖美非吾土願天早放歸容我老農圃月下與風前對花歌且舞日日是青春何必唱金縷春半年已除其餘強為有杜牧之詩也送春有感物物俱有情情尤鍾我輩况復病且衰白髮不相貸今日送殘春倍覺生感慨正恐明年春此身不復在憶昔少小時逢春便傾蓋五十六年中相親復相愛春雖自天來秖在花叢內常憂地不寬栽花容有礙買山敢論錢惟恐力不逮花開即欲看花好還須戴詩必為花吟酒必與花對醉則卧花間豈事形骸外醒復繞花行視之過粉黛從人笑我狂我作童兒態自云盡此生與春長相㑹人事苦相爭花謝春亦退我欲苦留春春去不少待為春攪離腸寢食俱忘廢悲來不可禁未免歌慷慨我當保餘齡相見猶可再若或徑溘然遂成永分背願春略躊躇一樽容我酹憂居杜門久廢筆硯兹因卜築輒有所感不免破戒作數語呈諸親友平生事幽討性與山水便晚嵗闢三徑頗喜得地偏逺不去桑梓近與松楸連青山枕其後流水繞其前羣山更簇簇左右相周旋棟宇雖未立氣象已足觀旁人笑我拙空囊無一錢何苦欲架屋作此煩惱緣我豈不自知老去將終焉游居與寢卧安可無數椽人生七十稀自古嘗有言我今五十七髭鬢已皤然縱使此身健前去能幾年仕宦雖齟齬亦復忝蕃宣向來為親養猶或強著鞭今既成永感前事都棄捐儻或未死滅誓將老林泉遂此卜築志閉門日髙眠栽花滿我屋種竹環我園山上創一堂湖中具一船從容與親舊取次中聖賢雖無萬鍾祿雖無二頃田胸中富丘壑眼界飽風烟自足了一世此外休問天再和嗟我椎鈍姿處世百不便性獨愛山水固非嗜好偏本來中山人家與青山連仕宦三十載塵事雖滿前登臨興不減佳處輒盤旋搜竒更探勝往往窮游觀所恨坐艱窘苦乏買山錢年來足憂患杜門絶世緣百念俱不起此心已休焉尚欲對山水茆茨架短椽非為求安計蓋守知足言如我百無似自視仍闕然餘生亦何幸獲覩中興年賢能隨任使熙運逢周宣退量駑鈍姿老去難加鞭有如不才木偶未溝中捐寧復幾寒暑白骨埋黃泉且趂此身健飽食仍醉眠衣葛謝軒冕杖藜守丘園朝躡登山屐暮上泛湖船保真師古語樂聖繼前賢有妻能執爨有兒能力田萬事不介意過眼如雲烟無榮亦無辱庶以全吾天久雨嵗旦值庚午已有旱暵憂甲申與丙子仍更雨不休豈惟主夏旱還慮麥不收農占吁可畏使我生春愁我今安靜退身外百無求止願年榖熟髙枕卧林丘時時與親友尊酒相獻酬天意今乃爾一飽未易謀衆人憂餓死我能獨樂不念此不成寐中夜涕泗流無所用吾力止望天賜休天不絶民命㑹見大有秋送董伯玉造朝改秩之子久言别今秋忽此來訪我湖山上連月相追陪和詩動盈軸舉酒必盡罍使我增眼明頓覺忘衰頽方將走山谷乘興共尋梅一笑坐花下覆此黃金杯俄然告我去遮路挽不回匆匆陳祖席再豁懷抱開自古論治道常患無人才如子雖寒素萬古稱賢哉時運偶未至半在困塵埃從今脫選調寧復嗟淹回㑹見日千里騰躍如龍媒願言更努力聖主方築臺丙戌送春有作三月三十日春去人盡惜我獨惜春多欲留春不得憶昨仕行都亦屢逢春色王事多鞅掌常苦無暇隙擔上看桃李負春長歎息每欲早歸田恨不生羽翼及至今得歸亦復少歡適平生無室廬方且事工役老妻病纍年年來覺轉劇百事總關心十日九不懌把酒對東風一春能幾夕因念夢幻軀處世不滿百今日六十三已是桑榆迫縱使到七十能得幾年客幸春有舊好一笑常莫逆今既舍我歸動是經年隔聊復倒離樽與春話胸臆我方葺園亭隨分足泉石準擬共東君著此幾兩屐丁寧春早回莫使長相憶今宵已拚醉坐待東方白明旦各分飛斷腸芳草碧和送春詩送陳澤民少年買青春千金初不惜常恐春不留韶華難再得種杏更栽桃為春添景色對酒復當歌與春亡間隙春去或未來日探春消息及至春又歸送春恨無翼追隨九十日無日不自適胡為把一麾千里從吏役當塗古道院事簡非繁劇宴坐對江山亦足自怡懌所歎乏遊從無與共良夕陳侯有髙標鷙鳥空纍百落筆動成篇端不在促迫不意牢落中乃得此佳客人事苦參商天意有順逆笑言猶未竟遽爾成乖隔雖未唱陽關别恨已填臆此邦固寂寥頗亦富水石方擬出郊坰共試登山屐何事逐春歸不念人相憶春事雖已闌殘花尚紅白且復引離尊倒此香醪碧答客難我治湖上園占斷山水窟幽事日相關頗覺無暇逸有客來相過云欲救我失謂我雖愛閒未得居閒術衆人役利名公獨役景物固與衆人殊未免俱汩沒孰若淡無營燕坐一虛室百念盡消除百事付真率物來則應之豈可自攖拂客言非不忠我意客未悉萬法仗境生百果因花實我聞洛陽城名園渾比迹至如司馬公朴素世莫及有園號獨樂晚嵗亦加葺人心固不同豈能盡如一顧我病且衰行年將七十光景去不留餘齡那可必要當且逍遙樂此桑榆日寧如土木偶終朝長兀兀况有佳山水兹焉久蟠鬱地靈盡發露一旦為我出若不一領略無乃太拘執何妨几席間時與相顧揖擇勝把酒杯搜竒入詩筆猶恨景物多未能盡收拾他人視若忙我心常自佚人無所用心先聖每忿疾既不學羣兒詫仙仍佞佛不有博奕乎為之猶勝弗客既聞斯言語塞幾若訥因為客書之聊以志髣佛㑹須畫成圖繼取王摩詰聞同庚不幸有感我生甲申嵗同嵗有幾人十中無一在使我涕隕巾嘗試屈指數誰登要路津不過五六輩蹤跡半已陳其一最先達進為國大臣寵榮無與比近亦以訃聞顧我何為者本是隴畝民持橐已過分夀更近七旬獨恨苦拘縳歸志不得申天復放我歸遂此自由身湖山堪寓目風月足怡神有花我共醉有鳥助我吟若不自娛樂開口對芳辰却恐泉下客笑我浪苦辛雖生亦何益徒負百年春和陳天豫卜居二首夫子有直氣聲名重於山上書遭放逐去國知幾年傷弓念投林失水思潜淵但期歸里社問舍仍求田逮兹是卜築占勝郊野間梅竹映左右溪山繞後前且欣輪奐美碧瓦生青烟莫嘆經營苦緑鬢成華顛君雖欲退處天豈容久閒㑹起佐明主四海俱晏然我亦初卜築止有湖與山一區未易就首尾八九年種竹已成林積水已成淵我始得棲息守此桑麻田羡君治第敏不出數月間落成寫胸臆遙寄到我前佳句粲珠玉妙畫梯雲烟我見為君動喜甚殆欲顛苐恨隔山嶽無由相伴閒何時一㑹面尊酒共陶然湖山遣興我在小西湖浩渺仍清曠大旱未嘗枯久雨亦不漲灌溉數千頃無缺亦無長中有十里荷花開密相傍疑若水仙遊波間張供帳既列萬紅粧復陳千彩仗風細月明時天香互飄蕩縱有老畫師丹青難髣像我心如死灰萬事俱廢忘獨於此留情曽不忘一餉日日繞岸行踏破屐幾緉無以寄幽懷誅茆聊小創開窗面湖光納此無盡藏冀得日臨賦少效陶元亮用以償素心庶不孤雅尚每自謂生前足可供酬唱偶未脫世緣一出成牽強紅塵四十年白髮三千丈勞力復勞心時時嬰拙恙夢寢到湖邊恨無縮地杖逮今始歸休掛冠老湖上坐看水中天依然涵萬象近樹與逺山倒引還彌望驚湍㵼兩閘飛瀑來千嶂沙頭鷗鷺集水面龜魚漾似認舊主人有意來相向時方夏初臨雨霽天風揚日影烘微雲水紋生細浪徘徊至夕陽迤邐扁舟放恍覺此身輕有如在崑閬我病雖不飲亦為傾家釀酒酣逸興來懷抱益舒暢嗟我本寒儒百種無一樣晚有田與園所得已過當今更享此湖重慚踰分量是豈人之力無乃天所貺惟是頑鈍姿年衰多俗狀塵痕滿衣襟攬鏡空感愴要當盡洗濯見我本來相心跡喜雙清從人詫官况紀夢平生好山水至老心不移每聞有佳處欲見唯恐遲相去雖云逺不憚腳力疲縱不能得到夜夢必見之晚嵗卜築地一半在翠微山水既俱勝景物還相宜旁人來覩此已自心目怡若乃夢中見則又逺過斯髙山與流水到處皆崛竒其間有樓觀金碧仍相輝幽深極險怪皆世所未窺謂必神仙窟非世所得知不謂我凡骨乃獲來遊嬉恍然若驚覺有如天上歸是豈造物者不與人相違知我有雅好特以此見貽嗟我今老矣萬事都棄遺猶有山水債未能忘夢思他日或蟬蛻百態不願為只願海山去赴我赤松期機簡堂自隱靜歸為萬年主人訪余林下相與道舊因以述懷吾鄉本仙窟石井尤竒特民物生其間古來蓋千億惟師與我家所居共阡陌少小初無殊長乃分儒釋術業雖不同於道俱有得師為方外遊聲價已籍籍象教久衰微賴師振業席􅀈鞴與鉗鎚信有彌天力果續佛慧命作大善知識我雖登禁涂無功亦無德但有憂國心徒勞竟何益掛冠歸林下面亦無慚色知心獨有師相視笑莫逆每思共談𤣥傾倒此胸臆江浙遙相望恨不生羽翼昨朝忽惠然得得訪泉石一見雙眼明歡喜幾折屐第念我與師彼此頭顱白世路方艱難老去合休息師既歸故鄉不應復他適願言却世緣來伴我幽寂相看成二老永為閭里式杜子美寄贊公詩云相看成二老來往亦風流葉性之有詩紀十五夜之集因用來韻人生重行樂樂事古難全有如天邊月多闕還少圓又如牛女星㑹合動經年今夕羣賢集定知非偶然顧我老多病要路懶著鞭年年上章疏只丐早歸田賴天憐此意得遂性所便歸來小西湖湖水清且漣吾廬在其上可濯仍可㳂一望興無盡十里開紅蓮風前波渺渺雨後竹姢姢到此百念滅已是卜終焉但恨乏勝侣使我心懸懸今得與公輩共上泛湖船載月娛清夜同醉壺中天雖無管絃奏雖無羅綺筵看此水與月自足中聖賢况復座上客盡如珠玉聨其間有老匠自舊稱詩仙飲散出佳句為我寫由拳紀此一時勝付與山水傳合當風月夕更結一笑緣家人生朝相從四十年於今成二老向來苦宦遊頗恨歸不早我家枕湖山髣佛如蓬島今始得歸來方喜開懷抱復值君誕辰滿目春光好幸有酒千鍾足可共傾倒要須且沉酣莫被閒愁惱我方務清虛志不在金寶亦復戒浮華意豈在花草但願享遐齡白首長相保生朝偶成今晨是生朝今夕是除夜年年聚親朋往往羅酒炙而我忽抱痾見酒輒避舍一滴不沾唇何以相慰藉人生能幾許今已迫衰謝病軀復如斯令人發悲咤展轉竟無眠作詩訴同社送津兒之官麗水憶我初仕時不敢望髙位但得宰一同便可行已志實惠儻及民死亦有生氣况復著隂功子孫將不墜胡為人憚之百計欲求避我聞事無難辭難豈為義世路雖多艱官塗須歷試是用俾吾兒往當民社寄眷言古括州山水有佳致我尚記昔年嘗為郡守二雖無德在人人亦安平易百里聞汝來想見多欣慰要當盡此心有以塞其意誠能使吏民自此知懷畏家家各安居人人共稱治縱或罹謗傷固自有公議有如汝所存俯仰似無愧功名餘事耳何必成與遂年來我掛冠方得閒中味無奈逼桑梓七十仍有二知復幾何時得見汝娛侍雖幸枕湖山已闢幽棲地有詩誰伴吟有酒誰同醉正欲汝相隨俄然又相離㑹須早歸來日作斑衣戲箇中有真樂豈必三旌賁豫與王瞻叔韓通一林梅卿余知默徐彥才六人皆同庚也一登政路五上禁塗其四久已物故所存者獨知默與豫耳今日得報知默又已云亡念年齒至此豫亦豈久於世者乎悵然有感於懷因成數語以自解同庚非不多達者能有幾七十二年間六人而已矣其四迹已陳止豫二人爾今朝聞訃音其一又不起嗟豫獨何人偶爾未見鬼自度如許衰寧久紅塵裏念此夢幻身誰能保終始失者雖或非得亦未為是死者固可悲生亦不足喜幸然已掛冠萬事不到耳何妨日憑欄樂此佳山水仍更日開尊賞此新桃李時時命歌童唱箇陶真理倘或未溘然亦足娛暮齒病中有作吾年七十五一朝忽患瘧仍害及老妻對床更撼鐸寒時寒如氷熱後熱如灼既去還復來如與我有約連日莫能休盡室皆驚愕飲啖一不忺形骸頓如削細思豈無因良由賦分薄本是農家子只合事耕作既已得美官復有歸田樂已是無福當又不知慚怍遂至瘧鬼憎故意來相虐作詩告天公縱我有過惡願天少埀憐疾痛且濶略但速賜之死莫令我知覺一生纒世網正欲解其縛假使夀百年寧免此一著不如早歸藏且免論強弱我非畏死人久已辦棺槨述懷我愛白樂天千載共稱賢行年七十五奄忽遂溘先我愛范忠宣一代名德全年齡甫至此亦復成棄捐二公雖已逝四海至今傳顧我百無事幸及二公年今夏疾疢作已分歸黃泉偶然得無事固荷天見憐但我有一語恰欲與天言有生則有死如行者言旋我是久行客亦自應息肩念人處一世動為世網纒開口罕歡笑觸緒多憂煎縱使至百嵗終困塵俗緣不如早冥目庶以全吾天是非與寵辱總不到我前一心亦安靜却得返自然况我辦歸計久已卜新阡
