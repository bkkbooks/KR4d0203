body:
  text: 湖山集卷七宋吳芾撰七言律詩和經仲春日即事淡煙籠水一溪虛别有風光在野廬幽哢喚人回逺夢落紅鋪水失清渠此生得酒休辭醉今日何人是奠居正向東山念蕭索筠筒煩寄指南車䇿杖郊原信步行沙邊春水半涵清花開舊樹香仍在燕葺破巢功未成世路十年塵土面春風萬里鼓􅎏聲從今凖擬開懷去到手荷杯莫厭傾喜雨聞道他邦盡禱祈沛然膏澤上遲遲有年已是天私我連日那堪雨及時聲入萬家添喜氣涼生千里解炎曦也知造物恩難報且採歡謡綴小詩和許守喜雨韻使君盛德格皇天奔走羣龍雨霈然坐使稿苗成茂實潜將豐歲換凶年荷鋤野老欣嘉應抱甕田夫得晏眠擬倩樂工絃盛事山城那得有師涓千里焦枯頓鬱蒼邦人寧復慮年荒大田一雨渾霑足鄰壤羣偷更伏藏治郡羡君端有術救民愧我獨無方夜來復誦新詩句嘆賞徘徊月轉廊和閭丘省幹喜雨韻良田方苦莠驕驕甘雨如何閟九霄賢守治聲喧道路聖君德澤播黎苗寧容赤地炎威熾果見青天旱氣消昨夜東臯已霑足康衢滿耳沸歌謡鈴齊坐嘯不為頗愁嘆翻然變詠歌千里正憂無舊穀一朝俄喜浹新禾雲師蔽日如張幟雨陳橫空似擁戈我忝郡丞何所補但將新句對松哦和趙觀使喜雨膏澤愆時愧已深敢期誠意達天垠片雲忽送千峯雨一氣潜回萬壑春頓覺老農生喜色坐令凶歲變佳辰憂民雖切功何有坱圠無私荷大鈞喜雨偶成麥熟蠶登處處同萬家舉首謝天公尚憂六月旱為虐却喜連宵雨已通萬事自知成老懶一心祇是願年豐從今凖擬添新釀要使樽中酒不空和澤民喜雨陰長陽消帝怒深盡驅赫日掃羣隂却疑枉致一秋旱聊復霈為三日霖隴畝共知成樂歲里閭誰不起歡心朝來幽鳥知豫意亦向簷前作好音和葉性之喜雨去歲饑荒特異常那知今日便豐穰田疇雨足經時潤院宇風生著處凉老去我方辭五斗秋來誰解積千倉從今閭里無艱食㑹見家家酒熟香癸巳夏秋旱七月十日得雨喜雨有作旱魃為災害有秋焦枯滿目使人憂片雲忽向天邊合一雨俄驚地上流盡道稿苗須半活如云晚稻可全收老農兩手齊加額且免流離過外州喜入冬初七八得雨夏旱連秋又及冬大田髙下總成空千倉已失三農望一雨欣聞百里同青入平疇看麥秀緑回枯沼喜泉通從今得免填溝壑皆謝天公惠困窮和魯漕喜雨二首冬暖曽無欲雪天正憂饑饉在新年忽聞夜滴簷前雨便覺春歸郭外田千里已知俱樂只一尊亦擬其陶然其如使者拘臺制不肯花間聽管絃秋來日日困驕陽正欲齊心問彼蒼倐爾四郊雲氣合霈然一夜雨聲長三農已有倉箱慶萬室還欣枕簟凉幸值故人來過我尊前莫惜醉淋浪和魯漕春雨有感三首自憐齒豁與頭童心事都非少壯同那更閉門聽夜雨不容步屧趂東風勝遊尚喜朋簮盍痛飲寧辭酒盞空只恐酒醒歸興動愈令倦客憶山中自嘆蒼顔不復童幸然三老此時同登髙能賦多佳詠把酒論文有古風可恨雨師頻作惡直疑春事遂成空愁來不用殷勤勸已判花前為一中我心雖老尚如童春到惟思笑語同正欲對花歌且舞那知通夕雨兼風千疇固喜俱霑足百卉還愁一掃空安得晴天開萬里緩行花下豁胸中雨後朝來一雨灑炎光陡覺園林處處凉煙栁數行縈翠帶風荷十里擁紅粧莫憂鏡裏朱顔改且喜壺中白晝長只恐吾衰無此福不容終老水雲鄉喜晴積陰初散雨初收一解霖霪十日憂已見郡條平似水不妨官舍冷如秋年來觸緒無佳思老去同僚得勝流更喜豐年消息好從今還遂稻粱謀久雨無聊喜乍晴尚餘春色到簷楹楊花飛去今無力燕子歸來似有情靜看遊魚波面躍閒隨野鶴竹間行世緣到此消磨盡只欲徜徉度此生未臘已見四白偶得數語呈子壽且述挽留之意人言三白兆豐年四白欣逢向臘前細糝蘆花初著地亂飄柳絮忽漫天雅宜領客登臺上正欲開尊向酒邊樂歲幸君同賦詠若為歸棹遽翩然和蔣無退詠雪臘中三白幾年無今歲呈祥事可書披得一蓑方入畫翻成雙帶又隨車共驚飛絮迷清晝更覺同雲滿太虛憶昔讀書燈火少喜穿窗牖映吾廬和魏簽雪詩上趙守臘盡東君已報春雪花猶未斂輕塵二天默禱渾如響一夜呈祥覺有神千里妖氛應洗滌萬家喜氣欲輪囷試詢治行今誰最屈指公為第一人透户穿簾到眼邊陡驚滕六逞威權禦寒戒獨憂無褐得飽人皆喜有年已見歡聲騰比屋好將盛事被丹絃此時且莫孤清賞早晚除書下九天和朱文卿春雪韻春來何事尚凝嚴一夜空庭霰雪兼坐久羅衣驚頓薄更闌杯酒覺頻添旋消疏滴簷間雨更看平堆地上鹽誰道東風回暖律韜霞掩日不容覘喜雪糝遍山巔與水涯天公著意做年華要令臘裏呈三白時向空中散六花勒住玉梅還可恨粧成瓊樹却堪誇須知造物憂民切預把豐穰報萬家雪意初疑作不成才飛數片又還晴正思潤澤霑千里忽見繽紛滿一城凋郡共欣消沴氣老農相慶沸歡聲我將盡把姑溪釀要與邦人樂太平凍雲黯淡浩無涯雪陳橫空勢欲斜入户有人疑栁絮繞園無處認梅花舉頭頓覺青山老撲面還驚緑鬢華我醉未眠愁酒盡挈瓶來問爾東家和魯漕途中喜雪陡覺同雲翳四山捲簾聊復望江干舉頭喜見迎春雪抱膝從教徹地寒預卜豐穰知歲樂潜消瘴癘想民安一樽正欲同清賞咫尺胡為㑹合難和津喜雪二首六花一夜降中天飛繞吾廬頓滿前幻出仙家新窟宅疑非塵世舊山川但驚巖上青松老不見天邊白鴈連賴有甕頭新釀熟何妨沉醉度殘年我愛平湖繞碧山山光倒碧到尊前同雲何事迷千嶂飛雪俄然蔽一川縱使玉樓從地湧便教銀闕與天連到頭幻化非真實爭似湖山耐歲年和許守喜雪韻凍雲埀地木停號六出飛花遍九臯已見隨車翻縞帶還疑縱獵散風毛幽人乘興空回棹公子無言獨擁袍顧我年來詩思澀强吟冰柱愧才髙元宵雪作因成短句天公著意做元宵陡使新春樂事饒已放金蓮開陸地更移銀闕下雲霄坐中星斗渾相照庭下瓊瑰更亂飄佳客莫辭通夕醉要令來歲記今朝是日大雪際晚復晴月色輝映尤為可喜偶成數句滿城著地折紅蓮天使今宵樂事全已是雪中千里白更兼月色十分圓胡為佳客猶辭醉正恐明年未必然我欲乞身歸去也懸知此酒是離筵和王夷仲雪中見貽歲晚端居寂寞濵雪花零亂更愁人捲簾已覺青山老入座仍添白髮新寫景自憐佳句少論交還喜宿心親來詩況復清如雪想見吟成泣鬼神待雪不至呈子儀冬暖方憂雪意慳俄然飄灑到人間夜聞便謂迷三徑曉看依然在半山明日既容殘臘去今朝已是迫春還如何滕六渾無意不上雲霄叩九關三月十一日風雹向晚欣逢霽色開方思花下共䘖杯一時雨雹排簷急萬里風雲捲地來掃蕩千花真可恨摧殘二麥亦堪哀賞心樂事俱休矣惆悵青春去不回初夏登城上有感來守孤城忽兩朞可堪登眺又斜暉經春不見流鶯語終日唯看乳燕飛風舞新荷青裊裊烟籠細栁緑依依此邦縱美非吾土莫怪山翁只念歸和朱世同夜坐待月新凉初入我庭中滿坐清風孰與同已喜故人來聚首那堪明月更當空滿傾濁酒休辭醉賸作新詩莫諱窮屈指如今詩酒社有誰胸次得如公十六夜再登月臺虛度中秋頗動懷今宵却再上髙臺强延風月雖聊爾一對江山亦快哉小子仍攜竹葉至同僚還折桂枝來老夫為爾牽詩興笑向花前覆一杯中秋後一夕煙雨樓玩月危樓百尺俯層城煙斂雲收眼更明四面月華千頃白一天秋氣十分清昨宵欲見渾無計今夕相看似有情又值病夫慵對酒賞心樂事信難并和陳澤民韻雨歇雲收天意回放教明月下天來為憐病守懷三徑故遣姮娥薦一杯坐上賔僚方共集城頭更漏莫相催來年此夕知誰在對月何妨笑口開寄題魯郎中遂隱堂老向江頭强剖符夢魂長是繞吾廬正慚我未成歸計却羡君先遂隱居湖上煙雲常縹眇園中花木總扶踈他時尚冀相從醉剩把鴟夷載後車送王龜齡得請還鄉一用龜齡貢院詩韻兩馳章奏叩天關只願歸來老故山愧我尚留牽吏役羡君先去得身閒冥鴻已逐髙風舉倦鳥終隨落照還尚擬杖藜尋舊約鴈峯深處共躋攀和氣融融動白蘋歡傳千里政方新若為擺落遊珍館不顧悲啼擁畫輪鯨海無津堪縱目鴈山如舊足怡神願言分我閒中趣已問君王乞此身又送江朝宗還鄉欲留車騎少徘徊歸興那知苦見催只許霜前同把菊不容雪裏共觀梅今朝對酒休辭醉明日有懷誰與開别後願言無爽約菊花開日又重來和章德文侍郎題晞浣堂韻寄張法師丹成人去幾經年怪石崚嶒樹曲拳超脫每思攀逸駕沉迷無奈縛塵緣勝逰徒有騷人詠絶景難憑妙筆傳投紱歸來應未晚尚期一訪洞中仙余以前年五月八日到官今年又於此日去郡同僚作饑即席援筆言别來守江城恰二年同僚何幸得諸賢屢邀風月供吟筆幾度江山棹酒船自分衰頽今老矣可堪離索更凄然青雲有路平如砥公等應須早著鞭去郡日寄居諸公作饑即席奉呈三年江上守孤城日日思歸去未能雖愧憩棠無惠政却欣伐木有良朋花開後圃春同醉月滿髙樓夜共燈别後要須俱自愛從今拭目看飛騰用天豫貢院韻以饑行色直氣如君世莫雙笑人老死利名場一言齟齬身雖去萬口咨嗟道愈光舌在何方居澤國時來㑹見佐巖廊人間榮辱渾休問日飲醇醪計亦長和曽吉甫九日龍山陳迹已成灰尚憶當年戲馬臺我幸偶陪黃菊醉君應亦向白衣來風髙日朗三秋霽野曠天清萬象開好對良辰成樂事若為不飲竟空回再辱九日和章連日公冗失於奉賡今日大閲偶於馬上得之兼簡是日座客老子年來百念灰尚懷月觀與風臺良辰祇恐轉頭過好景還欣入眼來几席坐窮千里勝軒窗髙揖四山開公餘不厭頻登眺要伴諸君醉百回重陽有作呈朝宗殘年腳力已摧頽不謂登髙尚可來每恨故人多爽約那知今日共銜杯挪挲黃菊香仍在悵恨朱顔挽不回君若此時猶惜醉酒懷更待幾時開用前韻示三七姪吾家小阮亦賢哉又得攜壺為我來應念難逢重九節要陪痛飲十分杯頭添白髮那能久眼看黃花有幾回頗恨病衰鯨量减只將笑口為君開重陽用昔年所作韻行盡天涯鬢欲霜又來姑熟過重陽試登翠巘邀珠履更喚紅裙侑玉觴野菊有花供客眼公庭無事惱人腸諸君莫惜長鯨量且伴衰翁入醉鄉和許守重陽出城韻曉從千騎越重闉軋軋籃輿渡古津萬叠青山煙漠漠一溪寒水石粼粼笑攜紅袖尋蓮社醉折黃花上葛巾此㑹從今成故事他年應記座中人江朝宗許重陽見過候終日竟不聞車音使人悵然因成拙句以誚之故人平日號推誠然諾應當作世程已是賞花頻爽約若為把菊又渝盟詩成本擬君相和酒熟當憐我獨傾惆悵死生猶未隔如今先已見交情拙者有重陽詩以陽字韻歲和一篇復繼前作登臨端欲賞秋光病眼昏花怯太陽老去不堪逢節物愁來聊復近壺觴沉迷有靦塵埃面感慨空存鐵石腸已是思歸無可奈更來髙處望家鄉重陽有感呈諸丈九日長年客異鄉今年又復到南昌眼看黃菊依然好心著青山祇自傷已是歲華成晼晚可堪秋色更凄涼諸公不用羞吹帽且試登髙共一觴春閲偶成三首曉驅千騎出郊坰極目江天萬里晴風入鼓􅎏聲益壯日烘旗幟色增明安邊雖是難忘戰和衆由來在戢兵但願從今烽燧息早歸林下看升平大閲歸來日未西柳絲搖曳草萋迷桑開蟬翼枝方緑麥露蝦鬚穗半齊池面新荷爭出水道傍飛燕競銜泥風光撩我歸心動猶喜初無杜宇啼肩摩袂屬擁如山夾道爭看大閲還無限兒童齊拍手幾多父老盡酡顔人方共樂青春好我亦常欣白晝閒無奈老來歸念重夢魂夜夜繞鄉關大閲即事書懷東郊雨後好風煙大閲歸來意豁然十里旌旗明照日九衢鼓吹閙喧天酴醿開也渾如雪楊柳飛來總是綿景物眼前雖不惡老來無奈憶林泉懶散無堪合杜門十連帥閫若為分仁風尚可揚千里勇氣安能作六軍戈甲紛紛徒曜日旌旗獵獵漫連雲歸來夾道人爭看應笑蒼顔老使君和陳澤民詠巖桂我家千樹正芬芳不見羇懷已倍傷豈謂幽姿憐索寞亦來孤館伴凄涼追尋尚想年時侣披拂還同故里香花下光陰能有幾若為飄泊向江鄉巖桂盛開感而有作抱痾三月未能瘳樂事都無祇有愁忽覺天香參鼻觀頓令病客展眉頭擬招賔佐同歡賞奈怯壺觴且罷休却憶向來無事日年年花下醉千秋和天子即席詠巖桂衰病無悰日日加喜君來自帝王家素娥正駕一輪玉老桂方開雙樹花置酒雖欣陪重客侑尊還愧乏名娃莫辭今夕如泥醉須念明朝各一涯和子儀同賞荷花晚凉領客泛漣漪境勝形容頗費詩人自紅蓮叢裏過舟從緑柳岸邊移興來滯思俄然豁坐久煩襟頓覺披佳客要須拚一醉莫辜風細月明時得三七舍姪書云二月二十五日同族人至湖山賞海棠花枝繁麗宛如神仙窟宅感而有作報言宗族競尋芳共到吾廬賞海棠亭下定知春爛漫花間想見醉淋浪長年心著神仙窟此日身縻雲水鄉苦恨欲歸無羽翼夜深魂夢只悠揚見市上有賣海棠者悵然有感連年蹤跡滯江鄉長憶吾廬萬海棠想得春來增艷麗無因歸去賞芬芳偶然擔上逢人賣猶記尊前為爾狂何日故園修舊約賸燒銀燭照紅粧和咱通彥早梅韻歲歲梅花破臘開賞花嘗記坐蒼苔今年似覺寒猶未昨夜不知春已回喜有暗香供雅客可無佳句助深杯須知不比閒桃李莫把金刀取次裁觀梅偶成二首化工一夜報春回雪裏南枝已漸開不與凡條鬭紅紫獨將孤艷照池臺勝逰濫綴蓬山侣髙唱寧追郢客才多病自憐心尚在不辭歲歲為君來經年不見夢魂飛依舊仙裝淡薄衣玉骨已無塵俗氣氷姿還耐雪霜威攜壺正欲酬清賞策杖何妨厯翠微莫惜對花拚劇飲看看風雨捲春歸逺老惠雪中觀梅詩次韻以謝山頭飛雪已漫漫雲散須㬰復見山踏雪不辭來野外愛梅須遍走林間為憐孤艷思經目擬索踈枝笑解顔師肯相過宜及早預愁花㸃緑苔斑逺老自和前詩再寄復次韻雪到梅開恰欲漫扶藜得得繞湖山折將冷蘂疏枝去浸在明窗淨几間一見已堪資琢句細看還足助怡顔只愁冰艷相侵逼映得衰翁鬢愈斑和紫巖老雪中觀梅清寒池館靜沉沉慘淡江梅弄晚陰雪裏有誰能載酒花前無語自傷心低枝似欲迎人笑清賞何妨倚樹吟況有爭妍佳句在愈撩詩思不能禁賞梅偶成一冬凖擬賞江梅直至如今始見開已怪輕寒勒春住更憂橫雨把花摧相攜且看枝頭雪共坐聊傾樹下杯況是公庭無箇事何妨一醉習池回愛梅經年不得見江梅繞樹行行日幾回已擬開時拚徑醉其如病後怯銜杯傷心不覺成三歎忍淚猶能强一來顧我已衰無酒分從今花更不須開和隱老詠梅韻不憚行行雪滿巔要看與雪鬬清妍開花雖在三冬杪結子還居萬木先水淺橫斜聊自見夜寒幽獨有誰憐君詩況與梅相亞傳寫慚無十樣箋自京口至建康一路不見梅花慨然有作盡日經行不見梅竹籬茅舍漫徘徊無時得遣愁懷去有底能教詩思來遙想故園應好在不知今嵗為誰開何時花下還如舊一笑相看把酒杯自建康路中見梅次前韻行盡山岡喜見梅停驂深欲少徘徊那知急雨連天暗更有狂風捲地來無計略臨花下坐却嗟空向眼前開行人賴有尊中緑遙想孤芳寄一杯北山席上見梅偶成聞道前村梅已開有心踏月共徘徊誰知白日匆匆過竟阻青鞋得得來席上相逢如有舊尊前佇立恨無媒樓頭且莫橫孤管我欲今宵醉百杯再和二首一枝昨夜雪中開報道江南春信回自與東君私有約不須驛使寄將來風姿端是飛瓊侣標格宜為㺯玉媒莫惜移尊來月下要看疏影落金杯平生相見即眉開幾遣車停馬首回窗外每憐隨月到竹邊還喜過牆來寒香入座如相覔幽艷迎人欲自媒不負此花惟有醉殷勤且覆掌中杯用金克家韻賦梅花我賦梅花逼古人人疑和靖是前身祇思長向花前醉不厭閒來樹下頻俗眼但知誇潔白老懷端是愛清真大家管領須宜早莫待飄零作地茵詩勉及門赴海棠之約君與吾遊積有年未曾同醉海棠前如今君乃先春到似赴花朝豈偶然已是詩中參造化何妨花裏見神仙暫歸莫負重來約未及春風便著鞭四月六日同江朝宗花下飲十分擬共醉花枝底事君來苦後期芍藥階前猶爛熳酴醿架上已離披春歸又是辜杯酒老去還應惜嵗時今日要須拚酩酊從教人笑賞花遲和管大老瑞麥别來長恨見無時不謂相逢總泣岐愧我滯留身已老憐君偃蹇宦猶卑思歸正續孤松賦溢美空傳瑞麥詩萬事從今休更問祇知痛飲是吾師憶鹿鶴山中鹿鶴久相疏恨不歸來與汝俱飛舞尚如前日否奔騰還上後山無不聞警露來庭下猶想銜花近座隅歎我素鍾山野性從來與汝本無殊偶得數琉璃瓶置窗几間因取小魚漾其中乃見其浮遊自適感而有作方安林下樂樵漁底事牽來剖竹符道院固知人少訟豐年何幸俗多娛閒隨野鶴穿花徑靜看遊魚戲玉壺却愧此身猶束縛未能歸去老江湖和陳義卿自顧迂疏不入時朅來此地亦何為遊從斷絶憑誰語蹤迹飄零祇自知方喜朋簮今復合却慚酒盞但空持何時得遂歸休去把手臨流共賦詩義卿以病不飲故有酒盞空持之句和蔣宣卿韻丐閒章上早知還卓犖髙風豈易攀闊步未歸龍尾道勝遊先到虎丘山千尋古木軒窗外一縷沉煙几席間況是登臨有佳客何妨終日對孱顔不將有限遂無涯聊為尋幽駐使華千古山川埋劔氣半空臺閣雨天花終期香火參同社且賦新詩寄作家歸晚不須添列炬預愁驚散暮林鴉和沈子壽見寄心地荒蕪曠幾春朅來邂逅共耕耘交情正喜清如水歸興那知去似雲百首漫勞頻寄逺一尊終擬再論文胡為竟爾乖前約寂寞車音杳不聞和梁次張韻妙齡才藻擢文犀聲價何須待品題獨抱孤衷長拱北擬攄妙畫欲平西五年不見心如渴一笑相逢醉似泥我老已為林下計看君平步上雲梯和王夷仲韻灑落胸襟有古風日臨清泚面巃嵸不堪世路千重險直與溪流萬折東刮眼相看言有味傾懷一笑興無窮何時同訪連檣老快意觥船一棹空和韓子雲見寄四首鬱鬱愁懷不自傾時時倒指勘歸程情知歲月來無幾心著湖山去未成惡語豈能賡絶唱故人聊欲話平生頗思共索梅花笑㸃檢枝頭半吐英日在桑榆勢欲傾此時那可更貪程屢憑熊軾慚無補新葺燕巢欣有成便好棄官還故里不妨把酒樂餘生經綸事業須公等看即持荷侍邇英有花須折酒須傾少日追歡不計程老去自憐心易懶時過還恐道難成城頭又是暮雲合江上何時春水生早理扁舟歸去好故園猶有萬紅英當時邂逅已心傾别後逢人問去程顧我拙疏非世用喜君明悟自天成十年不見懷芝宇一笑相逢付麯生暫爾就閒宜自愛上方著意擢豪英僕平日聞有此生待足何時足未老得閒方是閒之句每嘆服之恨不知作者姓名一日與魯漕話次方聞此詩乃福唐余倅所作魯繼録全詩及余君所夢始末見示讀之使人益起懷歸之興因成小詩以記其事寒士叨塵分已踰不為歸計待何如暮年光景那能久浮世榮華總是虛此去直須甘淡泊箇中元自有乘除因公拈起余君話愈使衰翁憶故廬誠能積行纍功自有乘除乃余君夢中所得司命真君語也挈纍來當塗聞已入境感懷有作二首鷗鷺相疏鴈鶩親簿書叢裏度光陰塵埃已覺胸中滿霜雪還從鬢上侵盡室修途方在念連宵苦雨若為心明朝儻得成團聚有酒從教取次斟方與晴窗愛日親若為天又作重陰年來已是憂思過老去那堪疾病侵默數七旬寧幾日更添一歲愈驚心喜聞已辦周身具對酒何妨且滿樽纍年欲辦周身之具未獲昨日家問來云新買數百斤杉木一根身後之事遂可取辦喜可知也和志道送行韻聖君圖治事如何但見風雲氣象和公似一䕫奚翅足我如乘鴈豈加多西郊索索飄黃葉南浦鱗鱗起緑波今日郵亭休恨别行看麻制草鑾坡夀元伯母太夫人八秩七十康强自古稀年登八秩有誰宜壽鍾賢母人難及慶襲佳兒世共知榮養已為人子範清規還作女流師綵衣更戲蘭階下遙想慈顔笑解頥送朱彥聰和韻傷時已老壯夫顔可使分攜一日間細細梅花薰别酒依依寒日淡前山由來世上知音少況是人生㑹面難他日詩成能念我寄來莫放驛筒閒送丘尉赴試南宫儒冠鼎盛縉紳多海內如今數永嘉士習藝文爭擢第君明經術合傳家莫言黃綬官猶小須信青雲路不賖好上漢廷朝董對要令吾道益光華送諸鄉人赴試南宫聞道諸君上玉京一杯聊復話離情青錢既中三年選黃鵠須看萬里程欲向他時成逺器要從今日立修名吾君鋭意圖興復好把嘉言對集英送二十七弟五三姪赴試南宫家世登科能幾人兩人今歲奄沉淪不應天遽衰吾族㑹見時當發汝身聨轡莫辭金鐙冷奪標爭鬭錦袍新還須益勵青雲志門户何憂不再振送姪赴廷試經術傳家幾縉紳孫吳決䇿舊無人上將用武方留意汝始程能遂發身佇展六韜登上第更資三釡及偏親兩科自此增雙美何患衰宗不再振昔年三榜偶聨榮人道吾家好弟兄更喜鴒原俱有子還來雁塔再題名衰宗正恐儒風墜晚景那知好事并老子已為歸去計從今看汝奮鵬程和曽吉甫四明見寄二首老矣何堪剖竹符頻年强出應時須腰間謾佩買臣印月下同遊賀老湖白雪已知人寡和清風還憶醉相扶十洲三島登臨處能記稽山病守無風煙浩蕩甬柬州方羡公為爛漫遊豈料連宵埀雨腳未容杲日出雲頭扶藜登眺心應在隱几吟哦趣更幽遙想乍晴須痛賞詩成還肯寄來不和梁大諫望亭述懷屢試乘軺與把麾笑談自可解重圍暮年强健人爭羡平日剛方世所稀國步尚艱端有賴君恩方渥未須歸時清益展經綸手直上巖廊秉政機又和陳天豫邊敵臨江强指麾狂圖欲效白登圍一朝殄滅妖氛淨萬里歡傳盛事稀故國山河看克復中原父老徯來歸六飛便好乘時進順取天心莫失機月下獨酌有懷梁丈因和前韻以寄且約為明夜之集晚來清蹕駐旌麾月色分明徹四圍對景已欣羣動息仰天還覺衆星稀如今路入中原去看即春從上苑歸況是升平時節近一尊相屬且忘機和朱文卿見贈簿書終日嘆徒勞俄喜相看有故交抱道尚稽懷印綬安貧還不厭衡茒草廬誰識真龍卧阿閣行看彩鳯巢歸去不妨深閉户靜聽修竹晚風敲和林徽之見寄涉世無堪足亂離蕭蕭風雨一聲雞故人别後乾坤窄三徑歸來草木迷黃鳥翩翻思出谷老龍頭角尚蟠泥一尊濁酒無人共又是悲吟到日西和韓子雲韻留沈子壽一雨連宵繼日傾豈容吾子語歸程我為千里政方暇子寓三年學已成要把老懷傾倒盡忍令别恨等閒生江城先自傷牢落況失一時人物英和陳澤民見寄三首平生懶病苦難醫長為家山詠式微投老但思拋世網非才安敢近天威不堪人事來如織況復年華去若飛胸次萬端誰與語何時玉麈對君揮青衫晚得自蟾宫簿領雖卑道自隆不為小官忘大計要從舊學著新功忽來書劄情何厚細讀詩篇句更雄還憶去年相聚日風前月下酒頻中不學羣兒事詭隨世途雖險此心夷人生富貴誰無分男子功名自有時好稱良辰聊適意莫因末路輒興悲山寒已有梅花放想見尋梅日有詩和王夷仲至日有感葭灰管裏氣初浮陽長陰消不自謀吾道窮耶當復泰此身老矣不禁愁得閒正好尋詩社乘興何妨上釣舟擬待梅開同勝賞且寬歸興少遲留和曾吉甫寄韻呈李相之二首千齡景運適相符況復才華世所須騰踏自應登館殿滯留誰謂尚江湖從來太瘦緣詩苦想見閒行信杖扶聞道朝來病良愈髙軒還解出門無早已相從海上州朅來鑑水又同遊驅馳官路俱華髮繾綣交情異白頭公即橫翔層漢去我將歸卧故山幽連宵月色如明晝乘興還能過我不和楊元明雪中見贈為别多年不記旬雪中聞到喜難陳尚稽良㑹心如渴頻展新詩手欲皴和寡莫追歌郢客興來還愧泛溪人要須早了官中事趂取元宵作好春再和老去光陰有幾旬到官俄見歲華新陡驚懶慢隨年長更覺衰殘畏客頻愧我方為牽俗士羡君欲作獨醒人相逢未用辭歸去且向雙溪醉早春和陳天豫冠字韻已是頭童懶整冠尊前猶欲强追歡浮生得滿七旬少樂事能并四者難閒去稍知心地適興來殊覺醉鄉寬入朝更誦公詩句兩腋風生盛暑寒和孟世功秋日吳江見寄扁舟西去氣凌雲坐看魚龍躍浪紋風起白蘋初日晚霜雕紅葉欲秋分忘機鷗鷺情相狎入筆江山句不羣正恐功名來追逐煙波深處未留君和魯憲見寄一笑同登卷雨樓相歡曽記昔年不幾憑詩句論心曲屢折花枝作酒籌醉裏忘形俱可樂别來握手兩無由何如傾倒還如舊月下花前恣獻酬和方叔載留别臨别殷勤贈我詩一披何喜得如之怪來筆下能髙妙元是胸中自崛竒長恨頃時才一面方欣今歲展雙眉明年莫負論文約要向新元副所期和朱世同詠梅竹籬茒舍舊同居不見冰姿恰嵗餘别後有誰親几席朝來忽喜映階除雪中有酒宜相就月下無人肯自疏端與嵗寒長有約不須青帝更吹噓和朱世同夜聞竹聲醉卧空齊靜絶人夜闌霜月白紛紛寒生枕上渾無夢聲到窗前疑是君玉軫誰家調古曲鐵衣何處角孤軍羡君寫入新詩裏清壯還應過所聞和劉與幾悟昔先生豈是傲當時知向名場早識機擾擾半生蝴蝶夢休休今日緑蓑衣筆端信有江山助醉裏從教日月飛應笑蘧生回首晚才知四十九年非感舊達宦吾鄉舊罕聞躋榮兩禁止三人二公嗟已歸長夜一老知能得幾春軒冕但堪遮俗眼湖山正好樂天真不妨日日花前醉已是行年及七旬范丞相生日鬱鬱葱葱瑞氣新中興周室復生申半千休運逢良月十二祥蓂表慶辰自有元勳書史册漫留遺愛及邦人願同四海躋仁壽賸賞蟠桃幾萬春老妻生朝為壽人生七十古來稀我幸君今及見之教得子能傳素業養成孫亦守清規稟生坎坷今當泰積善初終志不移白首喜為林下伴願從今日到期頥余年七十輒和樂天詩以自廣已是年齡及七旬田園稍給未全貧兒孫初識傳儒業世俗還稱作貴人門外湖山渾可樂沙頭鷗鷺更相親莫將塵事干吾慮已向君王乞此身曽元伯以余七十用韻見慶復和之迂踈如我世間稀自笑於時百不宜但欲平生無鬼責豈期長命有天知七旬雖慰白司馬三黜空慚栁士師多謝君詩逺相慶一披頓解老人頥余既和樂天詩而喜於年及之心猶不能自已又復再和八首坐閲流年已七旬從前憂道不憂貧肯教世指為癡漢只願鄉稱作善人老去固應忘物我歸來豈是負君親嘗聞知進須知退庶得終全不辱身乞得行年到七旬歸田不問富和貧初非潔已為髙士但欲頥心如古人每對青山常意適才逢白叟便情親靜中百念俱灰減識破浮生夢幻身封章上達已經旬所乞原非為賤貧七秩自知非久客一心只欲作閒人雖慚緑鬢朱顔改却喜清泉白石親榮辱是非都不問尊前且樂自由身先子春秋僅八旬一生多難只安貧豈期有子登清禁亦復如今作老人共羡浮榮光故里自慚實德忝吾親從前萬事皆踰分只合歸休保此身新歲妻孥慶七旬遍賙鄰里及孤貧髙年滿坐有醉客丐者塞涂無餒人平日要同人喜樂此時寧間物踈親餘生自度渾能幾詎可徒勞負此身故園春到已三旬滿目繁華未覺貧年老得逢無事日心閒不類有官人戴花休管頭無那酌酒何妨手自親七十人生從古少安知來歲有吾身憶在霜臺未六旬嘗陳仕宦縱家貧豈容七十不納祿却為斗升猶牧人年齒幸吾今已及官曹從此不應親願天許遂終焉志養此疏慵老大身一年三百有餘旬舉世栖栖苦迫貧得享安寧七十歲已勝衰謝萬千人好官縱使登三事榮養何由及二親爭似山間林下坐無憂無毁足全身乞身不獲再和老合休官況七旬我非辭富欲居貧也知光景無多日更覺筋骸不逮人豈謂九重恩未替復頒一札意猶親囊封再上終期允已對蒼穹誓此身懷歸有作一病兼旬百不禁愈牽歸夢繞家林向來豈有功名念此去斷無人我心但願天憐將就木許從人欲便投簮若䝉不靳清閒福尚惜餘年盡寸陰和四哥錢塘思歸韻鬱鬱羇懷久欲東故園何日割蒿蓬可堪世路塵纓縳却使雲山蕙帳空待價深藏非左計汗顔為斫豈良工須知吕望嚴陵輩亦是滄浪一釣翁讀丐辭不允詔書感而有作朅來江上再經年衰病無時强自憐屢控危衷甘屛縮豈期優詔更留連政平訟理曽何補職稱民安亦偶然雖感上恩容卧治何如便許老林泉政平訟理職稱民安卧而治之皆詔語也齒豁頭童已暮年未容歸去亦堪憐只思舊隱如元亮寧有新詩似惠連萬事此生渾已矣一尊今日且陶然宦情況復清如水何必移封向酒泉復和憐字韻二首擬歸林下度餘年底事天公不見憐新歲已驚青鬢換故園還想緑陰連敢萌癡意貪非據但欲冥心任自然今日有誰聞此語祇應白石與清泉春色撩人勝去年鶯啼燕語若相憐一川煙水清還淺萬疊雲山斷復連好景㑹心宜樂矣故園回首却悽然同僚賴有清新句似聽松風潄玉泉二兒納婦有感老乘一障楚江濵無奈星星鬢影新客裏情懷那似舊忙中日月不知春若為經歲拋泉石猶把非才玷搢紳還盡此生兒女債盍歸林下作閒人重陽用去年韻不堪秋色已悲涼那更重陽對夕陽白髮蒼顔羞覽鏡紫茰黃菊喜浮觴且來髙處開心目莫引愁端撓肺腸未信天教長作客會須有日放還鄉此生几度換炎涼過了重陽又一陽無奈流年如轉轂得逢佳節且飛觴風前落帽從吹鬢江上登臺任斷腸老去已忘榮與辱只思歸卧水雲鄉池上近作假山引水穿石撒珠其上亦有可觀因成拙句終日塵勞困簿書無因歸泛小西湖余家西湖湖上有園數十畝目為小西湖且來池上看堆翠更向峯前認撒珠觸石有雲時㸃綴隨風無雨自沾濡老夫行矣休官去留與邦人作畫圖假山我愛青山欲細看如何不在户庭間聊移野外玲瓏石來作窗前重疊山拄笏已堪供嘯詠杖藜還更得躋攀莫言道院過從少亦有修眉相伴閒生日藜杖綸巾度幾春紫袍赬帶一畨新恩榮可但將延世渥澤還欣再及親已見里中誇盛事何妨林下作閒人年踰七十仍希有壽酒須拚飲百巡謝錢參惠驢白髮衰翁七十餘尚勞軫記特馳書知無仙骨能騎鶴喜有殘骸可跨驢廄下分來齊駿駟林間乘去勝巾車更煩拈出荆申事遐想風流愧莫如來書有荆公申公跨驢事聞故舊二三公或不幸於官或以疾病而去或以口語而罷悵然有感平日衰遲衆所憐偶逢亨運亦騰騫七旬已過宜休矣一出不歸終溘然幸免煩言全晚節且無多病惱殘年直須更作投簮計莫待將身到九泉寄周表卿别來星紀兩周天夢想風標每慨然靖退喜公今就第奔馳愧我未歸田得閒正好哦詩句乘興何妨棹酒船頗恨路長還病暑無由一見話當年再和舉世爭披樂廣天得聨契好豈徒然少留接武遊麟閣晚更先期到鹿田此日莫登揚子宅何時能泛剡溪船儻容一夜陪清話勝把陳編讀十年和劉正夫見寄攬轡澄清慕古人觀風問俗按行頻振荒已視饑由已蓄水猶思利及民美意共推君體國髙懷還喜我抽身名章下逮情何厚和氣薰然暖似春已是龍鍾七十人故應告老上章頻九重埀念如慈父一旦容歸作幸民今我可憐非故我此身才喜是吾身花前幸有尊中醁且醉湖山幾度春和澤民二首歸心已動不容留多謝君恩許退休雖喜溪山歸似舊却驚歲月去如流門前已是開三徑湖上何妨具一舟莫道此時無伴侣得公足可共遨遊欲紹家聲每自鞭肯同流俗飲貪泉已將止足安心地更把吟哦樂性天笑日桃花將獻媚先春梅蘂欲爭妍人生㑹合真難遇幸有杯觴且共傳和蔣無退懷湖山多謝君恩許引年容親白石與清泉不來山下尋詩社即向湖中棹酒船意適更穿花塢去興闌還傍竹林眠那聞髙士飄然句陡覺身輕似得仙
