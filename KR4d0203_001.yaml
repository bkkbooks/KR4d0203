body:
  text: 湖山集卷一宋吳芾撰和陶詩和陶停雲淵明抱節不渝風雨為米折腰頗厭艱阻歸卧柴桑孤松獨撫希蹤前賢寤寐傾佇眷兹衡宇草樹溟濛坐對五栁遙望九江亦足寄傲東軒南窗獨恨無人載酒相從我頃雖達不足為榮擬攀逸軌少適真情遐賞風味魂夢宵征葛巾藜杖髣佛如生吁嗟人世如彼南柯正宜間處養此太和縱使得意位髙金多老不知止寧逃譴呵和陶勸農韻勉吾鄉之學者士農工商古有四民惟儒最貴但患非真誠能力學進必有因儻或中輟豈能為人譬如田家所仰黍稷要當早夜勤于種植惰而自安不稼不穡嵗云暮矣何由足食吾鄉人物散處川陸豈無秀民生而清穆亦既從師步趨隨逐亦既窮經訪尋歸宿奈何人性易流難久才及長成即求配耦稍得其資復營南畝自暴自棄有同遊手大扺名儒豈患窮匱大扺外物豈在僥冀學成道尊富貴自至不學空虛非惟自愧縱得美官人亦見鄙若博羣書更兼素履雖處常流亦超塵軌一旦進為必兼衆美和陶命子韻示津調官我愛二龔絶勝二唐克著清節終始有光夫豈不知伊傅在商相湯洎髙俱致明昌又豈不知道否晚周天縱將聖獨有孔丘卒老于行靡憚周流胡為潔己耻事王侯曰豈不欲效彼羣龍潤澤萬物助成嵗功潛而不用夫豈自封懼將有悔不顯其蹤喬木千尋竟困斧柯屈原特立終隕汩羅水行地中尚值坳窊縱如賈誼猶滯長沙勿謂吾身有才有德可以安世可以益國不善用之鮮不為忒所以古人戒之在得我幸此生不忘本始身雖朝廷心實田里所以暮年知足知止以進為憂以退為喜汝能傳家一第已及使進而為不患無立奈何親老奉親為急莫待異時徒然涕泣我不望汝勳業濟時縱得入侍朝夕論思欲供子職何如在兹人能盡孝忠豈逺而既有餘力且親燈火讀破萬卷百倍于我我恨書少意不自可汝能雪耻天亦見假我本白丁恩及童孩雖由先德亦自書來汝誠博古為世實才時或未遇又何慊哉和陶歸鳥翩翩歸鳥投宿深林豈無所擇相彼遙岑厥有嘉樹可以託心雖逢赫日終貯清陰翩翩歸鳥亦已倦飛平林在望非此曷依是用斂翮一意來歸世網雖密容或我遺翩翩歸鳥慮患徘徊四顧萬里獨有故棲故棲來反所願已諧毋思寥廓擾擾此懷翩翩歸鳥顧影蕭條亦既休息斂此風標仍遇儔匹其鳴交交營巢雖苦亦復亡勞和陶形贈影吁嗟汝依我自有此身時跬步不相捨皆隨我所之使汝動必正端本皆在兹念我已衰老自知死有期行且與汝别此心寧不思但我不畏死亦耻涕漣洏且把一尊酒話别汝莫疑淵明甫中夀已作挽歌辭和陶神釋人生稟一氣自微而至著不問富與貧不論新與故自有形影初我便相親附二子既有言我寧無一語汝形未生時影復在何處偶與我有緣同生復同住幸我所依人造理仍知數身雖未溘然已辦周身具得酒即忘懷寧復顧毁譽醒即看雲眠目送孤鴻去我亦得安間不憂還不懼説與二子知莫為身外慮和陶示周續之祖企謝景夷韻寄朱元晦我愛朱夫子處世無戚欣淵明不可見幸哉有斯人奈何不茍合進用苦無因夫子于此道妙處固已臻尚欲傳後學使聞所不聞顧我景慕久願見亦良勤第恨隔千里無由往卜鄰安得縮地杖一到建溪濵和陶與殷晉安别韻送陳順之赴官子往治畿邑趣裝亦良勤惠然來過我話别更情親顧我老且病已與死為鄰獨思陪勝侣倍覺惜清晨忍唱陽關徹與子從此分願子且少駐醉我甕頭春子雖未宦達意氣已凌雲今去天尺五騰上豈無因要無求速化切莫慮長貧抱才能自重何患不如人乍晴與客登眺和陶和胡西曹韻方欣秋氣爽庭戶生涼颸俄然毛骨冷霜露侵人衣乍霽還可喜領客登翠微猶有籬下菊不見園中葵徘徊視景物似與人俱衰幸有杯中物何妨時一揮人生得行樂老去未為遲宋玉猶未老何事苦多悲和陶悲從弟仲德韻哭陳澤民年來朋舊少大半已雕零人物如吾子共謂上青冥行年才五十歎惜負平生憶子初見我我意已先傾愛子器識逺佇子功業成縱不登要路亦必享遐齡二邑曽未久早已聞政聲方將脫選調榮養娛親庭天公亦何事于此獨無情一旦棄我去不復見儀形痛傷風月夜空對酒尊盈和陶始作鎮軍參軍經曲阿韻哭陳能之陳公行古道出處盡堪書俯仰端無負初終總一如粵從為劇邑平步上亭衢正色主風憲彈劾靡親踈故雖頻補外直性不可紆召還方進用謂當推緒餘一朝忽攖疾力請歸舊居竟化遼東鶴不作北溟魚哀哉名世士天胡賦分拘有子傳衣鉢無錢治室廬和陶阻風于規林韻寄陳時中二首退處固云樂未免歎索居賴有陳使君情親如友于自應長相見豈謂各一隅我雖事跧伏閉門懶問塗無日不看山無時不面湖君尤我所愛良會安得踈縱不思風度亦欲聞緒餘會須成二老君意定何如人皆有還往我獨無所之若不見君子誰與同襟期嗟我已衰老無復少壯時縱使善衛養豈能長在兹願言時命駕容我親色辭我已不強酒從今君莫疑和陶赴假還江陵夜行途口韻寄江朝宗居間嵗月久萬事心已冥獨于同調人猶未能忘情憶昔桂花發君來訪柴荆把酒坐花下歡然話平生今年秋更好花還照眼明無由共清賞幽恨已難平那聞遭橫議意頗悔西征既不樂朝市却思巖石耕古來未遇者寧免寸祿榮要當且隱忍勉強就功名和陶己酉嵗九月九日天地氣將肅秋冬候欲交眷兹萬木落感我雙鬢雕悠然清興動與客共登髙有巖號景星萬仞連雲霄一覽快心目寧辭杖履勞但恨無酒量一舉如沃焦仍恨無坐客可繼五栁陶且拚風帽落聊醉菊花朝和陶庚戌嵗九月中于西田穫早稻東風才解凍農事已開端田夫競力作不獲須臾安淵明于是時亦豈容坐觀日出負耒去入夜乘牛還寧不憚勞苦要得逃飢寒顧我獨何幸雖知稼穡難逢秋但一飽此外了不干回首視淵明已是增汗顔那堪萬事拙只得長掩關誦公穫稻句倍為公興歎和陶丙辰嵗八月中于下潠田舍穫淵明事南畝躬自穫巖隈雖復竭吾力却得舒我懷所收既不薄卒嵗事可諧鄰家相慰勞競持酒與雞留連相酬酢入夜未能廽回思往嵗歉舉目俱堪哀憂心今幸釋笑口何妨開須傾瓦盆盡須放玉山頺已是從吾好寧憂與世乖任他田父哂未足為髙棲淵明飲酒詩載田父見疑之語有曰繿縷茅簷下未足為髙棲和陶詠貧士七首士貧亦常事但視其所依茍能依于道暮景亦有輝淵明生亂世初不求奮飛為貧聊一出違已即言歸歸來坐衡宇無粟可療飢作詩詠貧士泰然曽不悲淵明抱歸興未老辭華軒應謂役于人豈如歸田園在家貧亦好滿眼是風煙親戚可晤語書史可精研妻子識此意相對無間言時取新酒漉一笑中聖賢我家未為貧尚有緑綺琴手雖不能彈頗喜聞遺音時時命女奴強於弦上尋聽罷方寸適取酒時一斟顔回與原憲平日我所欽儻得從之遊雖貧亦甘心新春來未幾已見日在婁遊人怕春去把酒急獻酬折花各盈把行歌滿道周貧者壁四立若不堪其憂亦復典春衣買酒呼朋儔一醉人所嗜此外非所求我愛徐孺子髙名滿江干衆人皆欲仕乃獨耻為官曽不憚辛苦負耒營一餐清節映千古至今聞者寒洪井有祠宇我嘗瞻其顔不覺愧汗下竟歸長掩關光景如春花身世似秋蓬淵明洞此理養拙不求工上獨思四皓下獨友兩龔出處雖或異心迹亦略同安貧抱全節雖窮亦如通九原儻可作我欲以身從入仕已四紀把麾還六州曽未見縣令有若淵明儔稍屈便引去髙致更風流醉卧衡門下曽無寒餓憂獨抱千金璧未許人輕酬聲名傳不朽千古仰前修和陶詠二疏韻世人耽寵榮往往麾不去日已迫桑榆馳騖方成趣誰肯急流中便作冥鴻舉屈指數哲人在昔獨疏傅萬口共稱賢餞送塞歸路天子亦嘉之賜金示優顧淵明作此詩端欲迷者悟我觀二疏髙豈無子孫慮揮金以自娛益表清節著和陶讀山海經十三首韻送機簡堂自景星巖再住隱靜我自歸林下亦復與世踈賴有善知識時能過吾廬伴我説道話我愛讀佛書師為巖上去我亦為膏車便欲展我鉢隨師同飯蔬脫此塵俗纍長與巖石俱此巖固髙矣卓出山海圖但比吾師髙還恐巖不如我生山窟裏終朝面孱顔獨此巖未到抱恨知幾年兹逰信竒絶一覽小衆山更得師為主二妙為易言幽棲非不勝觸目是林丘若比兹巖秀培塿固難儔雲山千里見石泉四時流登臨有如此何必更他逰我年七十五木末挂殘陽縱使身未逝亦豈能久長尚冀林間住與師共末光孤雲俄暫出道俗紛蒼黃愛山端有素拘俗亦可憐昨守當塗郡不識隱靜山羡師來又去愧我復何言尚期無久住歸送我殘年師心如死灰形亦如稿木胡為衲子歸以響答空谷顧我塵垢身擬向禪河浴更願張佛燈為我代明燭扶踈巖下樹入夏總成陰幾年荆棘地一旦為叢林我方與衲子共聽海潮音人生多聚散離别忽驚心我與師來往嵗月雖未長相看成二老風流亦異常既宴坐巖上我方為聚糧倘師能早歸此樂猶未央紛紛學禪者腰包競奔走才能脫葛藤癡意便自負求其道德尊如師蓋希有願傅上乘人永光臨濟後吾邑多緇徒浩浩若雲海大機久已亡賴有小機在乃更與一岑純全兩無悔堂堂二老禪海內共期待古無住持事但只傳法旨有能悟色空便可超生死庸僧昧本原豈識西歸履買帖坐禪牀佛法將何恃僧中有髙僧士亦有髙士我雖不為髙心粗能知止師是箇中人特患不為爾何幸我與師俱是鄰家子師本窮和尚我亦窮秀才忍窮俱已徹老肯不歸來今師雖暫别泉石莫相猜應緣聊復耳師豈有心哉和陶挽歌詞三首吾年七十五夀命不為促仕僅五十年出處粗可録人生會有盡自應身就木寄語親舊輩不必為我哭百年如一夢吾夢今始覺亦既了萬緣無殆亦無辱所欠惟一死得死今已足嗟我在生日一飲數十觴有時無酒飲亦復潑醅嘗今日雖有酒羅列在我傍對之徒自歎與世隔風光所幸埋骨地不離雲外鄉魂魄時一逰此樂猶未央老眼日昏昏華髮日蕭蕭不死竟何待理合葬荒郊荒郊何所有四靣俱岧嶤榮木望秋落亦已成枯條青松為我夕白石為我朝仍幸二親墓相去無幾何今得從之遊歡喜如還家我心既歡喜安用挽者歌有人來奠我但問山之阿和陶桃花源我聞桃花源其先自秦世當時避地人嵗久俱已逝其後長子孫生理還不廢種桃以自營結茅以自憩有兒但發蒙初不工六藝有田但收禾了不輸二稅有雞只晨號有犬不夜吠淵明愛其真為此成新製我久聞其風褰裳思一詣所慮路難通仍恐水難厲夢寐不能忘抱恨知幾嵗所恨天見私于此施嘉惠貽我萬株桃漫山迷眼界却勝武陵溪草樹相蒙蔽相去復不逺只在吾廬外人號小桃源景物適相契
