body:
  text: 湖山集巻六宋吳芾撰七言律詩二十八日出郊勸農陳澤民見示佳作因次來韻雨多晴少恐妨農相勸欣逢日出東烟藹已收霄漢外江山如在畫圖中相看且喜頭俱白一醉休辭頰暫紅萬事要從勤苦得莫言豐歉在天公同日和黄繁昌韻乘閒聊復出城遊所喜相從盡勝流已對江山銷客恨更添花卉解人愁須知世事渾如夢還念人生盡若浮君若更辭花下醉問君能有幾春秋同日登青山偶作公餘不憚陟崔嵬三到謝公池上來下視衆山俱培塿俯窺塵世盡氛埃松生清籟醒人耳花褪殘紅墮酒杯喜與諸君同勝賞莫辭一醉少徘徊和李相之勸農憂民無語對東君一雨霶􅑛慰望雲宣化但期施實惠勸耕寧復事虛文已看野老扶藜去應有幽人植杖耘千里農桑知帝力自慙濫把竹符分送任漕聖主方將大有為有如二老盍來歸不應飛輓留江表且使澄清向日畿四海英豪從古少一時耆舊似君稀相將穏入修門去直上雲霄拱太微送魯漕四首髙人本愛水雲鄉攬轡登車未免忙連嵗已陪徐孺子今年更訪賀知章近家上塚情何限尋壑經丘興更長秖恐便歸清禁去稽山未必得徜徉聚散無期自古來偶然相值且徘徊百年能得幾回醉三世肯辭平等杯晚嵗誰如君激烈髙情應念我衰頹亦知分袂無多日懐抱何妨更盡開自别頻驚嵗月遷又來此地奉周旋雖欣同㑹成三老却恨相從未一年君已促装行詣闕我方投紱欲歸田須知出處從今異一醉休辭拍酒船不貪燕寢日凝香秖要歸休深處藏大火已流秋尚暑商飈微動夜初凉身縻官事老不止心著家山夢更長頗羡浙東新使者如今衣錦更還鄉送黄仲秉舎人赴湖南漕巧偽由來苦亂真獨持正論竦簪紳身心贏得為君子學術寧將殺世人已向廷中伸此道更來湖外濟斯民愿言恢作經綸業㑹有功名遇合辰人字一聨用席上談溫公及劉髙尚之語魯漕按行諸郡以所得江山之秀形之篇章燦然成軸出以相示卒卒未能盡和且作數語以報來辱十分秋色滿江天凖擬遊觀快目前愧我把麾成束縛羡君攬轡得盤旋平時已富瓊瑶什行處還多錦繡篇何計獲陪軺傳去肯將吟筆寫山川前日小詩併呈魯漕華髪蕭蕭我與君未能免俗尚馳奔相看已是成三老得暇何妨共一樽我欲丐閒歸故里君行趣召入修門亦知聚首無多日且把交情更細論和魯漕節中見示天時又是一畨新顧我猶為逆旅人詩酒情懐聊自遣山林志愿幾時伸羡君職事有餘暇贈我篇章不厭頻一讀灑然忘鄙吝渾勝笑語得相親陳時中法臺得郡而歸喜而成詩去嵗秋風話别離今秋俄報有歸期自應冠象登三院何遽慿熊把一麾治行佇為千里最才猷已是九重知莫辭小憇留仙隠伴我花前倒玉巵龔漕見示遊山唱和詩巻用其首章和二篇說着登臨喜欲顛正慚拘俗未能前羡君領客同遊去使我聞風亦豁然已歎髙懐能放曠還欣佳句更清圓如今便蠟尋山屐夙駕何須吉日涓塵埃終日滿華顛忽見新詩墮我前溢目衆篇雖傑出驚人逸思獨飄然秀如松檜枝枝老好似珠璣顆顆圓自此得聞清廟瑟懶從灘上聽師涓和任漕開宴值雨正是千花萬卉開一時景物亦佳哉良辰已幸陪龍節盛宴仍容飫豹胎雖喜風光環几席其如烟雨暗池臺明朝天宇應澄霽尚擬尋芳一再來加恩進秩有作慶典施恩及萬方老臣遭遇亦非常頓加多邑慙非稱倍進崇階懼莫當自念生來無此望却憂福過有餘殃病軀莫效循墻避且上天庭控免章寄魯漕四海耆英世共知七旬强健似公稀使星姑暫淹黄髪卿月還須近紫微門外塤箎方合奏庭前蘭玉更相輝人生樂事誰能及莫惜通宵夀斚飛送魏簽平分冬氣恰經旬天應新陽産異人家世舊來推碩學胷襟自許作良臣不應蓮幕淹留久㑹見楓宸㧞擢新但願朱顔長不老穏看他日畫麒麟贈蕭守一代簪紳仰老成天生賢徳佐昇平慶傳八葉源流逺氣禀三秋表裏清蚤戴豸冠居憲府旋持荷槖直承明秖今名徳如公少寧久淹留海上城天界仁賢鎮一方坐令歉嵗作豐穰盡鋤海上鯨鯢跡頓肅庭中鴈鶩行萬室共知歌邵杜千年重喜見龔黄修齡已逐隂功長不待邦人獻夀觴贈許守天賦竒才屬意深一時人望冠儒林文章世有中和氣政術家傳清白箴屏翰豈能淹大手江山聊助發髙吟寒梅已有調羮意夀斚何妨且滿斟送謝子肅之官吾鄉人物苦彫零賴子傳家有典刑仕宦方期行古道姓名早已達天庭致君事業須先辦渉世風霜要飽經終不負丞寧久屈㑹看感遇際千齡送江朝宗之官芳草連天柳拂堤憐君俛首去勾稽賦成梁苑方同樂唱徹陽關遽解携指日鵾鵬當直上待時鸞鳯且卑棲若逢訪戴人乘興莫惜相隨泛剡溪送王若夫造朝要路如公今著鞭况逢聖主正需賢長貧豈謂連三世不調那知又十年道在未應終困躓時來看取即騰騫此行㑹有知音者送上通津嵗九遷送孟世功男兒三十未成名肯但區區事筆耕王粲平時希負鼎賈生今日請長纓漫漫海内妖氛暗策策腰間老劍鳴㑹使蒼生重奠枕北山休顧小猿驚潘公舎人義榮當世第一流人也僕頃得金華私竊自喜將獲從公之遊洎至而公已云亡至今以為恨金元鼎出公往還詩帖因即公韻和數句于後姑以少見平生慕用之意云一代名流世許誰獨公皎皎著明暉少攄妙藴聊持橐欲振孤風便拂衣愧我仰髙乖晤對羡君請益探𤣥微今朝刮眼看遺墨更覺平生萬事非送張甥歸上饒悲惱情懐未易除相逢猶未免嗟呼暫停絲竹雖云冷只對江山亦足娛我得退閒為上策汝能勤苦是亨衢欲行千里非難事須作人間汗血駒與鹿郎中思到髙人見一堂經年魂夢鎮飛揚抱痾已恨身無力抝俗還疑路有妨聊寄一樽牽酒興更慿五字惱詩腸巡簷應索梅花笑無計從君醉幾塲王百洪遭旱經火之後赴官荆南作詩勉之莫將外物撓胷中旱魃從他更祝融道業不應緣火盡生涯㑹復值年豐事經盤錯才方見詩到羇窮句始工休歎徒勞淹幕府要君努力振家風李倉子長按行偶成四韻奉呈强把州麾楚水東星軺臨按偶相逢平居已是同閭里嵗晚還來託部封千里江山多契濶一樽風月且從容我將投紱林泉去拭目公歸侍九重長年蹤迹歎西東此地那知得㑹逢老去我將歸梓里時來君合拜芝封故交零落添新塚晚景衰頽减舊容今夕尊前休惜醉回頭千里暮山重逺眺萬壑千巖百尺樓地形髙壓浙東州旁窺照水烟波濶四顧滄溟雪浪浮逺望尚賖秦轍迹懐人還想晉風流凭欄已足消塵慮何必三山汗漫遊和王龜齡待制貢院落成二首扁舟猶記拂洲蘋轉眼年華幾度新愧我今成雙白鬢喜君來駕兩朱輪一時令下從如水千里威行敬若神擬訪舊遊觀盛事一官何苦絆吾身主盟湖學屬何人賴有公來為作新士俗似聞衰也久文塲今見美哉輪挈還舊觀人爭覩賦就新詩筆有神苕霅儒風從此振文翁端恐是前身貢院落成郡庠諸生畢集因作詩以勉之多士如林古豫章不應較藝寓僧房一朝盡闢荆榛地萬礎俄新翰墨塲文筆要同孤塔聳詞源宜與兩湖長㑹看從此飛鳴去九萬鵬程未易量和池州陳教授韻二首人物今誰似此郎合居嚴近贊埀裳未將事業先諸老且把文章變一方今日杏壇風似魯向來鐡硯志如桑㑹看奮迅為時用展盡胸中計策長平時野性愛吟詩一字長慙未得師妙句既容窺格律良辰更喜覿光儀絳帷暫且留三楚丹陛行將命一䕫莫為浮榮求速化功名到底屬男兒和郭教授立春除夜之作二首兒童爭喜嵗時新老去方知感此辰始具杯盤來送臘又簪幡勝去鞭春滿斟蕉葉休辭醉且對桃花痛飲醇况有故人能過我相看嵗晚更情親意廣才髙困謗傷又還客裏換年光驅馳道路風霜苦放蕩江湖日月長縱未致身豋鳳閣也應平歩入鵷行胡為尚鬱騫騰志無地棲遲寄寺廊和許守韻臺閣如公盍見收尚淹外補為民憂身為郡國三年計心在江湖萬里秋乘興舉杯還對月得閒搜句或臨流平生恨不逢名士豈謂年來遂此謀和詹守二首一日相逢喜有餘對談勝讀十年書歡聲已溢枌榆社和氣還蒸蓬蓽居敢道髙標攀靖節或疑勝致到華胥願言莫惜留連醉看我東臯帶雨鋤特迂千騎訪柴門多謝清朝皂盖臣肯為衰翁留竟日頓令寒谷暖生春論心便覺塵襟豁刮目仍觀妙句新轉盻又還成逺别相思後夜定傷神和許守野亭登眺夫君自合代王言暫寓空齋八九椽盡日清談揮麈尾閉門危坐爇龍涎詩囊遣興隨時賦茗椀祛魔對客煎看即除書催入覲得閒登眺且欣然送許守慣分符竹理疲民來住賢星又兩春語到江山端有助化行風俗自還淳我知既去思何武人歎無從借冦恂别酒徑須􅂸一醉他時良㑹恐無因千里歡謡處處同使君遺愛信無窮不容昬墊為民患解轉凶荒作嵗豐治行好書循吏傳清聲無愧古人風九重想已知名久看即黄麻出禁中和梁次張得酒之作在處人爭饋五漿風標端是紫微郎已能遣興追工部更欲消憂對杜康闡教暫煩臨泮水趨朝行見裛天香老夫素乏驚人句徒歎辭鋒未易當次張近見示盛著其間制詞甚多故有紫微郎之句十五夜與朝宗對月把酒朝宗屢懐歸因賦二首人閒無處避炎光賴有湖山六月凉清夜已欣天似水長空還愛月如霜我將乘興􅂸沉醉君苦懐歸有底忙試問今宵能飲否更來月下對胡床霧捲雲收月迸光一時煩濁變清凉怪來座上深無暑疑是山間已有霜老去豈期身尚健閒中且以酒為忙故人若也堅辭醉忍負良宵月滿床登南樓二首人身安用惹閒愁得暇何妨且少休睡起徑須烹北苑興來聊復上南樓公庭漸覺日無事田里仍逢嵗有秋滿目江山還可樂歸心已動不容留新敞南樓百尺雄一溪遥跨兩長虹青山疊疊登臨外碧瓦鱗鱗指顧中倦客自憐如倦翼歸心長是逐歸鴻凭髙幸與賔僚共酒盞何妨為我空凌歊臺六首莫辭千騎小徘徊共上凌歊百尺臺過雨江山新似洗連天草樹翠成堆搜羅好景歸詩句斷送閒愁付酒杯對此願公􅂸一醉相逢能得幾回來萬里清光絶㸃塵别來經嵗鎮如新恨居平地去天逺喜上髙臺與月親正好賞心􅂸酩酊不堪懐古倍酸辛向來登此知何限傳到如今有幾人簿書終日困拘攣每到凌歊意豁然千里日光斜照水一川草色逺連天青山頂上元暉宅采石江頭太白船俱在目中渾可樂何妨時復一揚鞭黄山髙處敞層臺伊昔規模想壯哉江上依然雙闕在日邊不見六龍來落花啼鳥空遺恨翠竹青松且謾栽先是老懐多感慨毎來弔古一興哀百尺臺前萬頃寛風烟縹緲隔塵寰天浮江水兼湖水雲抹淮山與楚山景物宛如圖畫裏星河秖在户庭間登臨莫作悲秋意且對黄花一解顔宋武當年迹已陳荒臺寂寞幾經春一畨棟宇從頭葺四面軒窓入眼新陡覺江山増氣象更添風月愈精神老夫無處逃炎暑領客時來一㟁巾江月臺秋來江月十分明臺上凉生氣倍清正好醉吟時自適若為衰病日相縈苦無佳况人空老數盡殘更夢不成料想賔僚應笑我鬢絲如此尚含情陪梁大諫察院同登蔣山山如屏嶂阜如鐘中有巍巍古梵宮六代興王俱掃跡一僧遺塔尚摩空萬松雪類長波掛八水源從異域通家在天台最深處見山還憶故山中過吳江題臞庵壯嵗經行今白頭未容歸老復來遊人如化鶴雲間去橋似埀虹天際浮風月一川無限興烟波萬頃不勝愁三賢髙躅何難繼猶抗塵容秖自羞遊臞庵松江橋畔闞名園一别重遊二十年種徳堂前松菊茂浮天閣下水雲連同來朋舊今誰在獨去情懐秖自憐若許拂衣從此逝不妨長泛釣魚船過吳門登簡孚堂有感三十年前此宦遊經從偶得駐扁舟回頭嵗月如駒隙到眼風烟獨虎丘無復故人論舊事却因陳迹惹新愁此生未必能重到且為斯堂更少留遊朱氏園萋萋芳草遍池塘歎惜韶華一半强聞道名園千畝勝來看浪蘂萬枝芳渾疑席上紅裙擁未讓階前綺帳張坐客徑須􅂸痛飲要將一醉答春光自湖上歸遊朱園和李相之韻二首萬頃湖光一鏡開幾人湖上散輪蹄水眀盡倒千巗影沙軟新成百里堤草際已横烟雨艇眼前無復稻粱畦馬侯遺迹依然在顧我無功敢與齊聞道城東有故家海棠初試萬枝花偶來花下燒銀燭還似空中散綺霞園裹髙人全曠達坐中騷客富文華新詩已就驚人句醉墨縱横似亂鴉遊鹿田三洞野性平生酷愛山好山不厭絶躋攀感時又見三春暮乘興聊同一日閒雲出岫時迷古洞鹿耕田處認禪關自憐擾擾塵埃裏眼底欣逢水石環次韻沈漕寄和題碧雲亭之作昔日危亭迹已陳我來聊試運風斤斷垣無復生青草舊觀依然聳碧雲千里江山簷下見一天星斗坐中分他時有客來登覽應記當年老使君和王致君見寄望海亭詩領客閒登木杪亭坐來四面對峥嶸野田散漫髙低緑湖水瀰茫逺近清覽勝喜窮千里目放懐笑引百壺傾酒闌未用忙歸去更看亭前海月明題陳彦山草堂矯首江天正奉懐一緘遥寄百篇來頗聞新築草堂就仍對舊穿花徑開坐上好山長作伴窻前修竹鎮相陪嘉君深得閒中趣千里何時共一杯題養浩軒丈夫窮餓亦陶陶肯使胷襟掛一毫千古功名輸慷慨百年榮辱付酕醄斗間古劍光芒直雪後青松意氣髙安得泊船沽美酒月明相對讀離騷姑溪樓四面樓成已壯觀兹樓仍更出雲間一條溪引五湖水千里江分兩岸山是處風烟俱秀發舊家氣象頓追還公餘幸此同登覽一醉休辭酒量慳和天予孺子亭三首南州髙士務躬行不事王侯秖力耕西嶺已如剛節峻東湖還似古心清正慙老拙非良牧安有仁恩及庶氓若也當年能逐跡他時容或可齊名東漢諸公孰最賢南州髙士獨推先蒲輪徒枉當年聘塵榻從教盡日懸吾道固應天未喪此時爭奈木將顛栖栖爾輩成何事那似清風萬古傳我來湖上訪前賢正值清秋欲暮天十頃敗荷欹淺水千章古木鎻寒烟遍尋陳迹俱亡矣獨立幽亭秖黯然清徳照人増我愧暮年獨未返林泉黄超然參議和拙者去郡十五絶又以詩見寄屬痰眩未能一一次韻且和二篇以謝三復詩翁白雪篇渇塵俄得醉心泉髙人固已追摩詰好句還應壓玉川快似凉風來木末清如皓月出雲邊呼兒好為藏巾笥莫許閒人取次傳向來從宦鄭公鄉每遇清遊坐有光江上凭欄天一色湖邊艤棹木千章眼前景物俱堪賦心著家山獨未忘歸到小西湖更好觀魚何必逺如棠陪任漕胡倉登滕王閣秋屏列岫滕閣秋屛已快哉更登列岫少徘徊溶溶一水簷前去隠隠千帆坐上來每恨長年成契濶頗欣今日得追陪能并四樂由來少且對江山舉一杯登列岫此邦已是富烟光那更斯亭冠此邦正向坐中窺列岫恰從簷下瞰長江閒穿松徑雲生屧宴坐蒲團月滿窻想得山人應笑我老來强擁碧油幢滕王閣三首昔日驕王鎮此州特營髙閣瞰清流一時傑出稱雄觀千古爭傳作勝遊徧覧遺蹤容可想回思徃事却堪羞時人漫說朱簾雨空惹騷人拄笏愁髙閣秋登第一回頓令心目豁然開山騰翠靄浮空去水引清風入座來九夏炎光今已矣一時佳興更悠哉和君妙句如氷雪想見胷中絶㸃埃向來髙閣久成空今日雕欄勢尚雄觸影自憐人已老題詩還愧我非工江山滿目長悲古尊俎開懐幸對公莫惜躊躇連日醉此回别後幾時同賀梁氏書樓初成于門髙處許誰同傑閣新成氣象雄輝映萬家増壯觀崢嶸百尺聳層空一天風月登臨後千里溪山指顧中此地舊多仙窟宅對君疑是老仙翁城上初作新亭猶未名也邦人鬨然稱為三槐殊不知所從來揣其意必以亭下有槐一根三幹挺然秀出故有是號然非所宜言也余恐不知者謂出自我作數語以解之我心秖是憶天台欲去無從首重回若得此時追五柳絶勝他日面三槐年年白髪催人老夜夜青山入夢來縱有萬鍾非我事何如且覆掌中杯一作慙愧邦人言過矣衰翁百念久如灰再題周處士山居山鏁烟蘿自古青更臨絶頂敞簷楹前瞻江氣連雲起回顧湖光照日明坐久已驚毛骨爽歸來猶覺夢魂清從今便擬休官去夢伴幽人度此生閒驅小隊出城闉春色三分已二分到處有花渾灼灼望中無木不欣欣故池尚想元暉宅荒草空悲太白墳滿目青山誰是主獨輸髙士卧烟雲和李子儀到山居接得新詩喜有餘詩中字字說山居固知還舎方為樂亦悟浮名總是虚無計林間閒放鶴何時湖上靜觀魚我心萬事都無累秖欠歸來得自如和董伯玉讀當塗小集昔時乘障楚江邊信筆題詩度嵗年豈敢嘲風仍詠月秖思問舎與求田歸心雖似陶元亮句法寜窺孟浩然多謝君詩過褒拂愈令慙汗出如泉和方叔載讀小集江城留滯兩經年强把詩篇擬昔賢豈有髙歌翻白雪秖慿短句問青天優人獻伎徒供笑醜婦添装豈解妍君欲學詩須學古不應讀此向窻前前日小集梅花猶在乘興移其下杯行樂甚是夕風微月朗花飛入座者紛紛如雪待制曽丈有四并之歎謂不可無作屢屬唱之因成拙句老去逢春倍感時興來聊復對芳菲月明更覺花枝好風動還驚雪片飛一笑休辭今夕醉四并須信古來稀乘閒莫惜頻相遇要共擕壺上翠微五月五日領客泛舟要同佳客濯清泉却下危樓上畫船拭目已看雲際月洗心還愛水中天更無暑氣侵尊爼但有薰風入管絃我欲就閒行作别且􅂸一醉共陶然待史志道不至欲覿英標慰此懐既推印綬尚裴回心馳巖壑吾將老目斷雲霄君不來清夜漫勞蝴蝶夢重陽已負菊花杯儻能諒此拳拳意勝似心顔相對開王瞻叔參政寄惠雲笈經因成四韻奉酬老來猶未返林泉終日區區亦可憐擬扣𤣥關求至道喜披雲笈探真筌他時使我離塵境今日由君結妙縁莫謂骨凡難變化丹成雞犬尚升僊懐梁丈陳丈不見髙標動浹旬寸心如渇欲生塵春深漸覺梅花老風暖還驚栁色新對景想題詩句滿開懐應把酒杯頻扁舟前後空相望安得從容笑語親㑹使帥郭侯燕扵采石髙牙大纛拂層雲樽酒相逢楚水濵千里江山俱入眼一天風月解留人横吹玉笛漁船晚醉擁金釵綺席春此地謫仙歸去後誰知今日興尤新再用前韻堅使帥凌歊之約喜對東風翫朶雲按行知已遍淮濵論心我正懐良晤乘興公應繼昔人采石江頭天欲霽凌歊臺上物長春從容儻許留牙纛看取姑溪嵗事新送黄作霖有志男兒走四方憐君羇旅嵗時長數千里外干微禄三十年餘返故鄉老著青衫唯可恨光生白屋亦非常時來㑹有摶風便莫道途窮便感傷耿曼老自去秋起歸興以被㫖捄荒方有行色來告别傷成數語送之去秋已作送君詩豈意淹留復許時端為九重憂嵗歉故令六轡緩歸期萬人全活俱安業二麥收成足療飢此事一歸君妙畫隂功當自有天知送陳澤民赴銅陵簿鄉閭人物久凋零輩行如君却老成自合懐鉛居册府若為棲棘向江城簿書且作三年計事業當為萬里程林下閒人如未冺尚期拭目看飛鳴送江簿歸括蒼羇懐索寞苦難禁賴有良朋與盍簮同志自憐今日少知心誰復似君深哦詩喜得江天句把酒愁分嵗暮襟莫戀故山乖素約春來凖擬共登臨和髙簿不憚馳驅半驛間勸耕聊復到禪關耳根暗㵼潺潺水眼界横陳疊疊山已喜新來春事好還嗟老去世塗艱洪崖幸爾心相契此後何妨數往還家家門外與墻頭疊足排肩看我遊出郭不應秖獨樂勞農端欲與同憂偶逢佳處寧空過縱迫歸時亦暫留慚愧髙軒逺相過聊持杯酒當茶甌送汪樞帥福唐試數中興社稷臣獨公名徳冠簪紳合依衮繡歸雙闕却擁旌幢帥七閩帝欲十連均雨露人思四海静風塵㑹須展盡經綸手總把安危佩一身送王舎人彦正奉祠東歸去年趨召偶同時每喜蒹葭玉樹依偉論崢嶸從古少髙懐恬退似君稀身遊紫禁方持橐心著青山便拂衣顧我滯留徒有愧扁舟何日送東歸送方務徳侍郎得請東歸三抗封章未得歸故山歸夢每飛馳羡君却向林泉去愧我猶為印綬縻忙裏光隂能自惜静中氣味許誰知秖疑天靳清閒福丹詔還催上赤墀送人出使天心軫念國西陲妙選廷臣下赤墀要布寛仁慰彫瘵用資根本濟艱危九重眷遇風雲㑹萬里威名草木知此去願羅天下士歸來共立太平基驛騎駸駸犯露霜定知遐俗喜生光千官弩矢迎郊外百姓壺漿夾道旁要使逺謀安井邑盡令諸將守封疆更將餘力籌邊策歸日收功坐廟堂和閭丘莘叟此時狂敵合灰飛致我天王下紫微士馬生風増銳氣旌旗蔽日耀皇威愧無一策禆黄屋濫逐千官扈赭衣智畧如君宜有用周行指日看來歸送王仲矜赴興元倅有志男兒自不同出門慷慨氣如虹逺謀尚欲安天下小試何妨佐漢中此地從來為重鎮乃翁還更有遺風一行莫起徒勞歎看即人歌别駕功和嚴倅覔碧香不勞齋戒絶羶葷聞已濳通妙衆門此道能明從古少今朝正要與君論十年未免憂茅塞一詣終期破棗昏縱有香醪堪寄逺何如相對倒清樽和鮑倅彯纓誰不是王臣抗志如今有幾人墜典固嘗深探討頺綱猶未許彌綸擬歸舊隠消殘臘旋買新田作好春聖主搜揚方側席不應無術濟生民參軍已去作飛仙俊逸聲名久不傳千古家風期爾振一時句法許誰先心惟酷好佳山水手不停披舊簡編想得錦囊應是富來年知有幾千篇人生出處苦難全老矣安能了世緣聊向此時看捉月敢希他日上凌烟行吟雖愧無新語坐食猶欣有故㕓若得放歸多種秫不憂長欠酒家錢勸農題巖寺西山千仞鬱崔嵬寺在山椒勝處開暇日久思乘興去中春始為勸耕來屋頭水色青如染簷外嵐光翠作堆幽賞未窮天已暮驅車欲去更徘徊開河畢功喜而有作汚河積水困薰蒸開鑿那知不日成野水盡從簷下過客舟還傍市中行江山自昔天然秀人物從今分外清本為此邦開眼目老夫雙目亦增明和十五姪見寄草廬髙卧幾經春被褐深藏席上珍已自閉門甘澹泊不妨琢句自清新我慙老去同流俗日念歸來作野人此後塤箎酬唱罷因風見寄莫辭頻和十五姪韻無補公家秖主臣但思髙卧故山雲宦遊耻蠧太倉粟歸去貪羮碧澗芹喜得醇醪堪飲客還驚妙句更超羣速來共為梅花醉趂取枝頭香正芬和四二姪用林道叟見寄字韻華髪蕭蕭日夜踈奔馳不止欲何如得抛印綬心方適歸見湖山氣始舒世事轉頭如蝶夢人生到此似蘧廬我今已作終焉計却悔當年赴鶴書元夕有感當塗連嵗看燒燈又見洪都爛滿城紫陌人疑春欲曉清宵天放月争明老逢好景知能幾暗數流年秖自驚亦擬尊前成一笑吾衰無復舊心情元夕用胡經仲所寄韻呈辛倅及諸僚友星斗濳移下九天滿城如畫酒如泉當時行樂陪千騎今日重來恰十年燈燭光中春更好綺羅叢裏月争妍諸君莫惜長鯨量要向尊前中聖賢和澤民送春我家隨分有園池正願春遲春又歸風掃花枝猶隱約日烘雲影漸熹微客來但欲􅂸同醉事往何須歎昨非自念生平魚鳥性又思川泳與雲飛不堪嵗嵗送青春消黯渾如失所親短句吟成猶恨别青罇買盡不辭貧興來直欲遊三島老去何由駐二輪賴有君能知我意肯來同作送春人又和金克家送春春來縱使日銜杯老去逢春能幾回幸有良朋同雅集不妨爛醉罄餘罍羞看落絮愁盈抱强把殘花淚滿腮惆悵又為經嵗别莫辭花下少徘徊
