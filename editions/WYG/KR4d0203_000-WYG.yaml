body:
  text: 提要湖山集十巻别集類三宋臣等謹案湖山集十巻宋吳芾撰芾字明可自號湖山居士台州仙居人紹興二年進士官至禮部侍郎歴知数郡以龍圖閣直學士致仕亊蹟具宋史本傳芾為祕書正字時以不附秦檜劾罷後金師臨江芾建言有進無退請髙宗駐蹕建康以繫中原之望其領郡亦多恵政盖非徒以文藝擅長者然其詩才甚富徃徃瀾翻泉湧出竒無窮雖間或失之流易要異乎麤率頹唐如輓元師宗澤諸篇尤排奡縱横自成一格據集中自述芾生甲申嵗當崇寜三年建炎初尚未及三十而筆力已挺健如此其後退閒者十有餘年年㡬八十乃漸趨平淡和陶諸詩當作於其時亦殊見閒適清曠之致集中有寄朱元晦一詩曰夫子於此道妙處固已臻尚欲傳後學使聞所不聞顧我景慕乆願見亦良勤是其末年亦頗欲附託於講學然其詩吐屬髙雅䆒非有韻語錄之比也周必大集有芾湖山集序稱集二十五巻長短句三巻别集一巻奏議八巻和陶詩三巻附錄三巻當塗小集八巻本傳又稱表奏五巻詩文三十巻所載巻目殊牴牾不合原本亡佚無從核定今據永樂大典散見各韻者采輯編訂釐為十巻以和陶詩并入而仍取必大原序冠之史稱芾為文豪健峻整是其雜著亦必可觀惜永樂大典中已經闕佚僅得表一首序一首附之末巻以畧存其概云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序才氣可以任事而以學術本之未有不為名臣者也龍圖閣直學士天台吴康肅公以進士起家受知髙廟爰及孝宗在内為御史歴吏戸禮刑少常伯給事中又嘗典治内史在外則五為帥守處劇繁以平易其才氣何待言至于履正奉公仁民愛物如嗜飲食發為詩文身簮紱而心丘壑此則學術之力也其子嘉興太守洪裒公遺文號湖山集二十五巻長短句三巻别集一巻奏議八巻逺來謁序予與公同朝久知公熟公雖志在功名而議論専以恤民為主復躬行之自非才氣學術兩皆有餘何以臻此當乾道庚寅公帥豫章胡忠簡公邦衡以泉守予以閩憲俱入奏事過焉燕集欵甚將别各為二詞以送備載集中自是力請奉祠繼以掛冠享林下之樂者十有六年其詩詞益多意逺而辭達使人讀之蕭然有出塵之想予嘗評公侍從如嚴徐弹壓如趙張循良如龔黄止足如廣受凡西漢名臣殆可兼之然尚有一説始紹興甲子六月公以祕書省正字輪對奏江浙昔號粒米狼戾雖歉嵗斗直二百今嵗豐反倍之葢由州縣重征稅監官覬羡賞巡欄利掊取若蠲其筭價自平矣髙宗大喜七月有旨從之仁言之利其溥如此當路忌其直諒是月出倅括蒼予為祕書少監得此事于日厯厥後上用公執法主計豈徒然哉勑局編類紹興寛䘏詔令載之七十一巻之首例曰臣僚奏請當時士大夫固未知出于公今奏議復不載予故特書之以彰髙宗愛民用人之美意且明儒術可富天下之大端云嘉泰三年五月日具位周必大序
