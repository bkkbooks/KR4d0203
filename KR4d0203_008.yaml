body:
  text: 湖山集卷八宋吳芾撰七言律詩志道相見和前韻每憶湖山動老懷今朝始作故鄉回正慚行李匆匆去忽報軺車得得來幸對清談揮玉麈肯辭痛飲倒金杯我歸已遂終焉計何日重逢笑口開李子儀喜津改秩作詩相慶因次韻懶復從人問里評縱今得譽亦虛聲有兒第使傳儒業改秩何期冒寵榮敢望芝蘭如謝氏但親松菊學淵明煩君慰藉來佳句讀罷欣然酒一傾有屋依山復面湖幽棲試問有誰如門前更種千竿竹堂上還堆萬卷書每恨暮年方卜築豈知今日得安居鯉庭况有新桃李莫惜時來長者車歸來到紅梅下有感惜花端擬醉花時不謂花開失素期去日橫枝才蓓蕾歸來滿樹已離披雖知勝賞輸同舍尚愛餘芳繞曲池花亦念豫情不淺更留殘萼索題詩二月望日三七姪移庖於休休堂約四老人為送春之集拙者預一老之數因成八句光隂過眼似奔輪誰保生前夢幻身四老共成三百歲一時已勝萬千人得間對酒須拚醉乘健看花莫厭頻勿謂病多衰已甚尚堪開口送殘春偶苦耳聾衰年已是病雙瞳那更新添兩耳聾山外鐘聲元不到窗前雞唱亦難通便遭謗罵安能纍縱有笙歌也是空每恨肚皮從舊窄而今却做得家翁巢內燕園中鹿俱生子喜而有作倦似淵明懶似嵇歸來聊向此中棲湖山圍繞吾廬靜草樹髙低野望迷燕葺新巢方乳子鹿逰故苑又生麛眼前景物俱堪賦落日何妨一杖藜有感自度吾生不久長老懷猶自愛風光春來扶杖觀花急夏到穿林看筍忙無限故人成鬼録幾多逐客寓他鄉我今幸得身無事剩向湖邊醉幾場和江朝宗韻奉寄休言簿領尚沉迷器業如公豈久稽不見自憐心若失相從還記手同携飛黃正欲馳長坂倦翼方欣返故棲出處不同空悵望何時來過武陵溪陳天豫喜拙者得謝作詩相慶次韻以報來辱一自同簮獬豸冠幾經離合幾悲歡荷君終始於人厚知我疏慵涉世難聞道休官能自適惠然貽問更相寬交逰耐久如君少松柏方能保歲寒再用前韻奉寄向來雖著侍臣冠憂國曽無一日歡正色立朝從古少犯顔論事似君難思賢會見重相得樂聖何妨且自寬回首髙風誰復繼凜然名節照人寒趙默卿用拙者所和樂天七旬詩賦二篇見寄因狀山中之景復成一首以報之買山將近一由旬若比淵明未是貧萬疊峰巒俱入眼四時景物總宜人花開自足供心賞酒熟何妨與客親何日杖藜能過我竹林深處共藏身龔帥以久别寄詩逺惠因次其韻性便野服厭朝裾一意歸休學二疏門外渾無俗士駕案頭惟有道家書勝逰但欲尋蓬島湖中近築一亭目為小瀛洲舊事那能記石渠亦擬冥搜酬絶唱慚將瓦礫報瓊琚天與疏慵一味間許辭畫戟老柴關幾年欲作冥鴻舉今日方隨倦鳥還有水不妨時載月無人誰與共登山相望千里空相憶樽酒何時一破顔再和龔帥所寄契濶經年阻曳裾滿簮華髮愈蕭疏五禽聊作林間戲雙鯉忽傳江上書詩句方慚成間斷交情豈謂益勤渠開緘更誦驚人語恍若相從聽珮琚聞道公庭白晝間更無夜犬吠江關一時戾氣俱銷盡千載淳風頓使還但恐賜環來北闕不容拄笏看西山秖今汲直如公少正賴忠言一犯顔和朱文卿落解後書懷先生英氣欲橫秋唾手功名豈待求共指層霄看展翼誰知平地亦沉舟簀中宰相寧嫌辱胯下將軍未足羞有志會須騰踏去莫將富貴羡王侯清明登白紵山偷得鈴齋半日間喜逢佳節漫追攀扶衰強䇿青藜杖尋勝聊登白紵山逺岫千重雲出沒清溪一帶水回環我來恨未窮遊覽回首孤城落照間謝子肅任崑山丞和余留題舊遊詩復次韻謝之故鄉春好阻同遊誰與花前倒玉舟陳迹未能忘茂苑新詩俄喜寄丹丘開緘已慰三年别展誦還消萬斛愁文行如君今日少藍田寧許久淹留臨湖閣為向巨源郎中題胸襟灑落一塵無晚歲歸來足自娛去國何須懷北地卜居且喜面東湖夕陽影裏山相映古木隂中鳥自呼正好憑欄吟復醉胡為止酒太拘拘拙者得歸子儀喜而作詩見寄因次韻奉祠命下大明宫盡室歡呼笑語同但欲從容全晚節敢言髙尚激貪風醉鄉有約誰陪我詩社無人賴有公從此故山添勝事未饒𢎞景相山中和道叟韻自憐涉世太迂疏豈料今朝得自如老去不知官况好歸來頓覺道心舒湖山深處非凡景松竹隂中有舊廬靜坐忽聞烏鵲喜開門還得故人書澤民因誦樂天欲留年少待富貴富貴不來年少去之句慨然有感遂廣此意作詩相示余以謂人之會遇各自有時年少固不可留而時亦何可待樂天自不應出此語而澤民亦不應為此詩因反其意以和之老去疏慵厭仕途歸來林下學真如不思身外千般事只占人間一味愚但得清尊長對客縱添白髮亦從渠世間達宦多憂畏胸次還能似我無勸君且醉甕頭春休把升沉纍此身自古功名須遇主到頭富貴不由人蟠胸器業元髙世落筆詞章更出塵道在何憂年少去九重前席會相親和李光祖英才端合在星躔不謂淹回閲歲年却向山中親白石更來澗下濯清泉髙情雖似秋雲淡麗句還如蜀錦鮮怪得了無塵俗氣家風元是謫來仙老去深悲寵辱驚歸來胸次渺寰瀛登山臨水隨宜坐問栁尋花信意行境勝已勾詩興動身間還引道心生親知滿眼如君少何不時來共一觥男子升沉自有時莫輕感慨嘆稽遲古來常患才難得道在寧憂世不知會際亨嘉膺晝接且將粗糲療朝飢他年富貴君何慮造物於人豈有私和田伯清見寄可嘆人生有限身終朝長是困囂塵向來每愧為人役今日方能保我真幸有一丘堪避俗何妨百歲作間人更煩妙句相褒借頓覺柴門暖似春落筆摛辭爛有章故應往歲擅文場身登霄漢聲猷著興寄湖山氣味長無計盍簮同把酒尚懷掃地對焚香依然日暮碧雲合相望回頭各一方和楊季恪景疏希白二首二疏髙躅聳簮紳寂寞無人繼後塵一代風流雖已逺千年名德鎮如新幸拋印綬歸空谷得與湖山作好春若較前賢那可並却慚溫詔下嚴宸人譏居士老來迂與世依違總不符雖似子牟懷魏闕却同居易學浮屠鋤荒只欲開三徑適意寧論泛五湖胸次更無塵一點且同髙士詁虛無和胡宗澤見寄湖邊䇿杖步新晴陡覺胸襟萬慮平老去不須防意馬靜中已是息心兵間來緑樹隂中坐懶去紅塵閙裏行賴與故人供一醉不辜今夜月華明故人皮裏貯陽秋愛我身如不繫舟羞向人間為諂首喜來林下作遨頭雖無仙骨能騎鶴尚有聞心可狎鷗乘興惠然時過我一尊相對笑言稠和李光祖二首漏殘休更問銅壺自視平生分已踰每嘆奔馳非得計只知靜退是良圗耽詩况味今雖在愛酒情懷近已無詔比二疏吾豈敢或言出處亦相符天資灑落更瑰竒何患諸公不已知運蹇尚須資汲引時來寧復藉維持家聲况是鈞公裔文采還髙幼婦碑大器成時須在晚如君方壯未為遲和孟世功二首老大疏慵一腐儒長年離索與誰俱杜門有意修黃老開卷無心誦典謨不是穿林尋鶴鹿即來臨水伴龜魚故人今日如君少乘興還能過我無不見風標六歲餘間中應是樂琴書逢辰自合應殊選遁世何妨且隱居已愛新詩如沈謝更聽髙論似嚴徐時來會有騰驤日未許傍人笑問疏和若夫韻二首此身雖縛此心飛脫得東還似解圍鹿鶴向人如贊善林泉見我欲生輝食珍他日終難飽飲水從今亦可肥况與親朋時一醉益知真樂是來歸老夫吟詠本非長僻性年來忽異常唯是平生愛風月致令清夜夢池塘正慚遣興非工部却喜言詩有卜商佳句偶從間裏得片心如到白雲鄉和魯憲見寄二首厭直承明老從臣不將人事撓天真幾年欲作山中相今日得為林下人竹裏醉吟聊遣興水邊宴坐足怡神回思當日遊從地過眼渾如陌上塵向來三老楚江濱一笑相歡氣味真君向越溪持使節我歸台嶺作間人頗思花下酒無算尚記詩成筆有神何日軺車能過我開懷一洗渴心塵和葉先生韻三分春色一分強風雨憂愁莫見妨何幸山城官事少且看溪路野花香絲絲嫩緑埀流水片片飛紅逐去檣一日要須拚一醉百年能醉幾千場杯酒忘懷不計巡少年行樂肯輸人年來性復便疏懶老去誰能浪苦辛春暖園林花放早月長庭院燕來頻物華正爾撩詩思况得詩翁好句新和董伯玉韻野性耽間晝掩扉坐看斜日上書帷不妨挾册從吾好亦學吹竽笑昨癡鬢髮星星行且老胸襟碌碌苦亡竒與君正欲論心事又恐分攜各一涯和人見寄髙義如君舉世無賢關十載會琴書匆匆邊馬來時别鬱鬱亂山深處居天外風塵仍斷絶人間豪傑正蕭疏何時尊酒論文去千里相思寄望舒和金克孝韻天公放我作間人寵辱無緣到我身濁酒興來寧惜醉小園日涉不嫌頻秖知丘壑追元亮敢望京師説子真漸近青春尤可樂有花如錦草如茵和韓子雲見寄二首投紱歸來意適然從今免詠式微篇但令晚歲胸中適安用虛名身後傳顧我只宜乘載月如君端合上凌煙功成或欲尋真去莫惜馭風來揖仙世態無常似暮霞人生難久類春花已堪入谷攜樵斧還好臨湖把釣車對酒未能忘酒伴哦詩尤更憶詩家何由會面論心曲兩地相望天一涯和陳澤民見寄長年擾擾走紅塵今日方還自在身行處湖光侵杖屨坐來山色照衣巾敢希寄傲陶元亮且學躬耕鄭子真猶恐風煙勞顧揖未能終日作間人應喜衰翁得挂冠裁成妙語鼎來頒清如水上看修竹秀似雲中見逺山已播政聲來闕下更傳詩句滿人間秖疑自此飛騰去未許歸來伴我間和朱世同韻聊向空山避世喧數椽茒屋鎖苔錢怕逢俗客慵開户欣慕前賢願執鞭已見二毛真老矣幸存三徑盍終焉細思萬計唯間好敢為浮名誤百年幽棲終日斷經過坐閲殘編眼欲花道在固應甘淡薄心間尤覺厭紛華正慚我老無佳思頗羡君詩似作家拙惡豈能賡妙句臨風吟詠秖咨嗟道義誰人似乃翁有兒如子豈憂窮自應便享千鍾養不謂今猶四壁空好遣江山歸筆下莫將荆棘置胸中詩書儻不辭勤苦衣繡何難繼祖風和葉先生見寄春到山城花木深興來誰與共登臨空驚節物催人老強對芳菲索酒斟已喜筠筒先見寄更聞藜杖欲相尋勸君未用忙歸去要向尊前話寸心和范希孟韻急隱歸來趣轉深靜中不放一塵侵日長宴坐風敲竹夜久澄心月滿林詩句每從佳境得酒杯長為故人斟時危莫用計然䇿身在五湖空鑄金和范遷善見寄溪山深處養清髙名位雖窮節行饒舉世何人堪寂寞杜門終日自逍遙交情已作千金重別恨空驚一葉飄莫向五湖成獨往他年相與到雲霄和金克孝韻長嗟軒冕纍吾身幸得歸來見此君晚出漁樵呼作伴行隨鹿鶴與同羣浮光喜踏山前月弄影貪看水底雲還有江梅通信息一枝暗裏遞清芬和世同見懷君去經春未得還老夫幽恨滿春山海棠花過乖同賞楊柳隂成阻共攀對月有誰陪笑傲臨流惟影伴清間何時䇿杖來過我把酒論文一解顔立春老夫近日苦多屯且喜來朝已立春但得餘殃隨臘去敢圗好事逐年新湖山入眼風光好親舊論心氣味真更若此身無疾疚快哉天地一間人和王瞻叔泉字韻暮年亦復侍甘泉每對青銅只自憐寧忍憂疑探虎穴且將得失付魚筌歸來但欲無身纍老去那能徇世緣若得優遊全晚節從人喚作地行仙和陳天豫見寄真字韻前賢惟有太丘真豈謂於今見後身雖是一時為逐客不妨千古作全人自從别後心如渴却喜詩來句絶塵無計復陪花下醉對花只覺倍傷春和鮑昌朝湖上二首青山疊疊起汀沙幽鳥驚人噪古槎竹葉受風樅甲刃松膏流地蟄龜蛇愛間正喜逢僧話乘興何妨到酒家飲罷相攜磨石壁淋漓醉墨半欹斜一片湖光淨見沙晚來間上釣鯿槎山橫平野堆寒玉水繞孤城綰卧蛇遙認茶煙知禁苑忽聞機杼得人家夕陽歸路西風急笑倩傍人整帽斜湖上遣興間來湖上覔清涼竹杖芒鞋野興長青嶂回環如洞府緑波澄徹似滄浪枝頭落絮隨風急水面浮魚逐餌忙自笑衰翁無箇事悠然身世兩相忘大雨後湖上有感擬為紅蕖棹緑波那知一夜作雱𩃱風狂俄失雲中樹雨漲全無水面荷尋壑勝遊先自減泛湖樂事又多磨老懷自度無間處且向尊前強笑歌九日和向巨源送行韻世事無窮生有涯羞將白髮對黃花一江秋水涵初鴈萬里暮天飛落霞昔日自憐長作客今朝方喜得還家尊前話别寧辭醉後夜相思月滿沙和逐年九日陽字韻天上恩來解郡章人間那復是重陽老身已許歸三徑佳節何妨醉百觴但有笑容生面目更無間事撓心腸旁人不信吾歸去今日真成返故鄉余有重陽詩歲和一篇今日偶和成二首此會從來有故常湖山歲歲做重陽黃花已是鋪三徑緑酒何妨舉百觴小圃晚來堪散步薄田秋入足充腸登臨莫起淒涼嘆且喜成歸老故鄉去歲重陽解郡章歸來又復見重陽此身已作林泉客今日更持萸菊觴正要登髙窮逺目不妨拚醉浣愁腸佳辰若得長無事何必乘雲至帝鄉重陽即席呈諸兄叔淅淅西風作晚涼驚人節物又重陽頻年此會成千里環坐如今共一觴且把黃花開笑口莫因白髮攪愁腸人生聚散渾無定來歲那知在故鄉重陽再和乙丑歲韻老去逢秋倍感傷此生能見幾重陽喜君緑蟻初浮甕容我黃花滿泛觴幸返丘園如素志况陪親舊話中腸已拚今日如泥醉苦恨頻年客異鄉和吳致政韻晚學知誰繼後塵鄉閭舊仰老成人門無車馬何妨靜室有詩書不厭貧閙裏抽身甘寂寞間中覔句鬬清新杖藜莫惜頻過我共醉床頭滿榼春和沈先覺韻枉度浮生八十春休談天數與人倫長貧已是難糊口久病那堪更纍身獨把新詩娛晚景誰將靈劑起痿人若教得酒時時醉醉裏髙吟尚絶塵和朱世同韻二首立朝初不愧廷臣晚節胡為苦乞身自度濟時無逺略不如辭祿作間人林間幸已安禪榻湖上何妨擲釣綸若也故人能過我尚堪共醉甕頭春已歸林下得從容還喜時和與歲豐好景盡歸詩句裏間愁俱付酒杯中臘殘惟願呈三白春去從教落萬紅親舊自今休問位只須喚我作吳公和朱世同見寄門外青山玉作堆山前一水更縈回歸來雖喜風煙好老去還驚歲月催不見故人增寂寞尚懷往日共徘徊何時軒蓋重相過伴我花前醉百杯到雙勝匆匆不及欵舟中成小詩寄良器兼簡楊宰海濱何處足春風盡在王孫小圃中雨洗山光供几席日移花影上簾櫳扁舟回首煙波隔尊酒何時笑語同若對揚雄賞幽勝杯行應亦話衰翁寄江朝宗君來已是後花期不見春風爛熳時檻外止餘新芍藥簷前祇有舊酴醿尚堪共泛忘憂酒亦可同吟遣興詩倒指春歸能幾日速來相就賞殘枝寄周子及回頭一别兩經秋喜奉安輿反故丘自謂此時須見過誰知官事不容留君遊幕府聲猷著我住湖山景趣幽出處雖殊心不異迂程能為一來不寄江朝宗碧雲暮合首重回正擬前村共探梅耐久直須看歲晚追歡何必待春來山中縱有詩千首花下誰同酒一杯顧我與君非面友願言命駕莫徘徊寄陳能之烏府延登謇諤臣共知吾道一時伸方陳讜論來禆國還守清規去潔身峩豸豈能忘去佞憑熊聊復試臨民頗思一見論心曲同醉梅花爛漫春寄陳叔進鄉里衣冠久不振後來猶喜有斯人曽為蓬島神仙主端是儲闈羽翼臣大節已觀能直已小淹何惜且臨民君家幸有佳山水莫向他鄉別卜鄰寄楊次雲岸長老髙僧良士總貪間雖我同庚不往還詩罷誰知勤治圃齋餘無事只潛山亦聞相約來傾蓋久待如何未扣關湖上藕花今正發不妨共戲水雲間寄趙德莊故人分袂幾何年不謂乘軺到海邉我守丘園甘已矣君馳原隰尚依然有懷風月空相憶無計杯觴可共傳出處不齊徒悵望夕陽衰草自連天又陳伯明知郡逺寄詩篇因次韻二首信筆題詩不記篇聊憑賦詠寫林泉間來倚杖雲千嶂睡起憑欄月一川野性已安三徑裏吟魂猶繞兩湖邉何時更許陪清話復把深杯手自傳喜到舊家山水鄉依然山色與湖光此身宛在真仙窟回首空懷太守章豈意新詩猶見及尚言故郡不相忘自憐粃政無遺愛安得人思蔽芾棠寄陳彥邦二首自古中興用實才正資賢哲共圗回若為清禁挽不住亦效衰翁歸去來幸有江水供笑傲更邀風月與徘徊得間莫惜頻相過伴我尊前笑口開不須細細説行藏四十年來夢一場我得放歸心已足君能勇退道尤光間中倍覺林泉好閙裏誰知日月長我已與君成二老更將一節起吾鄉和采石詩韻寄韓無咎野性從來愛水雲合耕巖下釣溪濱宦遊愧負平生志臨按欣逢我輩人奎閣雄文光照日錦囊麗句豔爭春外臺况上三年計一節行看詔墨新寄劉汝一陳天豫昔年言路記同遊回首那知歲月流已嘆數公隨物化却欣二老與余留去天不謂踰三歲補外那知尚一州想得賜環俱在即不應似我老林丘二公見和又成一首寄之憶昔同臺接勝遊相期端不愧清流一時人物存無幾百歲光隂挽不留老去只思陶靖節向來尤嘆薛居州亦聞聚首時傾倒應笑衰翁守故丘和陳澤民即事二首雞聲催曉夢驚殘喜得歸來卧碧巒已是人間三月暮尚餘枕上五更寒心安靖退雖無事身覺衰頽亦鮮歡賴有故人時會面開顔一笑酒杯乾蕭條古寺野僧殘聊與僧俱住翠巒樹影繞簾春晝靜水晶搖屋暮天寒固知書劍不嫌冷却恨杯盤未盡歡當念老人衰已久外雖強健實中乾和逺老韻野性平時酷愛山年來何幸得休官情知軒冕生無益身在林泉死亦安已免出門頻應接尚貪散䇿縱遊觀得師妙語相開發始覺浮華不足看和逺老見懷老去光隂能幾何秖求適意不求多消除舊恨憑三盞斷送餘生付一蓑風月情懷雖已滅漁樵伴侣尚相過師來好趂荷花盛我欲同遊繫棹歌和朱守有待亭使君斂惠撫吾鄉物阜年豐特異常已向湖中同衆樂更來山上發天藏登臨緬想髙懷適賦詠懸知雅興長獨恨杜門方屛縮莫窺佳致望餘光和魯季欽别後寄盍簮經歲遽分襟夜夜相思夢裏尋寄逺正慙無好語開緘忽喜得髙吟感君不替綢繆意使我還銷鄙吝心他日相逢重把酒莫辭蘸甲十分深病起泛舟呈請親友屛迹山間歲月深四圍緑樹總成隂已欣叢竹生湖岸更愛雙蓮出水心倚杖頓驚明老眼艤舟還喜豁煩襟病餘雖是無佳思乘興何妨試一吟山居歸來恰一年有感去歲兹辰始息肩俄然日月已周天經營小隱雖云畢栽種清隂苦未圎湖畔百年多古木山前一望足平川從嗟白髮催吾老能享林泉得幾年再和四首花枝拂眼栁埀肩幸得身間且樂天木杪夕陽當反照草頭朝露豈長圎興來䇿杖雲迷徑睡起憑欄月滿川老矣不堪供世用只將蕭散度殘年歸來深欲斷塵緣常拜青詞密籲天既幸此身無玷辱更欣盡室得團圎捫心只合安三徑度力那能障百川若也天公終見念從今便是再生年卜得幽居野性便山中風月水中天新栽翠竹隂雖薄舊植青松蓋已圎髙致固難追緑野勝遊那復繼斜川我今已得安心法早挂衣冠不待年新買湖頭十畝園緑隂罅裏見青天金櫻相亞枝枝裊銀杏低埀顆顆圎仰看烏鳶翔古木俯窺鷗鷺戲晴川便須臨水營臺榭要與漁樵樂暮年澤民見示遊洞宫護聖二詩次來韻洞府藏真鎖碧巒我來頓覺百憂寬真人已去留遺像古木猶存翳舊壇清入杖藜襟抱豁冷侵衣袂骨毛寒何妨便作誅茒計幸我年來已挂冠山間安有此池塘疑是天分一𣲖江萬仞方如青玉案千章森似碧油幢簷前山色日侵座屋角松聲夜撼窗遊罷擁衾渾不寐心清都把睡魔降和薛丞歸來林下恰年餘喜對青山更面湖野興自來知不淺宦情今日覺全無任從俗目嗤吾老未許山靈誚客逋多謝新詩相慰藉頭風一讀頓然蘇再和少年勤苦惜三餘老去惟思泛五湖已向林間甘淡泊更從塵外學虛無酒徒漸覺隨年減詩債還應隔歲逋強欲冥搜賡絶唱苦無筆力似三蘇送朝京赴福清宰來往看看二十春開懷情話日相親懸車我已安三徑捧檄君俄向七閩肯為浮名隨薄俗但施善政撫疲民他時奏最歸來處好訪湖山莫厭頻生朝有感每恨生朝天一涯今年却喜得還家漸看寒谷回春律愈使衰翁感嵗華客至寧辭傾竹葉老來能醉幾梅花餘生秖願長如此浮利榮名未足誇遣興天憐衰病放還鄉猶恐多情易感傷已遣蛙聲喧鼓吹更令燕語奏絲簧固知老去心情減頗愛間中氣味長終日杜門無一事不妨隱几淨焚香余以庚寅十月十日抵敝廬今恰三年感而有作偶成三律遡自洪都返故園今朝倒指恰三年舉頭但見松筠長轉盼那知歲月遷幸有青山長在眼休嗟白髮已埀顛此身儻未歸黃壤花下猶堪醉聖賢何處風煙似我園且將蕭散樂餘年向來已不憂三黜老去誰能羡九遷門外往還惟白足里中遊舊盡華顛竹林已是幽棲地只恐風流愧七賢幸有湖邊數畝園尚堪行樂度殘年驚魚自合潛淵去倦翼寧思出谷遷既乏仙方能却老又無竒䇿可扶顛但知藏拙安吾分一任人稱賢不賢送沈子夀孤城度日宛如年賴有吾人慰眼前把酒論文方纍月揚鞭别我遽朝天長才合赴風雲會新渥行沾雨露邊帝里故人如見問為言衰悴愈皤然挽袁正言言路同遊記昔年英風凛凛共推賢從容峩豸霜臺上感慨嬰鱗黼扆前持槖自應登禁闥乘軺聊復向江瓀一朝豈料成千古空有清規後代傳挽鄭武子中原耆舊久雕零賴有夫君尚典刑持節有心吞朔騎請纓無路報朝廷壯圗落落嗟難合末俗紛紛笑獨醒坐脫已超塵世去空餘遺像在丹青挽李季文二首世趨捷徑蹈危機公獨安恬度歲時但見謙謙卑自牧不為赫赫急人知政成名已聞丹扆官滿身將上赤墀豈料一朝成奄忽空傳南國去思碑吳郡為僚記少時别來光景迅如飛江頭我始懷章去嶺外君才解組歸正望故人時見過回思往事遽成非死生契闊無窮恨極目髙原淚滿衣挽翟伯壽二首髙情爽氣薄雲天灑落真如晉七賢筆下蟲魚元自得胸中丘壑更依然風流已足追千載壽考胡為不百年人物此時誰得似秖應餘慶尚流傳少日為僚古樂成一時共喜得豪英盍簮便有功名志傾蓋曽無世俗情回想舊遊如昨夢頓成塵迹負平生故人倒指雕零盡矯首佳城淚欲傾挽徐子固相逢一笑記臨安倒指今逾二十年别後每思論舊事朝來忽報啓新阡蒞官凛凛風猶在居里恂恂譽更傳遙想武陵溪上路送車千兩一潸然挽季行可當年闕下久棲遲故里歸來萬事非訪舊幾人成鬼録傷君未老棄親闈開尊尚想延賓醉發廪猶思賑歲飢積慶流芳知未艾會看門户日光輝挽五兄知府二首平生臭味最相投方喜同時得退休正欲從容陪杖屨從兹蕭散老林丘髙標豈料成千古遺愛空嗟滿一州兄弟凋零無復繼故山誰與我同遊三吳意氣各翩翩尚憶俱遊太學年伯氏久驚歸厚夜吾兄逺復掩新阡自憐門户今衰矣回想音容秖泫然猶幸諸兒渾競爽他時當不負家傳挽何內翰二首場屋聲名四海知十年平步上丹墀伏蒲議論髙千古視草文章妙一時雅望自應登輔弼壯圗仍欲濟艱危誰知竟負經綸志空使人懷殄瘁悲老去交遊半淺深髙山流水獨知音分攜苦未經寒暑轉盼那知隔古今聨事尚懷時把酒同朝猶記共論心無因執紼西山路空對東風淚滿襟挽錢省幹髙義由來擅月評壯年鋭志立功名助平逆黨謀先定慢罵凶酋色不驚赤幘蹉跎憐晚景青雲騰踏負平生秖應餘慶鍾蘭玉桂籍傳芳奕世榮挽陳巡檢夫君端是一時豪排難捐軀不憚勞忠義自能全里社姓名那肯辱銓曹一生倜儻心常逸五世團欒壽更髙暝目定知無可憾九原風樹漫悲號挽王之先壯志凌雲氣吐虹才華髙出輩流中讀書不負建樓意好客尚賒投轄風鶚薦共期登虎榜鷁飛無復到蟾宫春來池館渾如舊夢覺黃粱事已空挽應偉節尊人歸來閭里問髙年此日惟公五福全三世儒科身及見四經鄉飲衆推先安時不恨青衫晚適意還欣綵服鮮終始哀榮無可憾想應含笑入黃泉挽孟仲安二首琴劒縱橫迹已陳凛然英氣尚如存向來忠義全鄉社老去詩書付子孫正好林泉窮勝事那知風月負清尊他年隂德留餘慶會見簮紳萃一門義薄雲天氣吐虹平生心事許誰同從容破賊無遺䇿清白傳家有祖風共意騫騰千里外誰知蕭瑟九原中百年已矣餘芳在庭下行看發桂叢挽程朝議二首兵革連年苦亂離江東耆舊日衰微身兼五福如公少眼見重孫自古希未厭案頭翻貝葉方榮堂上戲斑衣東風忽破南柯夢回首音容涕淚揮憶昔安輿到郡時使君歡迓鎮江湄萬人踴躍瞻耆艾千里歌謡美孝慈盛德所鍾門閥在平生無愧鬼神知佳城一閉成千古徒有隂風拂繐幃挽席夫人二首持身禮法動無違四德如君古亦稀大國增封光典册長年獻壽擁庭闈俄驚蒿里飛丹旐尚想萱堂玩綵衣竊意生前猶有恨沙堤不及見公歸猗歟陶母世稱賢生子還持輔佐權政府舊曽迎象服成都重見擁戎旃佳城閉處千車集華屋生來五福全終始衰榮今已矣空餘陳迹載青編
