body:
  text: 湖山集卷二宋吳芾撰五言古詩春雨不止魯漕有二詩因次韻青春能幾何况已過寒食此時對東風一日亦可惜正好倒清尊呼婦戞鳴瑟胡不少自寬兀坐有憂色一春雨已多連日風更力安得補天漏坐待江月白春日固喜雨雨多亦可已若為尚雱𩃱連月煙浪裏江湖更瀰漫不見蒲與葦有時漏日光烘雲薄如紙欲晴又復隂何以慰田里鬱鬱不能舒一坐四五起和陳平仲中秋懷舊逰天末逢秋半臨流玩佳月置酒延孤光夜久凉風發感時歌慨慷醉來翻不恱念人有聚散念月有圎缺萬事轉頭空百年飛鳥瞥粵從罹亂離頭角嗟埀折兀坐山谷間何人定交結素琴已塵埃孤劍尚清刮故人不可見幽懷欲誰說明明自團團憂憂空烈烈忽得陳子詩辭㫖兩竒絶歷歷叙舊逰筆端如有舌何處復相從酒壺行自揭遙想鮑與劉應亦歎胡越要當按酒兵無令冒斧鉞吾儕豈長貧廟堂方簡拔符倅同逰鴈蕩賡其所和范相逰山韻晚學愧淹博微官妨隱盤攀龍榮請事斂板喜承顔懦庸資盼睞簿領洗塵煩南豐茂人傑才望藹江關題輿禆德政鎮俗念時艱仙山尋勝外妙句落人間氣連天柱壯清奪霜空寒一讀三歎息髮立誰敢謾但嗟俊逸才尚滯海之灣中興急賢哲日日聞賜環况復有如公驥足寧久閒㑹須早命駕即日當召還發硎觀利器斷鼇新海寰宣室佇前席顧問應夜䦨寄季元集劔池有逸人過我談名理自謂出囂塵知足更知止髙標拂煙雲雅志在山水既作陶淵明且慕赤松子我方聞緒餘固已生歡喜正欲叩淵源獨恨未暇耳忽云桐柏山此去甚密邇擬一往其間尋真訪遺址不久便可還畢此𤣥妙㫖一去寂無音逢人問行李人言不復來征車已西指反把逰山屐去踏長安市似聞稍留連尚稽歸故里未免傍人門乞憐應忍耻縱使得美官所喪亦多矣嗟哉人學仙如君能有幾𡨕鴻合髙翔不謂事乃爾徒有懶窩名却入旋窩裏始知聽空言未若觀素履意者天愛君要君行處是慮或成沉迷敗道自此始聊復小撓之欲其全暮齒庶發堅固心永無塵念起江行阻風我生走四方足迹亦幾遍初未識江行每起浮家羡一從登此舟舉室盡欣抃既得捨車徒且免入郵傳髙枕卧短篷頓忘行役倦始謂旬日間便可朝行殿縱未許歸田行止亦可判那知事好乖一夜狂風轉怒號動地來波濤立江面如屋復如山拍天仍拍岸三日不能休雲容更千變始疑江神驕出與風伯戰擁起千里潮散作雪飛濺跬步莫能前有纜莫能牽又疑慢爾神至此獲深譴亦自料平生忠信粗表見神既依人行豈不略為援若謂神無私應物當普現胡為泝流船却乃去如箭而我獨滯留艤棹長江畔終日困飄颻使我頭目眩試取蘋藻羞更效潢汙薦再拜祝天公冀為開方便莫問往與來莫問貴與賤風靜波亦平一一如所願庶幾舟中人彼此兩無怨阻風又成數語呈江朝宗平生航浙河不知幾往返豈不或滯留有時容幸免未若此畨來所向輒相反順水即值風便風還阻淺夜來至奔牛一雨成瓴建妻孥笑相看陡覺雙眉展謂可便及城假館少休偃平明風橫生吹我船頭轉咫尺不可前安能逹京輦客路固多艱我行亦太蹇何當歸去來髙卧青山逺一任雨兼風杜門都不管和何倅逰鴈蕩何侯富詞藻能賦兼能詩百篇輩李白十稔嗤左思搜竒抉靈怪造化不能私每為山水遊錦囊隨所之鴈蕩閟神秀鬼物潜司巇開林發幽隱肇自興國時髙巖聳崷崒列岫森瑰竒龍湫神光異龍鼻靈液滋天柱萬仭立氷簾千丈埀羡君沿檄來暇日遂遍窺興隨佳處發景與髙情宜留步欣有得過眼光如遺乘寒躡危磴躋險攀樛枝雅有許詢興心形不知疲我漸動拘俗薄宦方棲遲恨君為此行不獲相追隨平生愛山心自視如調飢尋幽儻有路初不問險夷幾欲老山間便將雲衲披頃幸官是邑柴車日載馳列賢不暫捨游燕必于斯每欲狀竒怪苦乏幼婦詞千巖與萬壑胸中徒自知别來嵗月久况復逢艱危兹雖值平時老大無所施今觀君所賦妙境俱在兹慨然想雲壑應不謂我欺㑹當尋舊逰重與同襟期丁亥守當塗中夏有獻瑞麥者今日池中復得雙頭蓮因成小詩以記之嗟我百無能此身仍老矣濫此把一麾何以慰千里隴麥秀兩岐池蓮綻雙蘂斯事雖偶然亦為邦人喜和許守巖桂桂華燦秋杪造物氣所鍾清香遍十里不與凡卉同使君雅好客携酒臨芳叢被花惱不徹一笑髙堂烘花本生月窟何事來樊籠疑是姮娥懶睡起鬢蓬鬆一枝欲斜插誤落秋山中要須排日賞拚取百尊空莫待花零落惆悵隨西風和任司理賞梅平生愛梅花嘗有花前諾花亦知我心臭味頗相若對花輒痛飲席天地為幕常恐風雨摧有負東君託一從隨宦牒但知䆒民瘼動為官拘守進退非綽綽倒指三十年無復有此樂每逢春信回長憶花下酌老來把一麾亦欲強有作牒訟日裝懷朱墨苦紛錯忽聞花已開枝頭閙寒爵喜即領賔僚對花話離索邂逅却成歡清談間諧謔勝賞雖未窮亦足慰寥落後夜霜月明尚可理前約和許守水晶蒲萄珍果孰稱最靜中試旁搜白奈非時至赤梨經嵗留廬山杏萬株武陵橘千頭未若蒲萄美甘滑仍脆柔正當三伏暑滿架走青虬繁子何磊落一一如綴旒我家得異種潔白映林丘每笑棗與栗濫比千户侯邇來事奔走頗恨拋鉏耰持此贈夫子因復獻鄙謀他年堆馬乳豈但供薦羞願以釀千斛永言資燕遊客來彌日醉應不數青州門外池內荷生雙葉今朝池內荷一柄生雙葉傍人為我言喜事尚重疊我老皆無用榮望久已絶偶有二婦妊行將臨誕月所願生二孫綿綿傳世業寄題楊宰清畏軒古人貴慎獨舉世知者希末俗事誇耀常患不我知楊子有雅尚傳家守清規折腰三十載不辭州縣卑猶慮與衆異憂讒還畏譏開軒揭華榜却恐非其宜要當且用晦處靜藏天機昔賢忌獨清此語非吾欺題碧雲亭纍土創新亭本擬還舊觀或言舊亭庳視此才及半我方安朴拙豈敢事輪奐言念夢幻身終日困几案既未許自如超然脫羈絆亦欲對江山時發一笑粲自從得新亭頓覺百憂散亭前栁色新亭下荷花亂明月可坐邀積雪堪俯玩憑欄送飛鴻千里歸一盼詩成似有神酒行欲無算取次亦足樂胡為尚興嘆恨吾年已衰志在不逰宦何當歸去來終老湖山畔次韻沈漕使寄和碧雲亭之作衰年厭塵勞久念作淨觀奉祠還故山閲嵗更過半草草結茅廬雖無輪與奐水作緑羅衣山為青玉案自足了餘生豈謂浮名絆牽從江上來去國同王粲既與猿鶴踈還驚鷗鷺散公餘坐危亭四顧雲影亂新詩忽鼎來纍日飽吟玩洗我胸中塵宛如覩清盼信知隱侯家句法有成算方今苦乏材當饋屢興嘆如公人物英寧久從逺宦㑹見御追風起自長淮畔寄題鮑昌朝足軒江南有散人幾年卧草野破甑餘塵埃衡門絶車馬倘非義所安一介不取捨闢軒窮巷間此意非滿假雖云外不足中有至足者道義輩古人文章播天下一㸃浩然氣萬象資陶冶持此復何求酣歌對盞斚吁哉簞瓢樂千古一回也先生于此時卓然秉大雅顧我愧髙風亦忝詩酒社何當登此軒抵掌共披寫題生春亭府治何逼仄幾不容缺伸我來撤敗屋池館為一新便有鳥喚客更多花惱人誰知牢落地一旦遽生春題涵碧亭幾年涵碧亭吾亦屢來往當暑既難逃斯亭尤可賞清照心膽寒凉侵毛骨爽我方困長塗且此休塵鞅登遐觀亭城上闢新亭似若規模小誰知此亭中景勝冠江表湖山既回旋煙雲仍縹眇萬象森目前不數花與草公餘乘興來聊以散懷抱四時風物新一一發天巧芳春桞色連長夏荷花繞月明固已佳雪積還更好憑欄認歸舟䇿杖送飛鳥適意豈在大容膝自足了苐我思故山上章方告老指日是行人頗恨來不早寄隱者守道宋髙士築室齊東鄙植竹看嵗寒種田助形委束書捐古今抱易究生死不以外移內不以行責止九十留童顔湖山飽清視或顧先生云時平可以起先生本無求棄置如敝屣俄聞與物化精一未嘗毁汗簡書逸民義風洗貪士東望呈肺肝遙㵼一巵水和陳國佐亦愛堂韻紛紛當世士盡道休官去有墮塵網中誰能復回顧重為軒冕惑一念遂差互要當發深省悟此形皆寓奔馳徒擾擾靜中有竒趣夫子廊廟材華途昔榮遇富貴方迫逐脫身一何遽蓋恐負初心或為名所誤獨尋陶淵明三徑歸來處親朋續舊逰寢食安故步詩成月滿窗坐久塵生屨箇中有真樂自足慰遲暮我方困長途因公識歸路讀公寄傲篇更覺忘世慮有如逃空虛傾耳聽韶頀念此有限身嵗月空復度他如願卜築結茅相近住如公邁往姿平生已心慕我雖負俗纍胸中無好句儻獲從後塵登髙亦能賦夏日同官㑹飲白鶴寺雙瀑亭李道濟作詩紀事因次其韻嗟豫好泉石所至窮幽勝年來墮塵埃復苦炎熱盛賴有古招提相去不步仭何時供燕逰庶以息喧競山僧結虛亭瀟灑淨如鏡雙瀑從天來景物更幽逈欄楯溢波光清凉殊可憑復幸僚友賢雅與山川稱得暇傾尊罍相從盡豪俊令尹如子文去就亡喜愠二邑不負丞所蓄金玉潤耿侯固坦夷趙子亦純正盍簮已足樂况復有名醖酒酣人意適坐久天宇靜踏月各言歸清風逺相趂君詩繼踵來敏捷過于瞬中復含妙理不獨寫幽興讀罷愈驚人癡坐不知瞑援筆強續貂安能繼髙詠和王夷仲詠施粥伊昔豈無旱赫日流金石伊昔豈無水巨浸連天白未若去嵗風飄忽幾終夕時方屬新秋稻子半黃赤倐然卷地來一掃不遺力但覺田畝空不見倉箱積餘禍及吾民來春有飢色巡門粥妻子不足充貴糴往往成流離有家歸不得我方還里閭正值此艱厄有心懷拯救不寐欲通昔念無捐廪人此意空憤激民饑猶已饑吾寧忍獨食作糜倒瓶粟恨不及九百紏合族與鄰樂從有吾叔豈但一時利永作他年額要令里中人自此長飽德雖或有凶年不復更他適鄭罕與宋樂未足為匹敵施厚報必豐㑹須看他日再和嗟我性拙踈平生好泉石好景與良辰風清并月白必對佳友朋一尊陶永夕雅志在輕肥每笑公西赤嵗晚效一官粗竭區區力所得僅牛毛罪戾如山積與其鎮營營終朝有憂色孰若歸去來日作太倉糴雖然食不充野性還自得况復二老人年來多病厄杜門奉㫖甘此意自平昔端欲務寬閒初非為矯激他日㑹稽歸斯言終不食人誰諒此心交逰謾千百獨幸王夫子相知如鮑叔憐我氣早衰短髮僅覆額信我非作僞有意在作德餘生能幾何捨此將安適世路多風波談間起讐敵且復倒壺觴樂此承平日有感隂陽失調燮嵗事成大饑我聞江湖間細民競流離療饑已無食卒嵗還無衣民窮聚為盜自古誠有之不謂嚴冬日宛如暮春時里閭疫癘起災迍逮嬰兒今已嵗殘臘不見雪片飛中夜不能寐念此方涕洟上天復赫怒雷聲震四維驟雨相繼作奔電仍交馳連夕不能止逺近俱憂疑我心更驚愕倍畏天之威炷香拜庭下再三為民祈願天正時令順行無逆施反雷變作雪盈尺以為期庶幾宇宙內物物各得宜和王澧州喜雨田父苦亢旱傷心涕泗沱使君憫斯民雩禜亦何多古廟舞羣巫袂屬肩相摩密雲自西郊奈汝旱魃何天官感精誠霹靂加譴訶遂協畢星好一洗吾民疴頓覺田畝間歡然聲氣和人生一飽足寧復憂其他要當及豐年對酒仍髙歌秖愁偃鼠腹未醉顔已酡和林大任上許守喜雨退之訟風伯風伯罪固彰未若旱魃甚千里塵沙黃我欲持斧鉞尸諸古道傍此志竟未就展轉成悲凉使君有妙術在德非馨香神龍不敢卧感㑹趍靈場霈然下甘雨天地森開張旱魃不待誅一旦自摧藏機簡堂余里人也在方外三十年未識其面乾道己丑余帥豫章乃自圎通來謁與之欵語連日忘疲不謂末法中有此龍象且喜余里之有人因其歸作詩以送之我家石井旁山水非不竒所恨過從少無與同襟期獨幸里巷間髙僧有二機大機傳祖印海內聲名馳晚歸結草庵杜門人莫窺嗟哉已物化不見三十朞我為銘其塔世猶仰清規小機真龍象方為人天師宴坐一禪榻天花零亂飛聞名亦二紀頗愧㑹面稀忽自廬阜來訪我江之湄共說無生話不覺日晷移顧我麋鹿姿久欲脫馽羈來日寧有幾擾擾將何為一㸃退閒心不謂師已知秖俟及新嵗上章力丐歸師儻還故里願言欵柴扉我雖無長物亦有笻一枝正欲穿林壑相與窮幽微庶幾進此道盡洗平生非白石道者棲于洪巖以石為糧先朝敬愛之賜豫之物甚盛一日主僧持來郡齊因獲恭覽嘆仰之餘偶成拙句二首髙僧隱青山宴坐咀白石不知幾何年人猶訪遺迹顧我頑鈍姿但知能肉食回首仰髙風捫心有慚色道人厭塵紛萬乘挽不住愧我未得歸見之愈增慕奎畫儼若新真容宛如故舊隱雖寂寥山靈尚可護和黃作霖白髮白髮有公道古來人盡然我初未四十霜雪已滿顚黃子我同嵗比我還更賢時命未遇合退藏非自捐不須悲晚景不須怨蒼天如君豈長貧時主方御乾病中有感大暑苦河魚久乃變成痢輾轉枕席間百藥幾盡試神氣頓索然不止形容悴自謂與鬼鄰偶然有生意方欲少開眉赤目又為祟餘年能幾何十日不知味今雖強支持下筯猶畏忌去嵗夏到官今年又秋至默數一年中安好無一二顧此衰病軀豈堪長代匱回首望故山幸有寬閒地不如歸去來笑歌聊自慰
