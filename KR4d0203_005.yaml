body:
  text: 湖山集巻五宋吳芾撰五言律詩釋奠禮畢偶得數語呈廣文兼簡諸生黌舍修方畢還欣祭服成豆籩羅庶品環珮出新聲已見威儀肅更須經術明願言俱努力看即奮鵬程學中諸士子惠和篇復次韻為謝欲為多士勸聊綴五言成乃得瓊瑶報仍聞韶濩聲塵襟因頓豁老眼為增明有句能如此何憂萬里程二月晦日勸耕石城三首春曉喜新晴聊為野外行殘花紅雨亂埀柳綠絲輕路入藏雲寺山圍走馬城空餘懐古意往事與誰評經年縈吏役今日作春遊梅雪隨風去桃花逐水流已驚時節晚還歎物華休擾擾終何補歸與老一丘兀坐無聊賴所期懐抱開偶驅千騎出還得十朋來時有十客遣興非無句消愁亦有杯此心終不樂祇是憶天台和左達功春日即事二首世途雖反側春草自萋迷獨樹花仍發何枝鵲可棲旌斿終逐北貔虎未征西囘首長安路茫茫日欲低春色還如舊吾生媿此心功名嗟晼晚時序憶追尋萬國豺狼滿重城草木深西湖真賞處空想舊登臨和李子儀韻四首甚矣吾兒病求安欲籲天憂心千里切喜信一朝傳逺勝開金穴渾如得寳鞭若非天相我今日豈能然我已成衰謝傳家在此兒俄然聞感疾至欲别呼醫愁緒渾無奈憂心秖自知如今安樂也有酒任盈巵吾自吾兒病怱怱去若逃天寒霜似雪山險石如刀已得平安信寧辭往復勞故園歸去也醉裏任遊遨夜向茆茨宿晨興矯首看逺山俱有雪小店更多寒客路雖云惡兒曹幸已安不妨頻小憩時引一杯乾和張君美韻二首志大空憂國途窮欲問天功名羞短褐蹭蹬惜流年死友留天末生涯寄海邊相逢是何日囘首重依然風塵環四海煙水遶孤村涉世曽無味思君更斷魂區區何面目苒苒且朝昏此意憑誰語悠然付酒尊和尹少稷席上韻每恨千山隔俄欣一日同交遊非比衆人物少如公正欲扶公道端期振此風不須深退避風雨要帡幪和王夷仲韻故人聲氣合交契久彌深不棄荒村陋來分古木隂意傾陳篤論興發出髙吟豈料逃空谷猶聞正始音和鮑昌朝韻參軍長俊逸醉裏度流年客路三千里狂吟幾百篇貧寧貽俗笑死不受人憐别後知何處相思夜不眠洪景伯行縣以不得相見寄詩道意因和其韻凖擬君行縣相隨入醉郷何知旋斾速空負倚樓望室邇嗟人逺愁多覺夜長後亭梅正發誰共賞寒香和范遷善見寄三首蒼生未蘇息誰與任安危騰蹋思千里棲遲尚一枝漫勞男子志空憶太平時讀罷君詩句愁端愈上眉平生誇志氣妄意語功名自顧心無歉誰知道不行霜蹄從暫蹶嘉木㑹重榮願守焚舟志他年學孟明新詩勞逺寄深識子憐余句法追元白交情笑耳餘飄零疎酒盞離亂足兵車何日相從去白雲深處居再和三首不才當退縮何况國阽危猶事毛錐子欲攀丹桂枝人憐無好命自笑不知時且盡一尊酒髙歌展兩眉范侯心貌古懶與世争名此去窮彌壯逢時用則行琴尊無限好道義有餘榮末俗方奔競思君坐到明憶昔干戈裏勞君逺訪余再為千里别又是一年餘天末空尊酒人生念輔車西湖從處好畢竟若為居和左達功春日見寄二首良覿彌年阻相思入夢迷性疎仍寡合世亂且幽棲極目蒼山北傷心白水西書空愁坐處還是暮雲低萬方多難日千里故人心酒社知誰在詩盟阻重尋鶯啼空日暮花落又春深我去慚無計何年許見臨和何倅與林大任韻二首遲日郊原好杖藜春色隨此行端不惡對酒醉何辭竹外名花發簷間野鳥窺晚來登閣望山水更幽竒久欲尋髙隠今朝信馬行閒看花上蝶静聴柳間鶯披豁塵襟盡從容樂事并醉來猶有恨未許見傾城和黄作霖董伯玉東山嶺上及崇相沙頭㑹飲二首寒食傳佳節聨鑣出近坰預憂賓騎散欲駐日車停座上人頽玉燈前酒盡瓶但知修故事三日不能醒杖藜尋古寺把酒俯長流節物尚三月風流似十洲且看花滿眼休説錦纒頭但得陶陶醉何妨守舊丘和良老寄别韻紫籜從師住山幽水亦深方將償素約一到洗塵心别去遽如許愁來且至今何時能見過容我聴潮音贈恪上人上人來訪我袖裏出佳篇窮理通三命知音妙七絃不妨時對榻聊與共談禪一飯雖麤糲閒中且結緣題湯宰山居住在青山下風流踵謝家屋頭千箇竹園裏萬株花亂石危通徑清泉淺見沙幽居誰得此倦客倍興嗟和魯漕喜雨韻下車逢好雨清興一何長暑退郊原爽風生院落凉登樓延夜月遶樹探秋香况得陪詩社從容樂嵗穰和胡經仲即事二首世事憑誰論羇懐只自諳風烟悲蜀魄桑柘老吳蠶晚步惜殘照春山怯曉嵐日來鼙鼓近牢落愈無堪雨脚轉前灣烟蓑帶雨還清詩陶野色薄酒㪚愁顔簷鳥下苔逕溪雲媚屋山世途方擾擾誰得似君閒和陳宗師昨幸朋簮盍還驚客袂分相望千里月獨占一溪雲髙論無由欵新詩忽得聞羡君巖穴下清坐絶埃氛和任漕韻耆英持漕節一稔百無憂心計唯豐國文移罕到州澤流千嶂雨效見萬家秋早晚趨嚴召雍容侍冕旒病中再繼前韻書懐暌違行十日日抱負薪憂已疾無良藥呼醫到别州不堪當劇暑漸喜近新秋痛定因追念從生若綴旒和任漕羅溪道中韻攬轡馳原隰行行四牡驕風煙方入眼雷雨忽連宵官事終期了征途豈憚遥經旬懐笑語嗟我亦何聊和許守小閣依山開户牖每到眼増明爽塏偏宜性清虛更醒酲地髙朝納日江近夜聞聲黙坐觀身世還應百念輕寄江朝宗自遣迎君騎期君指日來胡為多坎坷欲動却遲囘望眼凝還斷愁懐鬱不開相顧須及早莫待折寒梅再和前韻贈江朝宗方欣嘉客至已寄好詩來玩味徒三嘆披尋欲百囘相思愁夢斷一見笑顔開便欲扶藜杖江頭共探梅寄李彦平日佇髙軒過從容慰别離已乖桂子約還失菊花期正爾思一面忽然掀兩眉聞君有召節平步上丹墀寄江朝宗相聚纔經嵗分攜又許時遣懐還有酒排悶豈無詩飲罷憑誰語吟成祇自知願君憐此意命駕莫遲遲任漕魯漕同謁史發運為廬阜之遊恨不得偕行因成小詩二首不向廬山久囘頭五十秋羡君聯騎去顧我幾時遊五老想如故二林應更幽無因陪後乗神往但形留嵗事行將半今年又有秋喜君將漕計容我厠英遊湓浦古來勝廬山天下幽此行殊不惡莫惜少遲留遊金山二首造物分南北長江欲盡頭有山浮碧玉亘古屹中流萬頃涵空月千帆破浪舟羡他雲水客長此占清幽欲向南昌去先為北固行泛舟遊寺古倚檻看江清久作市朝客喜聞鐘磬聲登臨曽未竟已足快平生遊荆山寺道左逢幽寺巍然氣象新泉聲長繞舎山色欲侵人疎牖時穿竹虚堂不染塵老僧仍好事不厭客來頻用王龜齡韻題五柳堂久矣斯堂廢重興賴有公雙溪修故事五柳振遺風頓覺烟光好端由氣味同莫言官獨冷長在綠隂中題鑒止堂道人本無俗肯與世浮沉坐對一池水浄觀千古心月髙天宇豁風静夜堂深此意知誰㑹泠然撫素琴題先春亭洪鈞轉一氣萬彚俱争妍我不與春競春胡推我先清寒徒自苦幽獨有誰憐且與江南客共結詩酒緣和錢倅秋晚登帢幘亭滿目悲涼意憑誰㫁送秋尋僧求竹舍俯檻得江流天末髙低鴈波間出没鷗時危身局促却羨汝無愁聫句題吉祥寺繫舟枯栁岸窮勝古城隂松徑雲生屧竹牕風滿襟不妨情話好且放酒盃深杖履尋歸路西山日未沈聞鹿生子再上歸田疏從違未可知方憂鶴怨我忽喜鹿生兒六月事已騐千年夀可期我歸須汝健正要汝相隨生朝有感姑溪來幾日兩度見生朝親舊三年隔鄉闗千里遥梅還開舊樹栁更長新條只有雙蓬鬢天公不見饒得三七姪書説湖山佳趣因以書中語成四韻今日家書到從頭説故丘園林増茂宻池館愈清幽嫩竹已千箇新蓮僅萬頭欲歸歸未得長是夢中遊寄四二姪用其書中竹樹茂宻已是紅塵不入之語書來言舊隠湖上足煙光樹密交青䕃花繁溢暗香紅塵飛不入綠水去何長囘首千山隔歸心欲發狂泛舟歸自郡中舟中偶成寒流清更淺短棹去仍來山色侵書帙波光映酒盃龜魚應舊識鷗鷺莫相猜全勝山隂路空船載月囘薄日烘雲影輕風濺浪花數峯排絶岸一鴈落平沙冉冉寒生袖悠悠夢到家前村誰有酒試遣小童賖暮春感懐寰區殊未定懐抱幾時寛倦馬驅馳苦窮猿叫嘯酸煙深春草碧日薄暮雲寒豈料滄波上經年駐玉鑾是處兵戈滿誰言宇宙寛戰聲驚膽破春色入心酸北狩江天逺東巡海氣寒野人元任運愁夢亦隨鑾途窮朝絶爨世亂夜忘眠遁跡幾無地全生賴有天江山春滿眼豺虎日駢肩萬事愁歌裏看花淚迸泉憶昔平居日春來足醉眠黄鸝鳴綠樹白鳥印青天片片花經眼埀埀柳拂肩誰知遭䘮亂空負酒如泉憶昔憶昔從吾友兹焉事筆耕螢窻秋夜短蓮社晚風清亂後成陳迹重來愴故情惟餘雲水客依舊戱長鯨與江朝宗丁彦功飲酒梅花下二首挈榼西園去花光照月華共看花上月肯負月中花酒與花俱白人如月不瑕且陪花月醉何用苦思家一笑未易得今朝豈偶然故園方自適我輩更相便好月好花夜不寒不暖天莫辭拚一醉為我棹􅘑船六鶴中偶一鶴折翅皓鶴相從久衰顔每為開忽聞渠翅折頻使我心摧本意俱仙去那知偶禍來縱令醫得活無復見毰毸挽范丞相五首蚤嵗登三事皇朝第一人聲名塞寰宇功業在生民千載風雲㑹三朝柱石臣堂堂無復見空憶吐車茵伊昔宣和際公來射策初獨陳天下事不負古人書宣室方前席蒼生欲奠居黑頭成奄忽天意果何如貴處人臣極居忘相位尊朝廷名徳重前輩典刑存方喜生同世俄驚弔在門百年知已恨寂寞向誰論七十方强半天胡不慭遺致身雖宰輔遭世已艱危計策安宗社勲庸載鼎彞國讐猶未滅豈料哲人萎長計公生日年年獻壽詩秖今良月近遽作九泉悲世事真難料人生信有涯西風吹畫翣心折淚空垂挽湯丞相三首平步青雲上逢辰亦盛哉十年登兩地四見入中台獨擅調元手咸推濟世才如何天不慭一夕泰山頺游刃有餘地孤忠不媿天兩朝資弼亮四海賴陶甄身後浮言洶生前素履全他時公論定史筆看流傳吳郡為僚日如公最妙齡衆尋歸鬼錄獨出佐王庭道䘮思人物公存尚典刑傷哉今亦逝唯我老零丁挽鹿國强二首籍甚鳴塲屋居然好弟兄桂林同擢秀梓里頓增榮泮水清䂓在家山雅趣成投簮方自適何處掩佳城仕宦吾郷少咸尊魯一儒名雖登上第身不到亨衢耆舊今垂盡游從孰與俱百年如夢幻囘首但驚呼挽謝次安二首耆舊今無幾郷閭素所依官登五馬貴年及七旬稀一旦成長往九原誰與歸寒風吹畫翣囘首淚空揮塲屋聲名久簪紳譽望優心雖馳北闕化止被南州緬想生無憾猶憐志未酬庭堦有蘭玉身後復何憂挽林紹伊二首早負經綸志居然欲起家持身惟孝友告后盡忠嘉位望隆青瑣文章在白麻忍聞埋玉樹四海共驚嗟三朝褒舊徳一代仰名儒晚嵗持荷槖頻年剖竹符共期調鼎鼐豈謂老江湖身後知無憾傳家有鳳雛挽周希舜二首末俗事浮競夫君志不移至誠閭里化純孝冕旒知恬養方安命騫騰未濟時一朝埋玉樹空使萬人悲傾蓋如前日分攜忽累年我方來舊治公已闢新阡宿草荒三徑寒雲慘一川善人無復見囘首已茫然挽梁尚書二首早嵗膺宸眷囬翔老禁塗三持周版籍九佩漢銅符度量包千頃聲名滿八區誰知成奄忽陳迹付龜趺身在名卿數人懐長者風愛民餘善政富國著休功敡厯周中外哀榮極始終芝蘭方競秀流慶看無窮挽吳尚書三首竒才從古少厚徳獨公全克己强為善虛心樂薦賢立朝忠貫日謀國力囘天閲世雖多故胷中固湛然晚嵗登臺省頻年侍殿墀從容如素宦卓犖冠明時人冀終圖任天胡不慭遺流芳知未艾家有寧馨兒公守東陽郡于今已十年人猶誦遺愛政不愧前賢清議當時重休聲後代傳我來叨郡佐悵望隔重泉挽樓樞密二首耆舊凋零久惟公作世程險夷全一節終始保榮名二府勲庸著三州政績成十連方倚重何遽掩佳城憶昔登龍日從容接勝遊軒窻臨綠野尊俎俯清流尚欲榮花塢那知負釣舟新阡何處是極目暮雲愁挽周季卿一時推曠達末俗少如公自得髙人趣居多長者風生涯書巻裏世事酒盃中瞑目應無憾傳家有阿戎挽陳兗仲慷慨平羣盜能為衆所難身雖淹武弁志不負儒冠義槩千鈞重心田萬頃寛故山方適意清夢忽驚殘挽朱樞言持心常近厚遇事不辭難早嵗曽攀桂中年更握蘭盛名馳海内素望聳朝端尚有清芬在流光永後觀挽姚君二首處世心無愧持身徳有常施恩周里閈植福遍僧坊入戸書盈室開尊客滿堂清芬傳後葉看取桂枝芳晚得田園趣平居樂有餘好賢聞善道奉佛契真如往事歌謡在浮生夢幻虚我慚居堊室無路挽靈車挽胡經仲二首千載微言絶夫君妙獨傳鈎深探閫奥養浩塞天淵憂世心雖切歸田志頗堅斯文今已矣空復誦遺編相距一百里相從四十年話言窮理窟酬唱足詩篇我始歸三徑公胡掩九泉無由論舊事尚擬誌新阡初冬山居即事十首我愛山居好冬來惬野情簷前朝日暖谷口暮雲横栢子當軒墮蕉花傍檻生自堪安樸拙何苦慕塵纓屋角營書室新成八九椽開林延愛日甃石截流泉山近嵐光逼窻疎月色穿寒梅何日吐我欲醉花前歸來非計失事少得心寛村落年方稔庭闈病復安詩當隨景賦酒莫放杯乾揷架書還在仍容子細看自笑謀生拙空驚嵗月除年衰惟藉藥髮少不禁梳盡日扄蓬户無人過草廬晚來閒策杖緩步當柴車節物隨時變斜陽一望中暮雲重疊碧逺樹淺深紅菊色滋寒露蘆花蕩晚風一樽誰與共獨立意無窮本是山中客胡為作逺游風波驚脱險巖谷喜尋幽紙帳寒來暖僧蔬飽即休百年如一夢此外復何求久出畏人事端來避世紛山光閒裏見樵唱靜中聞茗椀晴翻雪香爐曉吐雲已應空百念勿復嘆離羣年去驚人老坐來忘夜深未能成一事何敢廢分隂燈盡添殘燭山寒擁敗衾幸無塵俗慮聊遂讀書心搔首寒窻下荒山草樹迷鳥聲喧晝寂鴈陣接天低更欲開三徑終當把一犁此心非傲世揣分合幽棲田宅雖無幾琴書幸有餘不妨臨水賦况是背山居適意真為樂浮名總是虚前賢猶若此我輩欲何如五言長律范丞相生日天啓中興運時生間世人峴山鍾氣象漢水賦精神文采傾塲屋聲猷聳縉紳千言醫國䇿一日致君身平步登黄閣孤忠結紫宸聖心資啓沃帝業賴經綸嶷嶷文章伯堂堂社稷臣威名騰異域徳澤徧斯民相越風流在歸秦意氣伸有才俱擢用靡事不咨詢十載空天路三年澤國濱宵衣方念逺皂蓋且行春令下人咸喜風行俗自淳一方新沐惠四海舊依仁佇見飛還詔重煩秉國鈞從容扶日轂慷慨掃邊塵為相賢如此當朝信絶倫邦人逢誕日和氣滿城闉貴極纔三紀冬來始浹辰願隨靈壽杖千嵗閱莊椿和許守喜雪一夜飄瓊屑雕鐫竟孰施主張歸白帝勾引自雲師飛灑斜穿牖連翩亂入池漫空疑柳絮著樹混梅枝月射光偏瑩風迴勢轉危聯華憐鶴髮耐冷羨冰肌萬壑填將合千林壓欲埀拂簷輕似粉繞砌白於脂公已齊髙潔吾方守鈍遲共欣占嗣嵗仍喜沒多岐政已騰民頌忠宜結主知㑹看頒紫詔早晚下丹墀
