body:
  text: 湖山集卷四宋吳芾撰七言古詩里有蔣生者頗志於學迫於貧困吾叔德先見而憐之贍其有無使從胡經仲學作詩勉之君不見昔日泰山孫先生蹭蹬窮途道未行讀書有志破萬卷置錐無地可躬耕髙堂親老仰甘㫖未免道路長營營睢陽客舍一再過牢落誰人知姓名文正范公真好士一見賔階喜氣形深知先生非乞客金在泥沙玉在荆底事窮年事奔走厄貧廢學誠可矜因留鄉校周所急奉親為學使有成先生果不負公望行益修兮經益明十年聲名動廊廟天下望之如日星一代儒宗君試數誰不首以先生稱向使不遇文正公亦將因循埋沒如腐螢吁嗟此風寂寞久豈是畎畝無如先生之才能世人俗眼棄貧賤胸中壯氣空峥嶸吾家叔父特逹士汪汪偉量如滄溟比鄰有蔣生所志在窮經迫於飢寒故無以贍親庭不問師道已未足聚訓青襟已十齡鋭志日已喪塵事日已嬰顧雖僅能供子職而此術業何由精吾叔念之為慨然一見自待如父兄恐子坐窮竟廢棄亟使就學趨凖繩况有括蒼胡夫子傳道吾里作世程執經座下子無忽子之所須吾其應傾囷倒廩略無靳濶視世俗親疏情我聞此事猶歎息俗士聞之應駭驚近來世道太澆薄骨肉猶作錙銖爭故雖有子尚不教但欲黃金自滿籯安能推其餘以及異姓忘愛憎偉哉吾叔賢逺繼文正公之英聲蔣生其勉之無使後人獨羡孫先生續潘仲嚴秋夜歎秋夜凉秋夜凉碧天如水涵月光空堂耿耿不成寐起坐拔劍歌慨慷歌罷金樽還獨酌試一停杯問寥廓此身此世竟如何搖搖驚燕巢風幕伊昔我生適太平豈信中原有甲兵揚鞭走馬長安市美人如玉酒如澠可惜太平留不住一旦風塵杳回互誰知年少樂游場翻作敵人爭戰處烽火照天光奪日殺氣騰空暗如霧皇家骨肉幾千人盡逐鑾輿沙漠去回頭宫闕成一空惟有山河在如故咄咄姦諛何誤國二十年來啓邊隙邊隙已成猶自如忍使吾民罹此極哀哉吾民亦何辜父子連年死鋒鏑興言及此心膽寒空對秋風淚橫臆淚橫臆宇宙回旋雲失色我聞古亦有亂離人道亂離今過昔一人厭奔走四海念休息如何廊廟土木人安坐恬然有肉食我今願得上方斬馬劍盡取凶徒肆誅殛却總堂堂百萬師净掃邊塵空塞北莫言草芥無竒策願蒙天子一前席和林大任勸耕壯哉溢目還盈耳千騎出城歌吹起野人一覩快爭先奔走歡呼幾折趾往年戎馬偶出郊田間彌望皆荒茅使君篤意勸農課盡使惰游如所教麥欲連雲桑蔽野此心猶恐孤民社要將治績邁龔黃不但文辭超賈馬編民擊壤自欣歡盡道年來百慮寬承流宣化得賢帥湛恩霑溉何漫漫不愧剖符仍受玉善政已為千里福年豐榖賤復何憂向也窮民今亦足固知博施非屯膏况能好善如干旄賔僚倘有公輔器寧辭解贈腰間刀有客有客歌賢業詞爛春葩光煒燁一時酬唱已清新四坐朋從更和叶酒酣諧笑應云云元白李杜疑前身想當揮毫落紙時筆端往往俱有神我來觸緒未暇給首覩明珠千百粒豁然兩眼頓增明更覺慢心無自入已幸從今日往還况復賦詩賔客間只恐使君丹詔下擢歸青瑣㸃朝班又勸耕浙東十載歌豐登去年水旱俄相乘吾州何幸得一熟四野絶聞愁歎聲田疇二月土膏動樹頭布榖爭飛鳴田家飽食苦無事雨後一犂方對耕敢意使君親勸率千騎曉作田間行老農感激前致語使君不用憂西成臘中昨已見三白今日還逢甲子晴年豐榖賤定可卜倉箱㑹見如坻京但願使君對春色莫負花前雙玉瓶人生適意未易得况復時節遭升平要須拚與賔客醉無使旁人笑獨醒喜晴我家世業本農夫力作耕田供百需食無魚兮出無車但守桑梓依枌榆中更兵火田園蕪骨肉奔迸幾為奴飢腸雷轉寒侵膚中夜窮鬼常揶揄自笑為生亦良劬此身何由出泥塗始棄耒耜親詩書一以經訓為菑畬兄弟相繼躡雲衢吾鄉往往推諸吳我雖有志徒區區顧慚小技非大巫向來聊出應時須亦復接武丹陛趨退視才慳思且枯敢意濫吹東郭竽自從得請歸田廬萬事閉眼不問渠豈謂割分姑熟符一時乏使偶見除此邦自昔稱膏腴千里舊富稻與魚十年九潦田無租今嵗䆉稏方滿墟邦人舉首爭歡呼謂此豐登亘古無驟然一雨驚里閭直疑平地浮江湖靈祠致禱才登輿已見皎日升東隅一方今既奠厥居太守寧不欲自娛便可投紱歌歸歟癸巳嵗邑中大歉三七姪捐金散榖以濟艱食因成三十韻以紀之吾家謂姪非常兒自幼讀書常下帷平居事母盡孝道力供子職曽無違辛勤農畝三十載頓立門户成家肥耻同流俗事驕吝好賢樂業常怡怡聞人急難如在已見義踴躍無不為造橋砌路未為德折劵釋逋未足竒究其存心用意處尤在邑人艱食時此邑山多土田少民貧自昔難支持其間嵗收數百斛已為富室他可知况復今年苦亢旱州里逺近咸告饑田疇彌望總如燎細民未免俱流移縱使人能保常産亦復有甑無米炊雖幸朝家行賑濟正恐未能遍羣黎往往傾村走山谷荷鋤掘地尋蕨萁取根為粉雖可飽食之既久人亦羸春來必至生疫癘死填溝壑夫何疑吾姪見之軫憂惻首議倡率輸家資既捐青蚨二百萬猶恨糴貴難療飢庾中僅存二千石一旦傾倒盡散之此心但欲濟鄰里身外浮名非所希吁嗟薄俗務貪鄙計較升斗爭刀錐徒知富有可潤屋豈慮人怨親戚離有如吾姪為此舉吾鄉自古應亦稀小惠所施固未博風義自足洗澆漓儻使人人皆若爾千里豈復憂餒時第願吾姪廣此意所為盡從今日推隂功在人天心報㑹俾爾壽膺繁禧梓里遺芳傳未艾世有子孫攀桂枝豈惟同里共歆艷亦使吾姪增光輝老夫無以示旌勸聊為吾姪題此詩和向巨源冷語長空一夜飛瑞葉正是人間苦寒月靜坐遙聞修竹折天慘雲愁風更冽喜君試水烹春雪却笑酒酣長耳熱又風掃千林無一葉獨有疏梅浸霜月欲御瑶琴愁指折試酌寒泉驚齒冽最愛閉門人卧雪不作羣兒附炎熱釋奠于學和劉判官韻憶昔未冠隨親庭采芹曽挹泮水清仰髙先聖空有志逮壯才能脫白丁三釡及親雖可喜抗塵不復論書史舊遊恍若一夢中十載何期兩來此慚無善政及邦人况負平生道德心再瞻廟像直汗下正恐不為神所歆朝來爼豆敬通靈幸賴賢僚贊禮成更勤佳句愧盛意敢與前賢齊令名詞場自顧非元帥白髮星星徒滿戴尚期君與振斯文休嗟蓮幕淹三載朱世同喜雪中得酒出佳篇相謝用韻奉酬吾子一布衣抱道仍懷德人雖仰其髙耐寒如松柏亦復誚其介忍窮如鐵石欲耕且無田欲住且無宅借人茆舍居破漏無遮羃兀坐懶掃除凝塵常滿席文章老更成初不事雕刻間為場屋遊往往遭棄擲進取既不諧資身又無策斆學三十年嘗作離鄉客亦豈無六親為親成間隔亦欲求知音無奈俗眼白不知何所負半生罹此厄空讀萬卷書不得稽古力昨朝起開門雪深平地尺極目望四郊萬里如一色窮人盡皺眉共畏寒威逼亦大不能堪君獨無戚戚危然書窗下哦詩度朝夕我送一壺酒酒面蛆浮碧但可澆愁腸豈足資歡適君乃走長篇再三叙感激筆下有如君足為人楷式勿謂道難行自古有通塞時來㑹見上通津莫憂計拙無衣食和劉判官喜雪濫把州麾奉北堂自慚政術非龔黃年豐物阜天所賜容我養拙山水鄉今朝瑞氣俄融結散作飛花應時節萬家疫癘一掃除盡道年時無此雪幕中佳士欣得公筆端能與造化通乃知氷柱有家法寡和未饒歌郢中一望瓊瑶迷四境我復白頭臨絶頂要須相與作春溫共向尊前拚酩酊詠海棠古人花譜名浮實獨有海棠真第一我家千樹足竒花晚得此花尤傑出每逢春色鼎來時爭逞新粧媚晴日渾如酒暈入香腮宛似胭脂施玉質雨後妖嬈倍有情天然富貴曽無匹夜深燭下更端相睡起還疑春思鬱老來百事盡疏慵頗喜與花時欵密豈知牢落向江城驟爾乖離心若失試從僻陋强搜尋偶得一株天所乞纎枝雖瘦不禁春亦有花光相照拂一時遊子覩爭先共歎凡花難跂及愈令倦客憶故園不覺淚沾衫袖濕對海棠懷江朝宗我住湖山嵗月賖年年長醉海棠花憶昨君來花未放却言花放定相過亦欲花間同一醉肯教埀老負陽和東風始動花始蘂君已翩然到我家意君為花必少駐那知事復成參差眼底埀絲先弄影一時浮艷亦堪誇豈若神仙真態度紅粧翠袖肩相摩躊躇花下不忍别回頭彼此奈愁何匆匆直向剡溪去急為飢民救札瘥萬人既欲全性命賞心樂事自應那待得明春來修好因循又恐成蹉跎世間萬事無不爾不用逢春苦歎嗟如君年年走塵俗深疑天不付芳華何似相隨林下住共將爛醉為生涯不但有花供笑語還應有句助吟哦王若夫謂水晶蒲萄本出其家求詩君家蒲萄天下竒奴視百果何其卑種成滿架日蕃衍清似水晶甘若飴八月江南風日美正是人家酒熟時盤中珍果有如此誰數閩中生荔枝鄉人歆艷競分種不過數年條已萎胡為君家植此樹閲嵗數十如新移我聞尤物天所靳盛衰頗與人相隨君家令祖有賢行一邑逺近人爭推少雖失身事刀筆吏之操術皆耻為處心積慮人莫及奉法循理古亦稀人與黃金目不視身居暗室心不欺退處郊坰忍窮困只教子孫為布衣天公無以表純懿特以此果先見貽其孫努力效儒葉表表頴出非常兒未壯果能立門户直上蟾宫攀桂枝自餘雖未登上第亦已飛鳴到禮闈俱傳清白守家訓端若此果光陸離今君既取以餉我又復琢句形聲詩願君採折多醞釀積千萬石為酒池客來自此酌不竭永永百年供壽巵和陳天豫巖桂乞身未遂歸巖谷滿面塵埃慵靧沐鈴齊獨坐更悲秋喜見吾人駐車轂吾人别久正懷思一旦渴心還慰沃天公助我作清歡特遣仙花薦芬馥萬枝瑣碎屑黃金幾樹隂森攢碧玉天然風韻月中來頗鄙人間桃李俗秋髙氣爽人意佳衰病無悰惟我獨胡為却被此花惱盡日簷前看不足况是欣逢磊落人逺追渭釣并巖築須知天欲長吟哦使向筠陽看修竹見花落筆作長謡燦若珠璣千百斛我方觸緒不自聊得此細看還熟讀明朝人去花亦殘只把新詩時反覆得家書報敝居紫丁香盛開悵然有感我家丁香大盈丈天公靳惜非凡材去年花開香滿屋我方局促纒悲哀凖擬今年必無事儘可花下相追陪何期頓與花隔絶斗粟牽從江上來前日我家寄書至為報堂前花正開熏人已如蘭麝噴照眼還若錦繡堆狂蜂游蝶自來往舊成蹊處今生苔主人有花不解賞向來何以事栽培置書不覺雙淚墮人事好乖如此哉嗟我行年近六十鬢髮星星心已灰縱使從今得自便此生看花能幾回况復奔馳未能已斷蓬正滚風中埃欲往一見尚不可敢望近前持酒杯須知軒冕儻來耳不如歸去山之隈病中秋香開因成拙句呈諸親友仙姿元自廣寒來分得天香長馥郁千古風流獨占秋一枝曽比崑山玉伊余老去百念灰已是形骸如土木年年尚為此花狂有似淵明偏愛菊坐中不可一日無又似子猷真愛竹一從秋到天宇清頗費夢思眠不熟凌晨便起探花枝走遍荒園常僕僕可怪司秋失故常時節已深花尚伏逮余抱病卧匡床始報枝頭綴金粟折來三嗅忽悽然不覺淚珠懸兩目天胡秖賦惜花心不容享此看花福今年疾疢已如斯來嵗衰頽還可卜縱令牽强到花間空使此心生不足不如等是趁西風把花一掃還空谷陳正卿示蛤蜊解嘲之作因次來韻夫君雅志知誰㑹身在寰中心物外平生初不入州縣一任傍人驚且怪日來杖屨忽相過為我踏破松隂碎亹亹清談頗逼人秖將萬卷窺千載得酒歡然竟不辭右手持杯左手蟹夫君真是人中豪寧比尋常庸俗輩不食蛤蜊何足羞但能適口斯為快山肴野䔩亦自佳豈必蓴羮與鱸膾復次韻老來絶意風雲㑹久欲脫身塵垢外有時偶被世緣牽咄咄書空常作怪一麾何事到江城却犯喧囂親瑣碎簿書叢裏度光隂倐忽已驚踰一載所幸連年值有秋頗足稻粱富魚蟹正愁客少無與娛忽得詩流真我輩劇談終日坐生風洗濯煩襟一何快酒行到手君莫辭有鱉可炮魚可膾中秋㑹於照水堂竟不見月和劉判官又是人間八月秋西風萬里殘暑收簿書汩沒日復日忽逢佳節聊舉頭開樽喜有賔僚共凖擬延月歸城樓姮娥何事苦相惱使我珠簾空上鈎百年樂事能有幾興來不憚秉燭遊雖無月華助吟賞須知節物不可留尊前莫問漏聲促且對溪山倒玉舟九日感懷淡雲籠日秋容薄淅淅西風度簾幕籬邊黃菊自重陽天外幽人正離索登髙那可望長安記得當年醉豐樂十千美酒一百分脫帽狂歌恣歡謔風流坐上盡英豪醉倒不知紅日落誰知陳迹轉頭空漠漠烟塵暗京洛又是秋髙塞馬肥萬國城頭悲戰角對花强飲欲忘懷萬感並生還作惡河水之濁有日清世亂當復見太平只應人老鬢毛疏愧他年少插茱萸臻公釋氏之秀者浮游徜徉跡接天下乃者歸卧雲山閉門不出遂命齊名曰戲鯨真得古惠師之遺趣也豫喜其志因留二十韻以贈之吸盡百川還見底頭角驚殺鱣與鮪有時大瞋明月珠照耀六合光不死滄溟浩蕩極遊巡鈎深匪憚窮涯涘今者修鱗何側倚豈是吞舟厭遷徙秖應噴浪雲日翳故此盤桓良有以朝發夕至固無難在在處處期一視茍容肯向尋常溝要養此身數千里圉圉洋洋信自如涵泳嚅嚌真得理從容詎止濠梁游枯槁寧同車轍裏至樂元非惠子知入舟肯作周王美謫仙跨背應無由昌黎鱠鮑誠虛擬終日相望誰得似井蛙安足為跨跱得所一任笑獱獺旋體寧容咂螻蟻清波孤虛有餘澤何必龍津誇鋸齒蕞爾鰥鮞徒唯唯春來秋化無暫已隨陽上下一何勞風波蕩薄不自止謷乎大哉天獨委居然不與衆鱗比髙摩無為還已矣肯向人求升斗水古來大魚不池活㑹須終作風雷起殷勤寄語任公子收拾巨鈎毋進跬忠侍者自隱靜來既歸覔詩因述其意以贈之自可呈似簡堂老師也上人手持隱靜書示我刋成送行句飄忽如雲不可留又歸隱靜山中去自謂為僧亦有緣獲事老師非易遇第念學道須遍參要證此心歸宿處退量天分不如人亦復性資非頴悟那能終日坐蒲團只看水上浮杯渡挑囊亦欲走諸方趁此年齡猶未暮他時參竟却歸來伴我老師巖上住上人此意似可嘉止是出家兒調度老師若也可其言不應忘却來時路寄江朝宗藕花爽約約寒梅開遍南枝尚未來今日有人傳尺素却云直待海棠開若賞海棠猶未晚回頭便見春風轉只恐君無必信言守到此時還更展呂丞相生日日躔析木當良月辰象煌煌森羅列忽驚昴宿下天來果向明時作人傑巍巍德望冠簮纓魯國真儒獨擅名五百年來世希有端為社稷萬人生胸中素抱經綸術致身便欲扶王室不學磻溪坐釣磯洗光直取虞淵日艱難將相罕全才天使我公居上台公能以道佐人主四海俱知天意回蒼生政爾資霖雨未許超然成獨處佇看丹詔下嚴宸㑹見叔敖三相楚向來忠烈已無前此去勳庸非偶然便使呼韓朝魏闕直須光復舊山川富貴功名人所欲世間萬事今合足龍門客至亦何言獨有長年為公祝但願我公如汾陽二十四考中書堂他年更伴赤松遊永作漢家張子房寄劉與權與幾君在桃源山下居我家相距百里餘神仙襟韻固異禀草木臭味曽不殊一日京華定交契十年太學論詩書斷金髙義薄雲漢濶視往往輕俗徒一時儕輩稍推許二劉之外稱三吳風雲際㑹有早晚一吳近已聨朝裾四子徒懷經濟術蹭蹬今猶卧海隅蒼生顒顒未蘇息天意其肯終捨諸丈夫遇則行所學未遇不應為腐儒共約天台最深處考定古今相與俱所冀激昂平日志力取功名攄壯圖誰知人事竟好乖合并欲進還趦趄空堂獨坐弔形影仰天不覺興長吁却憶長安日相親如友于一朝不㑹面猶且嫌跡疏何况久暌隔動見嵗月除竟負雞黍約中心當何如窗間琴數弄花下酒一壺自歌還自酌此意君知無聞君南塘富山水清虛曠絶如西湖好藏頭角俟雷雨他年同躍天之衢三老圖既成久欲作詩未果因次任漕韻我久欲作三老詩苦無佳句能解頤抽軋鄙思成無期有語欲吐還茹之忽得新篇向此詩恍如春草生謝池明珠萬斛光陸離璀璨不減珊瑚枝壓倒元白頭欲埀直與李杜肩相差使我手把不停披憶昨梅花吐瓊㽔枝頭愛日仍舒遲雖恨捧觴無翠眉吾人臭味自相宜花下清歡聊共追嗟我老來意氣衰歸心已决不復疑雖來江右把一麾但知痛飲真吾師尊前况逢氷雪姿豈容不醉負屈巵二老攬轡方並馳一氣相和如塤箎百城感化熏蘭芝不事威怒轟雷椎後園探春容我隨開懷笑語何熙熙丹青寫此一假奇未羡九老洛水湄何日歸去山之崖時命柴車載鴟夷相逢徑醉莫問誰飲盡不妨尋酒旗耿曼老將命鄉邦見過匆遽言别復作詩送之我方退老湖山上混跡漁樵甘放浪親舊雕零㑹面稀與君亦復成疏曠何期擁節到鄉邦得得驅車肯迂訪開門倒屣笑相迎盡室歡欣無此况湖光山色似爭輝兩眼韶華更駘蕩伸眉抵掌話中腸正好花前倒春釀胡為欲去挽不留忍把陽關容易唱嗟乎來日苦無多况是頻年嬰拙恙興來亦欲强登臨龍鍾未免扶藜杖目前衰颯已如斯寧保明年見花放而今花下幸逢君豈容不盡長鯨量如君志尚逈不羣治行既髙心且壯方當聖主急搜揚為斫豈應遺巧匠㑹看唾手取功名盡展才猷結旒纊出處從今不復齊尊酒何由更相向臨期一醉尚何辭後夜月明空悵望符倅同遊鴈蕩賡其所和范相遊山韻髙才獨立萬夫却險語磨崖山鬼愕翕然萬口競流傳一字誰能加筆削自憐庸鈍百不聰晚來喜見人中龍更看揮翰光奪目恍如海蜃浮青紅一時聞望已難攀相見平居養浩然慷慨胸襟包海嶽軒昻髙義薄雲天散材不謂䝉知遇孤迹何期遂保全碌碌未能酬國士正慚他日尉通泉夜來同諸公泛舟湖中樂甚因更潭名作北湖乃作拙句呈諸親友以紀一時之勝云北山萬仞羅翠屏下有湖水鏡面平山影靜倒千丈碧波光冷浸一天星自有此湖知幾嵗居人日日常經行但知湖水鴨頭緑誰人向此含幽情我來正值秋容媚野曠天空風物清烟橫木末斜陽晚雲散溪頭明月升放舟直入波深處水鳥窺人元不驚天晴水暖魚亦樂時見撥刺波間鳴持竿舉網忽有得滿座歡呼山嶽傾水面黃花更堪愛盈盈佇立如娉婷栗玉簮頭紅一㸃隨風翠帶還相縈興來不覺千鍾盡衆賔皆醉無一醒漁榔敲罷棹歌起十里猶聞笑語聲謫仙死後無此樂我今此樂真難并人生適意未易得此湖從此宜知名要配北山長不朽酹酒更告山之靈我欲結茅湖上住盡使湖光入户庭枕流潄石過一世不妨清處時濯纓更釀北湖作春酒招我四海良友朋夜夜扁舟同載月尊前吹笛到天明又和謝良輔惠箭筍卜得幽居山繞屋四圍景物何紛郁門前掩映百埀楊墻裏回環萬修竹風來花氣競薰人日出鳥聲渾滿谷簷前花樹盡堪攀砌下清泉常可掬暮年得此復何求但閉柴荆理松菊客至草草具杯盤隨分烹炮薦魚肉野人頗厭近腥羶長苦春蔬餐不足固知竹箭已抽萌玉筯瓊簮破苔緑非君好事逺寄將安得今朝充我腹禮勤意厚已難當仍出長篇相付囑嗟豫朴拙豈知詩秖覺珠璣照雙目朝吟夕詠自忘疲雖欲安眠眠不熟起來爛煮飽枯腸盡却韭葅并豆粥人生嗜好固不同此味定知人共欲苐慚作報乏瓊瑶惡語雖多謾盈牘哭元帥宗公澤嗚呼哀哉元帥公百世一人不易逢堂堂天下想風采心如鐵石氣如虹正色立朝不顧死半生長在謫籍中真金百鍊愈不變流水萬折歸必東落落竒才世莫識欲知徑草須疾風維時中原丁禍亂塵氛漲天天濛濛衆人畏縮公獨奮毅然來建中興功雄圖一定百廢舉復見南陽起卧龍嗚呼哀哉元帥公翩然遺世何匆匆無乃天上亦乏才故促我公還帝宮公還帝宮應有用何忍坐視四海窮吁哉四海正困窮興仆植僵賴有公公雖居東都天下日望公登庸公今既云亡天下不知何時康正如濟巨川中流失舟航當今士夫豈無人請問誰有公器業誰如公忠良公雖不為相德望震要荒公雖非世將威稜讋豺狼偉哉竒節冠今古我試一二聊鋪張靖康元年冬敵人正披猖廟堂驚失色愁覩赤白囊公首慨然乞奉使欲以口伐定擾攘朝廷是時未知公公之蚤志不獲償憂國耿耿思自效再乞守土河之旁命下得磁州翌日徑束裝下車未三日邊騎已及疆敵人聞之亟退舍匹馬不敢臨城隍頃之得兵數十萬康邸賴公王業昌及公領留守北顧寬吾王恩威兩得所春雨兮秋霜餘刃曽不勞危弱成安强姦雄悉膽落誰敢亂紀綱嗚呼哀哉公死矣民今有粟安得嘗徂詐乘我虛近復陷洛陽洛陽去東都雉堞遙相望不聞敢侵犯豈是軍無糧秖畏我公霹靂手氣懾不復思南翔嗚呼哀哉公死矣秋髙馬肥誰與防天子久東狩去冬幸維揚都人心戀主謂言何相忘朝夕望回輦斷腸還斷腸公獨以死請再請意愈剛嗚呼哀哉公死矣萬乘何當歸大梁咄咄食肉人尚踵蔡與王姦諛蔽人主痛毒流萬邦人怨天且怒意氣猶洋洋所冀我公當軸日盡死此曹膏劍鋩嗚呼哀哉公死矣始知國病在膏肓我公我公經濟才設施曽未竟所長但留英聲與後世永與日月爭輝光此死於公亦何憾顧我但為天下傷我聞天下哭公者哀痛不翅父母喪父母生我而已耳豈能保我身無殃邦人此時失所依波迸東下紛蒼黃我公我公不復見秋風在處生凄凉百身儻可贖我願先以微軀當靈丹儻可活我願萬金購其方倣徨愧無起公計安得長喙號穹蒼嗚呼哀哉元帥公太平時節君不容及至艱難君始用民之無祿天不容嗚呼哀哉元帥公古來有生皆有終唯公存亡係休戚千年萬口長怨恫嗟我草茅一賤士念此抑鬱氣拂胸銜哀揮涕何有極願以此詩銘鼎鐘
