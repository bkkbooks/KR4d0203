body:
  text: 湖山集卷十宋吳芾撰七言絶句領客賞梅經年相别阻傳杯忽見梅枝入眼來今夕勸君休惜醉不應辜負臘前梅只擬花開把酒杯南枝忽遞暗香來徑須領客同清賞莫待城頭吹落梅移梅北隩和黃清表韻自慚面目久塵埃擬對氷姿一笑開聞道前村連夜發豈辭健步逺移來和董伯玉探梅寄語南枝及早開莫遲春信待人催我今已辦千鍾酒凖擬花前醉百回梅莊主人袖詩見過纍日欲得次韻以汩汩無暇且和一絶偶驅小隊踏蒼苔無數梅花照眼開更有髙人同勝賞此行端是不虛來何彥清梅詩二絶用韻頗嚴諸公相率同和清愁幽恨不禁春寂寞池塘雪意昏寄語髙樓莫吹笛夜寒留取伴龍孫只把南枝作雪看一般風韻照人寒當年兒女還知此定借君來答謝安和十二弟梅花春到衡門苦恨遲遍尋竹外賞南枝夜來已報春消息試問主人知不知和李民載梅花二首褐衣懷玉未全貧况有梅花作好春麗句與花相映發總輸天上謫仙人獨坐無聊感歲華騷人忽寄一枝花雖無素手簮羅髻已覺春生野老家後圃初見梅花一萼二首杖藜間步小園來喜見寒梅一萼開若無春意猶羞澀應待詩翁著句催枝頭已是送春來懷抱何妨試割開滿園若欲俱開遍須倩杯觴日日催梅亭蓋舊太守徐公禋所作傳者謂公得庾嶺梅移種于此故創斯亭余來相距未六十年曩日之梅已無復有感時追往因取野梅環植之仍賦二絶已無庾嶺舊時梅但見梅亭向水開遐想風流猶髣佛更將梅繞四簷栽種梅我始效徐公已覺幽香鼻觀通寄語後人無剪伐要令凋郡識春風坐間見裝成早梅數枝正欲攀條折蘂看忽驚枝上雪斑斑不知妙手新裝綴誤使衰翁為解顔又和黃清表惠早梅姑射風姿絶點埃年年長是臘前開方疑今歲無消息多謝君能折取來梅怨幾年不見主人歸及見開時又别離若也有花無分賞何如休種滿園池我與梅花素有期故應花怨我輕離巡簷索笑寧無日少待歸來酒作池雪後觀梅雨聲才歇雪漫漫深恐梅花不耐寒破曉踏泥來問訊細看枝上喜平安春色三分已一分江梅猶自占青春有花堪折須拚醉莫待東風吹作塵折梅不傍茅簷便竹籬初聞猶未許人知一枝到手春雖淺肯負花前金屈巵寒梅冰玉精神絶點埃人間無物似寒梅凌霜傲雪渾間事最是欺春不逐來蠟梅二首誰將栗玉刻蜂房巧向梢頭取次粧羞得江梅都避舍滿園不見一枝芳園林搖落獨芬芳未讓江梅雪裏香還恐人嫌梅太白故來枝上盡塗黃謝陳詹山惠蠟梅歲晚相逢眼已明一枝還復見髙情幽香不與江梅共要與夫君鬬獨清藏雲寺有海棠一樹在僧舍後竹籬荆棘之間余因勸耕偶見之遣兵移植於堂下仍賦一絶以紀之海棠一樹竹籬根密掩深藏若避人移向亭前端有意要令山下盡知春詠海棠呈子肅海棠元自有天香底事時人故謗傷不信請來花下坐惱人鼻觀不尋常子肅見示和篇復次韻花到濃時自有香未逢真賞亦堪傷今朝滲鼻渾如許豈是兹花返故常和陳子良海棠四首春來人物盡熙熙紅紫無情亦滿枝正引衰翁詩思動舉頭那更得君詩花間春色麗晴空惱我狂來只繞叢試問妖嬈誰與比一株勝却萬株紅雨後花頭頓覺肥細看還是舊風姿坐餘自有香芬馥不許凡人取次知十年栽種滿園花無似茲花艷麗多已是譜中推第一不須還更問如何領客賞海棠雪作絶艷妖嬈壓衆芳况來燭下逞新粧引將姑射神人到亦逐春風上下狂撩撥遊人思不禁也緣尤物蕩人心今宵雪向花間作應妬此花紅太深去春勸耕雲際移植海棠曽留小詩今歲困于多事欲往不果悵然有懷復和前韻以示主僧去年勸相到雲根滿樹花光欲照人料得今年花更好無端風雨阻行春寄朝宗海棠海棠已賦十分粧細看妖嬈更異常不得與君同勝賞空燒銀燭照花光和潘大卿芍藥二首落盡羣花春已殘忽驚庭下錦新翻衣深領客窮清賞一笑開懷倒數尊拂拂輕黃染御衣出羣標韻異繁枝此身已分京華隔不謂天香尚許披邦人獻芍藥四種曰御愛紅曰霓裳紅曰綴珠冠子曰紅都勝因同朝宗夜飲賞之遂成二絶以記一時之勝冠子綴珠初泣露霓裳舞袖更縈風就中縱有紅都勝淡佇爭如御愛紅芍藥移來傍玉欄淺深濃淡一般般夜深促席來相就要把春容子細看東湖觀荷有感自有東湖知幾年荷花今日尚依然堪嗟世事時時改祇有荷花歲歲妍雙頭並蒂出天然呈瑞懸知好事連果得故人來對飲何妨一笑到金蓮再見雙頭蓮我來才見月初圓兩度池開並蒂蓮嘉瑞還來非偶爾懸知連歲有豐年謝王祕書送桂花病中恨不見花開賴有仙郎折送來一笑相看如有得呼兒草草具樽罍桃花菊秋來不謂見春華疑與春風是一家已向枝頭開菊蘂更來菊上作桃花名園看盡好花枝黃菊施朱獨未窺應是天憐秋寂寞故分春色到東籬賞山茶向晚佳人逞艷粧偶隨月姊到山房自憐老去無佳句亦復冥搜為發揚和子儀送箭筍二首與君林下久相從蔬筍由來嗜好同不餉腥羶惟餉此想應知我舊家風滿合圓如玉筯勻一開喜氣頓生春非君與我誰知味俗客惟誇嗜八珍和陳義卿秋香小園無處著清香誰剖枝頭栗玉黃可恨楚人元未識只知蘭芷是孤芳和周明瞻秋香五首落葉初辭萬木林誰將翡翠屑寒金朝來散入亭前樹著處幽香欲滿襟月窟仙人冷淡粧鵝黃衫子翠羅裳雖無妖艷誇塵俗别是人家一種香惱人風味冠江南浪蘂浮花總覺凡對此自宜文字飲不須更倩玉纎摻山腰水際有餘青造物多應特稟靈桃李無言甘避舍可憐黃菊強儀刑已愛清秋霽景鮮山明水秀竹娟娟更來花下成真賞頓覺飄飄意欲仙夜飲觀風堂龔漕折芙蓉侑酒燈下看花已可人此花那更有精神不辭今日尊前醉只恐紅粧不是真再和坐上花光欲照人深疑花是洛中神已拚今日如泥醉何必須分妄與真和王知府惠雙井茶摘從雙井尚餘香逺寄山翁見未嘗咀嚼新芽味新句陡驚氷雪沃枯腸梅花下飲茶又成二絶昨日花前酒太過今朝怕見近流霞不應辜負花枝去且嗅清香倍飲茶強拈茶碗對梅花應是花神笑我多更取香醪拚一醉不禁風味惱人何桂堂長恨年年月窟秋無人共拍酒船浮君家雙桂開時節我欲從君載酒遊和戴解元雄飛瑞香二首芳心似與春風約絶豔還宜曉日籠雖謝幽人持贈我對花無奈憶山中碧玉扶踈自可觀花頭纒錦更團圞坐來已覺明人眼况有幽香馥鼻端感花春雨不止花已離披終日感傷因成八首正欲持杯賞萬紅却遭連日雨兼風種花欲看難如此可是衰翁賦分窮年來老病苦相侵已是傷春不自禁那更雨聲長在耳連朝滴碎惜花心雨腳才收擬杖藜簷前依舊又埀埀倘余有分花間醉會有風和日暖時縱令日日醉春風已恨花無十日紅何事東君長作惡不容春色麗晴空千花到底不如梅勝賞猶宜踏雪來今日滿天長是雨如何花下得徘徊春來日日欲尋春樂此踈慵老大身豈料青春今過半蕭蕭風雨却愁人嗟我明年是七旬此生能見幾畨春憑誰為補青天漏放出春光處處新一雨綿綿不暫停天公於此底無情不應直待花飄盡始放陽和作好晴飯客看鶴賞梅遇雨有作鶴舞梅開總有情小園方喜得雙清無端風雨妨遊覽不使衰翁眼暫明魯漕惠鹿鶴花果鏤果團繒宛似真尊前一見喜生春感公持此為余夀益悟浮生是幻身和梅花前見鶴雙鶴翩翩到我前與花鬬白更爭妍低頭自覺形儀穢安得飄然跨上天松嶺君愛山間十八公儼然風操出樊籠四時已占青青色更有松黃勝萬紅三三徑種成松竹與江梅杖履相過日幾回莫謂箇中三友足也須更許老夫來進賢道上老松竒古可喜去秋經從因命於空處補種今漸有生意來時惟愛古松青去日新松種已成令尹若能終此意清風著處會知名昔杯渡禪師自西域開山隱靜止携五葉松來歲月既逺余求此山中之松已化為烏有矣護國逺老知余此意偏搜之天台山中得於玉霄峰下移以見餉遂為林下之光因詩以謝之杯渡移從西域來一枝五葉翠成堆謝師致此為吾夀使向湖山深處栽詠松古人長抱濟人心道上栽松直到今今日若能增種植會看百世長青隂古邑荒涼但有松濃隂夾道勢騰空行人破暑忙歸去未必茅簷有此風濠水纍年不泄魚既充牣每觸熱輒死余既濬治市河因開水門導之入江遂作放魚二絶局促汙池幾歲魚想應日日念江湖如今放汝非無意亦欲天公放老夫我今縱汝入江中好趂風雷早化龍只恐為龍行雨苦碧波深處且從容贈方山人二首日者俱云我未歸獨君算我有歸期仍言不出三秋裏東望家山喜可知故山久已辦莵裘得去欣聞止在秋涉世安能長戚戚收心只欲罷休休再用示方山人韻二首暮年不是苦思歸已約湖山恐失期此意有誰能會得秖應猿鶴是相知不羡千金狐腋裘只知飽暖度春秋如今萬事皆踰分此外何求更不休送朱彥先歸鄉西風一夜掃殘枝處處寒砧搗客衣我正思歸歸未得却于江上送君歸客有善畫者取豫所和歸去來辭圖之成軸仍為老者寫照於其間感而有作勞苦形骸不自知朝來始向畫圖披可憐憔悴今如許更不歸休待幾時到儀真沙河阻風三首快意由來未易逢順流却值打頭風篙師知是江神怒引棹重回小浦中求退那知却冒遷天心人意古難全今朝行役還堪笑下水船為上水船連日狂風已作難今朝濁浪更如山江神堅我歸田志故示危機一水間會賈守邀許倅有感當年婺女三人别今日姑溪一席同老去光隂能有幾相逢莫放酒杯空宿霧濃雲撥不開更傾驟雨下天來天公也喜人歡聚故遣斜陽送一杯贈余居士二首君知我意欲休官却道如今未得間萬事無求惟一退天公于此不應慳我老祗思還舊隱君今更為卜新阡餘生得此夫何欠所欠歸來一溘然余壬戌春校試進士同事者五十五人至戊子歲因閲小録所存者止四人感而有作二首校試羣才一日中當時五十五人同二十七年零落盡只存我與二三公只存我與二三公可歎人生瞬息中縱使老來身未死知能幾度見春風久擬重陽一登龍山以荒榛峭壁無容足之地欲訪昔人風帽遺址竟不可得遂領客之凌歊偶成四絶登髙自古説龍山擬訪遺蹤去路難賴有凌歊臺尚在不妨懷古憑欄千當年宋武築凌歊人去臺空氣尚豪欲弔興亡無處問且憑茱菊薦芳醪下車日日欲登臺直到重陽始一來好對江山拚酩酊此懷能得幾時開宦情一似秋容薄歸興渾如酒味濃臺上望鄉何處是夕陽影裏暮山重伯洪以鐵拄杖見寄二絶謝之應念衰翁老且疲年來跬步要扶持鐵為拄杖勞相寄全勝花前只杖藜鐵杖君家收幾年更原古意賦成篇寄來豈為資扶策應見豫心老益堅和任路分喜雨一雨歡聲已沸傳更觀佳句倍欣然一時果遂為霖望會見重書大有年喜雨三首鑠石流金苦異常行人誰不困秋陽狂風忽送排簷雨滌盡炎威作晚涼昨朝偶得碧琳腴不敢濡唇畏暑塗雨過涼生襟袂爽不妨傾倒且踟蹰畏暑停驂憩驛亭不知郭外雨如傾晚行但覺通衢濕涼入郊墟分外清喜雨正憂麥稿井泉乾一雨中宵忽沛然莫恨梅花憔悴去且欣新緑盡歸田雨後破雨衝風萬騎趨人人輕捷過飛鳬要須直搗天山去趂取河氷塞稿枯喜晴始喜晴天照眼明忽驚風雨報秋聲天公也念悲秋客還掃羣隂作晚晴晚晴三首洗盡妖氛喜乍晴風生萬馬四蹄輕天時人事俱相契敢有纎兒更弄兵時巡中外已歡呼那值天晴喜浴鳬路上捷音良可慶王師所至若摧枯三分春色二分過那更連宵風雨多試向園中問消息不知還尚有花麼和許守遊春玉蘂瓊葩壓衆芳一時縱賞擁如墻花邊笑索銀瓶酒知是誰家白面郎結客行行入翠微桃源深處醉芳菲狂歌不減劉公幹盡日花間坐不歸尊前莫惜千金費醉裏能令萬事輕須信人生行樂耳此身何用絆浮名括蒼胡經仲以經術授吾鄉子弟僕頃過錢塘得吾兄永言多益及友人孟世功書未嘗不以得交經仲為言且以其往還詩什相示已決知經仲非塵埃中人矣春初歸自錢塘遂獲識經仲於齋館信數公之知人交道之不朽一年之間凡三相會從容談笑者蓋十許日而詩筒之循環來往曽未嘗輟而僕之心猶以不得朝夕見經仲為恨也一日經仲來訪席未定乃謂僕曰吾將歸鄉明年不復來此矣僕念經仲之賢交遊中所未有顧世方擾攘會合無期臨風語離殆不勝依黯因誦老杜人生足别離之句作五絶以送之風期久已暗相親尊酒論文未厭頻底事天公苦乖隔動將離索付騷人明日離尊難重傾且停征馭話交情知心自古不易得况是途窮賴友生君詩字字凌珠玉入手卷舒看不足别後襟期儻未忘會寄筠筒入空谷窮冬萬木凍欲折獨有松篁抱髙節貧交無可效殷勤持此與君聊贈别吾儕生長太平時不謂年來逢亂離此别要煩君自重相期重築太平基二十七日泛舟偶成小舟遊漾小池中偶與吾人笑語同好把釣竿煙雨裏一蓑放我作漁翁登舟天憐行客困陽秋許捨車徒上小舟十里好風祛滯思一溪寒水助清遊去郡登舟偶成一絶脫得身來上短篷飄然初試一帆風孤城回首知何處秖有凌歊在眼中四月二十一日同妻孥泛舟登吕氏濟川亭二首不到茲山二十秋重來山水更清幽無因得向巖前住日日持竿上釣舟吕公清德著吾鄉生愛茲山死便藏顧我來遊雖恨晚尚思杖屨共徜徉渡錢塘江萬頃煙波一葉輕風來枕上覺涼生我行觸熱渾無奈却喜身心得頓清寄龔帥今朝駛步忽來前報道除書下日邊閫寄復歸賢使者百城聞命想欣然雖喜英賢帥十連却慚粳粃濫居前自知未免人揚簸願使衰翁晚節全行李看看近故廬夢魂猶自繞洪都帥垣暇日登臨處把酒還能話我無歸自郡中道上口占禾黍離離壓道旁蹇驢歸去晚風涼揚鞭西指吾廬近想見新醅已可嘗六月二十一日早行十六首四更山月吐微明起促籃輿趂早行忽聽疾雷催雨急風生襟袖不勝清稻苖初穗出紛紛半是青雲半白雲坐看黃雲呈上瑞田家無處不欣欣病軀終日困驕陽正慮行行去路長多謝天公憐此意時飛踈雨作清涼為憶湖山且暫歸此心不是要追時君恩留我非由已寄語山靈莫勒移欲挂衣冠已上章更令衝冒去南昌南昌縱有佳山水爭似安間在故鄉雨後西山氣象新野田髙下水津津晚來弛簷臨風坐聒耳蛙聲更可人古寺經行知幾回山僧又見我重來暮年欲作終焉計不得歸休只自哀籃輿亟欲到柴門終日驅馳亦苦辛野外莫嫌車騎少笙歌兩部自隨人蟬噪園林處處同此蟬鳴處顫春風秖應寒餓全無力吟不成聲喙已窮東望吾廬百里間二年别去一朝還雖然未遂歸休意且對湖山一解顔出入鄉關四十期勞人迎送每慚之今朝單騎歸來速且喜鄉人都不知不見湖山兩閲冬相思千里夢魂通今宵燭下匆匆看猶恐歸來似夢中竹間幽徑喜相通花下清隂苦未濃説與園丁勤灌溉我歸要此養踈慵漫來水上結危亭更憑欄干聽水聲洗得肺肝清似水莫言亭下水無情只愛湖光似鏡平那知洶涌作潮鳴直疑身在江船上夜半更聞風雨聲暫歸祇欲見湖山多謝親朋日往還但愧年衰筋力憊將迎容我片時間久欲乞歸未得一日蒙恩放歸不勝欣喜塗中得十五首今日方行第一程看來已覺此身輕若還歸到湖山裏何啻乘雲上玉清我病只宜投紱去君恩却許奉祠歸小人報國非無志正恐叨逾觸禍機東去匆匆不暫停我於此地豈無情秖緣衰病歸心切不憚﨑嶇趂曉程來時似覺秋猶熱去日忽驚秋已深一去一來何所益不如歸去舊園林老夫非是厭洪都正恐沉迷失故吾縱使東湖花似錦不如歸對小西湖邦人送我説殷勤自愧初無德及民若更躊躇不歸去猿驚鶴怨亦愁人去年來見荷初敗今歲歸逢菊已殘殘菊敗荷渾似我縱餘芬馥豈堪觀記得年時入境來老分閫寄懼非才今朝遂出洪都去笑指故山真快哉夾道喬松幾度春青青黛色四時新當時若盡荒郊種萬頃清隂更可人欲寒還暖雨還晴極目秋郊景色明應是此歸天亦喜故將風日作人情無日無時不念歸此心宜有鬼神知如今已作終焉計寄語山靈莫勒移荒墟忽見翠成堆錯認青山入眼來元是松林如此好不妨歸去更勤栽路傍遙見一山居歡喜猶如見故廬見似故廬猶自喜如今到後喜何如兀兀籃輿足欲拳聊扶藜杖步山邊招提此去無多地且就僧房借榻眠淡煙斜日媚郊原中有人家似輞川地側忽驚車馬過三三兩兩竹籬邊九月二十六日同朝宗澤民遊洞宫用劉使君韻二首雲藏仙窟幾何年一旦來遊豈偶然造物應憐林下客故令一覩洞中天愛遊此地已多年今日身心始豁然洞裏真人雖羽化蒼蒼喬木自參天如老堂少年有志覔封侯老去知非萬事休薄有田園能自適不妨賣劔買黃牛一堂風月一床書隨分琴樽樂有餘試問乘軒遮道客何如歸去狎樵漁種德堂我本農家世賤貧一門相繼亦簮紳當知來處非今日莫學詩人只為身觀十二弟種德堂詩和其韻萬事忘懷付酒尊長間不厭客登門但存心地平如砥勝買黃牛教子孫竹塢此君生長此山中直節從來自不同今日髙標還卓出萬人誰不仰清風雲龕君將富貴等浮雲却許白雲來就宿靜處何妨共一龕免教隨手翻還復入界日炙風吹人倦乏山重水復路縈回一畨行病思休息且喜今朝入界來送津還任汝到庭闈話未終若為行色又匆匆要知只有歸來好便做三公亦是空三七姪入新屋華屋新成集賀賔門闌盛事一畨新願言積德髙於屋屋下長存百歲人我昔行年近六旬辛勤才有屋容身汝成廣厦年方壯端是吾家有福人送姪赴廷試我是田家本業農偶然兩世到蟾宫書生天幸有如此豈復更憂吾道窮一第男兒未足誇喜傳衣鉢振吾家大廷好上千言對要使聲名播邇遐上林躍馬看騰驤父老猶言昔日張顧我兒曹殊未學敢將蹤迹繼前芳邦人言昔張侍讀之子寺丞登科東坡曾寄詩以相慶詩中有洗眼上林看之句和康伯可重陽過了重陽又一陽梅開亦擬共壺觴病中無復成狂飲且作前賢醒裏狂掃墳東山感舊示十五姪四十年前此讀書與君俱欲上亨衢君雖未達心猶壯我已衰頺作老夫梅花下聞角聲兀坐江城厭寂寥喜逢春色上梅梢寄言畫角休吹遍留與鈴齋作淡交睡中聞鶯解鞍蕭寺憩清幽睡裏忽聞黃栗留驚破夢魂何可恨得知身在浙江頭敗屋有感甲第巍然數百間一朝人去頓摧殘寄言行客休興歎但積隂功後代看悼王習之兩州佳政萬人傳一旦那知遂溘然到底久生從古少要須乘健早歸田嘲欽師師與豫心總愛山從來已許伴豫間若為一出俄經月却戀塵凡未肯還贈逺老一瓶一鉢自由身聊向江南玩水雲踏遍千山并萬壑却歸林下炷爐薰送安老師走叢林不計年若為猶未了因緣萬年有路何妨去透取無生不二禪和逺老韻二首平生痼疾在煙霞到處林泉是我家若也逺公容入社直須酤酒不須茶欲訪天台帛道猷夢魂先到石橋頭箇巾直待桃花放始得從師爛漫遊送明老遊鴈蕩五首昔年曽作鴈山遊倒指今踰四十秋嘆我豈勞蝴蝶夢羡師重到大龍湫師到龍湫謁矩羅為言别久渴心多當年見處祥光滿試問今還記得麼吾兒此地偶鍾英紹我家風尚典刑所幸吾師知此意殷勤為我謝山靈方欣林下共談禪底事深公挽出山千里同風無道俗何妨一笑便言還遍參尊宿走諸方老去才能返故鄉漲水飛雲前輩語他鄉莫更久徜徉和逺老四首事好休時便好休不應人盡覔封侯歸來已快平生志况有髙人來聚頭身居仕路夢家山一日君恩放我還從此便為終老計秖愁造物靳清間世人老去不知休秖羡三公與五侯爭似山僧都不會困來衲被便蒙頭相逢正好共看山底事匆匆便欲還今日乍晴山更好可能伴我片時間上七齋素不飲人日晴天萬里開自應一笑上春臺清齋偶阻花前醉且把茶甌當酒杯送津赴紹興倅八首讀書已負少年時老大空踈愧我知汝肯為余償此志雖窮亦是起家兒山色湖光足自怡幽棲無一不相宜只嫌野外遊從少汝早歸來共樂之汝辭秦邸佐名藩端為親庭數舍間數舍相望雖不逺爭如在側日承顔當年我鎮卧龍山曽種千花與萬竿歲久不知無恙否因來且為報平安我曽開鑿鑑湖田功竟難成愧昔賢汝謁馬祠須問訊此湖興復是何年出仕曽塵侍從班退休還得老湖山已慚過分無他望只願吾兒相對間我辭官路已多時魂夢今猶畏險巇汝既飽諳遊宦味會須早作箇歸期人生萬事不如歸只恐歸來不及時汝若能為陶靖節我身勝到鳯凰池山居上元未能免俗強隨緣聊挂燈毬記上元席上雖無羅綺繞遊人來往亦喧喧十六夜見月連宵待月屢登城特地遮藏不肯明過了佳辰方皎潔嫦娥何事太無情代答人生何用苦多憂無日無時可宴遊但使此心忘係纍涼天佳月即中秋甲子日無雨偶成連歲人懷水潦憂年登猶歎不全收夏逢甲子天無雨預喜今年又有秋和許守松隂喬松轉日影斜斜穿入踈櫺細作花怪得清隂長不改原來松下蟄龜蛇題心逺軒二首山居我欲避囂塵尚覺門庭俗客頻羡爾結茅當道左一軒風月作間人扁榜當年我命名喜君心與迹雙清眼前風物渾如舊但覺庭前春草生和劉與權韻三首平生嗜好唯愛山前身疑是山中相歸來深處得幽棲柴門正與山相向去年君過我山中尊酒相歡十日同别後相思腸欲斷暮雲空復指江東異縣相望兩驛間何時復此共看山向來同社今無幾莫惜籃輿數往還陳子厚送韶鴨將以七絶因次其韻久聞韶鴨有靈蹤首尾俱輕快御風公獨惠然持見贈應知野性與余同興在江湖萬里間汙池一曲豈能安今朝來我西湖上眼底陡驚天地寬湖光深處恣沉浮未讓波間鷺與鷗舊侣此時應羡汝欲來相就苦無由朝朝兩兩下平沙添得湖中景趣嘉碧卵從今生育去便堪裝點作漁家投迹山林不厭深老來寧復計升沉水禽得得來相伴應識幽人一片心初來便自與人宜相近相親自在飛底事悠然無畏忌也知老子久忘機雖是微禽亦美觀豈無繒弋欲相干不須更起髙飛念且向湖中戢羽翰題圭師松雲庵一瓶一鉢一枝笻皓首歸來萬事慵應笑白雲猶世態却來庵外媚孤松附録文二首代廬州守進秩謝表帝綸中下天澤外同加瑣闥之清聨守肥陵之舊壤承恩優厚無已戰兢中謝伏念臣才能無它仕宦素拙久塵汚於侍從無補益於絲毫復此拜嘉惶焉增愧念恩非所宜當則皆為無功之食惟命出而不反則又將無説以辭此蓋伏遇皇帝陛下龍德興潛離明照隱上眷以承天心之重下安以慰物望之深顧雖無庸例亦有命簿書斷斷未瞻天日之姿恩渥洋洋恭被雷霆之澤祿隨寵至榮與愧兼惟懷忠赤之一心以謝生成之大德臣無任姑溪集序李公端叔以詞翰著名元祐間余始得其尺牘頗愛其言思清婉有晉宋人風味恨未覩他製也乾道丁亥假守當塗因訪古來文士居此邦而卓然有聲于世者惟李太白郭功父與端叔三人郡舊有太白功父集而端叔獨缺然求于其家而子孫往往散落無復遺藁間得之邦人類而聚之命郡士戴翬訂正釐為五十卷鋟板於學昔二蘇於文章少許可尤稱重端叔殆與黃魯直朝無咎張文潛秦少遊輩頡頏於時今觀其文信可知已或謂端叔晚節鋭於進取有所附麗雖若可疑然范忠宣公遺奏極於鯁切詆斥不顧一時用事者欲置忠宣之子於理端叔慨然自列謂實出其手既而公所為忠宣行狀復出由是得罪南遷廢錮終身曽不少悔其勇於義若此詎可以微瑕掩之哉余固愛其文又表其行誼之可嘉者并以詔於後云端叔名之儀其先景城人既謫而南始居姑溪自號姑溪居士今以名其集天台吳芾序
