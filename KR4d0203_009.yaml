body:
  text: 湖山集卷九宋吳芾撰五言絶句題商樂菴遊戲一橘中自謂有足樂何如在商山笑傲視寥廓芳洲秋風雕蘭芷芳洲久寂寞痛飲讀離騷此興亦不惡詠松幸不生澗底傑出蒼蒼崖歲寒只孤秀萬木非吾儕送白酒白蓮與鍾統制錢廣文因成二絶甕頭白酒熟池上白蓮開我愛君純白聊持薦一杯白酒方浮玉白蓮仍可人贈君飛大白聊作冷官春六月末間拒霜已開暑氣猶未退寒花早已開哀年寧有幾寒暑若相催香叢緩步繞芳叢時時鼻觀通不須薰百和滿院是香風生朝有感每嵗逢生日豫心喜復悲新年六十六能得幾多時小有洞世人競蝸角終日汩塵緣誰謂名園內深藏小洞天虞兵張宥康永年未六十一日相繼力求歸農余因嘉其志作小絶以紀之仕宦老不休虞兵乃知止低頭愧斯人三嘆不能已芙蓉誰向澄波上盡將雲錦鋪無因一寓目却憶小西湖前太守仲求石問留題因和三首不解追時好尤非治郡才故山猿鶴怨應怪未歸來度力難堪事甘心作棄才欲歸歸未得却悔出山來此日老法從當年窮秀才從今歸去好非不遇時來題日涉園幽園足佳趣散䇿日經行嵗久禽魚熟人來自不驚題閲嵗亭歲月催人老少年安在哉羡君杯酒裏日日見花開題望雲亭白雲來何時英英冠山椒西風莫吹去使我心搖搖蒙恩易鎮豫章丐假還鄉途中偶成十七首處處是紅蕖分明似畫圗匆匆看不盡歸對小西湖官舍似郵傳宦遊如路岐吾年行七十安用苦奔馳觸目盡陂塘山光接水光近來仍雨足莫道是山鄉方困長塗滑俄逢赫日明只憂開太早却恐雨還生沙虛防敗岸舟小怯驚湍行路難如此爭如野處安劇暑當三伏新涼似九秋日光還欲吐雲影未全收中夜不能眠頗疑天有雨寒燠自古然不應冷如許自江至吾廬七日喜及半却恐席未溫又過江南岸村徑迷南北晨興乃錯行悟來還已逺却悔早貪程崇閣瞰方池池邉緑樹圍披襟臨水坐寧復畏炎威雨餘江色淨風過稻花香客裏逢清曠何妨且納涼逰魚跳水面幽鳥囀山腰各隨飛潛性人猶戀市朝睡裡聞風雨吾行擬暫停起來搔首坐喜見一天星蒼崕崛地聳飛瀑從天下一嶺跨兩州千年無九夏兹嶺别二年今朝又重過過了還復來哀哉蟻旋磨兩山夾蒼煙雙瀑挂峭壁洶湧非一朝傾瀉幾千尺千尺石屛雄屏邉列數峰巍然不可犯真是鎮疆封和任宰元紹見寄十首以歸來問信湖山撫摩松菊為韻出仕慚無補長年詠式微天公憐我意一旦許來歸緑鬢久埀雪壯心今已灰翩然歸舊隱端似再生來身既逺市朝足不到州郡但知食與眠此外不暇問秋來宇宙清雨後山澤潤老農喜我歸時報豐年信四圍山繞舍一帶水平湖逺近俱堪畫登臨自足娛開門無一事終日飽看山石罅鳴流水翻驚響珮環間穿修竹行時把孤松撫身世兩相忘恍如居洞府人心生劔戟世路足風波秖有歸田好誰能自揣摩為邑赤城下豈欲尋赤松我家幸不逺杖屨會相從新詩逺寄將字字脫塵俗時莭近重陽何由同把菊六言絶句春盡同諸公逰紫巖各賦六言一徑草深迷路萬點花飛到天明日定知春去秖今便是殘年和劉與仁見寄雞黍經年契闊池臺落日登臨千里空勞回首一尊誰與論心七言絶句和左達功英豪何事亦顛隮命兮多應與我齊尚有他年功業在未應歸去把鋤犁和林大任三首融融春色滿花源楊栁隂中繫畫船笑逐鼇頭花下去旌旗夾道鼓淵淵蘭舟泛泛漾輕風十里桃花一望中疑是餘霞天外落不應花解滿山紅花繞禪房水更深靜中啼鳥有嘉音我來已覺心如水不用臨流更洗心和隱老見懷二首獨立溪頭悵望時髙人遺我送春詩不知春色歸何處月落空庭費夢思咫尺經時阻笑言春歸空想給孤園一聲啼鳥山深處宴坐蒲圑未覺喧和天豫二首自昔常難四者并一杯相屬意非輕秖今欲破愁城去賴子時來舉酒兵吾子才如千里駒肯同泛泛水中鳬乘時早取封侯印莫憚郊原骨已枯和金功叟二首兩家誕日俱延客長恨無緣笑語同輒奉朋尊聊介夀願言百嵗亦如翁君家今嵗受恩封共慶夫夫婦婦同况遇誕彌尤可樂願拚沉醉似仙翁再和天豫二首行軒未用苦相催花下清尊正欲開君若此時留不住何如當日罷休來中秋花月共徘徊正喜相逢笑口開君既不留吾亦去何時又向此間來和梁次張謝得酒見寄四首傳得仙家不老方釀成春色甕頭香一樽聊爾資杯酌爭似相携入醉鄉春入橫塘緑勝醅更將清淺照寒梅試吟秀句臨流坐引得疏枝一晌開妙齡才氣壓同升談笑端能却五兵况復錦囊新且麗粲如春樹萬枝榮平生性僻有詩耽每恨才慳不得兼獨嗜君詩無厭斁從教人笑我多饞有感十首當年舊迹已塵埃曉日猶疑講殿開涕淚不知黃屋處傷心時有北人回延福池臺荆棘深上皇無復更登臨寂寥崇觀當年事愁絶關河萬里心洛邑塵氛暗不開百年宫殿總成灰柏城晝日風蕭瑟不見朝陵敕使來塞曲咿嗚催斷腸氊車轣轆載啼粧漢家近屬三千客性命如絲寄虎狼革芥蕭然十閣珍車中粧具不時新留犁服匿誰供給臺閣悠悠食肉人蜀錦機中瑞鶻盤宫袍嵗嵗給千官朱門次苐皆輕暖御所空悲易水寒雪壓穹廬風怒號紛然羊馬雜腥臊遙知玉座無餘地嘆息功臣甲第髙河山關塞一萬里文武衣冠二百年四海蕭條宫殿去無人解道取幽燕漠漠黃雲塞草低南人空説翠輿歸孤臣淚盡仍嘗膽白首江湖鴈北飛宫院深深今是非可無三户報秦期直應更作包胥泣未抵含寃屈宋詞寄韓子雲總領與君有約看梅花凖擬尊前共笑歌花已飄零君不至夕陽芳草奈愁何再和絶句寄韓子雲開盡千花到藕花相將又聽採蓮歌無人共酌尊中醁奈此花前風月何寄韓子雲二首去嵗花時許我來花前竟阻共銜杯如今又是花開也忍使衰翁獨看梅點檢枝頭春已來不應辜負掌中杯與君索笑須宜早莫待城頭吹落梅得子雲和篇約元宵見訪再用前韻以速之二首聞道元宵始肯來見梅説與且停杯行將有客同清賞雅致髙標一似梅花開本是待春來天遣春先薦我杯君莫疑花開太早相思一夜發寒梅相思一夜寒梅發忽到窗前疑是君盧同詩也錢丈處和和所寄韓子雲約賞梅絶句復用前韻謝之三首錦囊新句忽傳來字字清如竹葉杯要須莫放傳杯手看即歸調傅説梅麯生為我惠然來陡覺春浮瀲灩杯飲罷冥搜無好語但將風味屬江梅竹符驅我出山來萬事無心付酒杯又見江城春到也傷情却憶故園梅寄朝宗二首湖水春來拍岸平山光幻出小蓬瀛幽深未許凡人到只待君來共落成海棠已試十分粧細看妖嬈更異常不得與君同勝賞空燒銀燭照花光贈張發日給都來能幾何汝能受少却辭多試詢世上無厭者還有何人肯恁麼代張發答天作凶荒可奈何飽人漸少餓人多小人已免飢寒迫縱得錢多待恁麼括蒼陳與叟携所撰春秋義例見過書于卷後獨抱麟經三十年發揮褒貶勒成編休嗟當世知音少自有遺書後代傳元夕即席呈郭次張過了元宵到曉鐘一年樂事又成空杯行不用深辭醉明日君西我亦東七夕戲成二絶時入三秋氣已清莭臨七夕露初零如何老子臨風坐也望天河牛女星寄語天河牛女星人人乞巧望聰明老夫養拙生憎巧只要冥心度此生送酒與諸葛宰由來康濟屬仁人公更慈仁酷愛民聞道憂勞添瘦悴遣愁聊送甕頭春送朝宗兼簡閩帥年來知我不如公日日相思恨不逢君若見時須問我為言老子已龍鍾今日春色可佳乘興謁許倅因成小詩春入風流别乘家滿園桃李掞春華殷勤為我傾醇酎要看庭前百樹花許倅索和萹復次前韻十分春色在鄰家我獨傷心感物華君若此時辭痛飲也應辜負後園花安仁絶覽亭簷前列岫連雲聳亭下雙溪徹底清可但坐來無暑氣老夫病眼頓增明滕王閣盡道滕王閣太卑合新舊觀復雄規我來興葺非難事却恐俱為識者嗤題臞菴輕視浮名若一毛名園百畝占江皋三賢祠宇誰重葺何不添公作四髙遊仙都觀五首來訪仙人古玉虛山前有客指迷塗煙雲渺渺孤峯絶松竹森森一徑迂策杖行行入翠微步虛山下久忘歸幽棲宜有中林士何事斯人近世稀聞道山顛有鼎湖蓮花還似舊時無軒轅去後空車轍疑此山川即舊都人已乘龍去不還尚餘雙鶴不知年坐來頓覺塵寰隔始信壺中别有天登攬兹山古到今流傳今有幾何人如君勝踐懸知少况有新詩為寫真題蛾眉亭用內翰沈公韻幾多去棹與來帆競利奔名一水間應怪行人渾不悟臨流長是蹙眉山權郡許丈餞别於蛾眉亭悵然有作此邦是處見蛾眉獨有斯亭見處竒對此已添離别恨可堪更值夕陽時醉中偶有所感再成一絶倒著山公白接籬尚懷前日醉蛾眉江山風物還如舊秖欠波問玉笛吹去年會客斯亭酒半命漁人吹玉笛江中月墮醉歸夢中縹眇猶有餘韻緬懷舊遊故有是句酒酣再賦一絶二年兩度到蛾眉今日還來話别離所恨行人難久住酒闌不見月明時題枕流亭山涵倒影新晴後水漾圓花乍雨時每到憑欄心似鏡細看無一不相宜題戴雄飛腴軒詩四壁蕭然萬卷書時人莫認作癯儒他年得志英華發始信胸中味道腴過姑蘇遊宦重來二十年江山風物總依然道傍民吏猶相記獨怪吾衰雪滿顛新創太平樓未及落成而去漫留一絶登臨秖待此樓成要與邦人樂太平甫及樓成余已去匆匆一眺但凝情早行五首畏暑凌晨更疾驅疏星影裏度籃輿忽驚道上人如堵知是田家出趂墟此地惟多古樹林路傍處處足清隂行人九夏熱如火到此清風忽滿襟長塗終日困炎蒸破曉扶衰強趂程好是籃輿橋上過一鈎斜月水中明跋涉州塗僅八旬今朝才得次安仁更須五日為行客方得開藩見吏民我無政術強為官所至將迎每厚顔何事深村赤腳婦亦聞鉦鼓出籬間睡仙樓此壚當日飲神仙醉倒和衣壁上眠酒醒興闌人不見但留佳話古今傳題惠照齋宫僧房古木修篁翠欲堆小窗那更面山開誰知局促塵埃裏猶有山光入眼來題許倅浮香亭二絶一新欄檻水中央更植踈梅向水傍只恐花繁亭太小黃昏無處著清香為愛梅花不自禁擬分風月到花隂水深草滿都迷路秖向暗浮香處尋言老自雲堂携十六大士畫像見過與世間傳寫者不同驚喜贊嘆因成二偈禪月定中觀妙相神竒古怪乃如斯起來援筆一揮掃驚殺人間老畫師水旱無憂不用祈秖祈心事莫相違我今衰老渾如許惟仗神通放取歸題鍾路分見一軒二首名利場中車馬塵區區有愧百年身如君未老甘間退眼底今方見一人懶將功業勒燕然閉户深居二十年嗟尚強顔紆郡紱老來猶未得歸田夜與作霖避暑南園登江月臺二首坐遍遐觀渌照亭涼飈了不到簷楹更登江月還蒸鬱誰道人間夜氣清俯瞰江流萬尺臺暑天長引好風來若為今夕如相避懷抱何由一快哉捉月臺謫仙捉月古今傳我訪遺蹤似未然山下濁流長混混夜深安得水中天月巖半輪斜月挂巖邊見者多應嘆未圓圓極會如鈎樣曲何如此月鎮嬋娟遊月巖仙人蛻骨幾何年姓氏于今祕不傳石壁蒼崖無處問空餘洞府尚依然平生性僻喜巖居事不如人只守株擬欲結茅依石罅仙人還許我來無月沼大道從來惡滿盈脫身便欲老巖扄杜門漸解埋光意積水姑為半月形豫赴官當塗絶江而西夜宿慈嚴秉燭遊三洞時主僧出示諸公留題因用樂天韻成一絶洞中風水鎖松筠一見都忘老病身安得結茅長此住臨風臨水作間人再和諸公得得走車輪要向忙中樂此身我昔不來今日到始知枉作把麾人昔白公蘇公祖公在郡之日皆領客遊是剎留詩而去余甲申之冬雖自天官出守是郡竟無此暇日故有感而賦夏日遊靈隱東園贈東方道人松竹回環十里隂一聲啼鳥覺山深道人睡足北窗下一榻清風直萬金十五夜南園納涼兀坐鈴齋困鬱蒸舉頭忽見月華明興來䇿杖園中去聊復尋山聽水聲初至豫章二首邦人喜見我之官疊足駢肩隴畝間莫道使君來已暮使君知是愛求間邦人知我入城闉夾道焚香喜色新愧我倦遊灰百念顧將何以慰斯人過許氏居小崖水畔得幽居一見令人憶故廬幸有山圍并水繞天胡不放我歸歟陪梁大諫陳察院同登蔣山盡室齋心謁梵宫願求一語卜窮通老夫祇欲歸田去懶把前程問志公憩慈雲寺幽人不見許玄度千載徒存舊梵宫水竹回環猶可愛徘徊山下想遺風登進賢縣治後山望雲亭古木干章翠欲交白雲疑只在松梢公餘莫惜頻登眺無限風煙滿四郊登望雲亭記得來時上此亭亭荒有景亦徒清如今亭與景俱勝水倍秀兮山倍明倚樓獨倚危樓一望長惱人情處是斜陽神州更在斜陽外縱使無情也斷腸東樓落成二絶荒郡城樓久已傾我來聊復為經營南樓已是增雄觀今日東樓又落成人道樓前礙甕城無多山色到簷楹那知皂蓋行春日却與春風最有情北樓二首不分羣兒敢跳梁向來走馬飲長江兹樓不是為觀美要向樓前受敵降折衝自古在精神從事兵車亦苦辛羽扇綸巾前日事尚能談笑靜風塵題總持寺龍井洞庭歸去幾何年旱嵗猶來澤我田我訪遺蹤雖已泯靈泉百尺尚依然過金陵當時護蹕此盤旋倒指重來僅十年決策遷都言漫切自憐微力莫回天題金山四首江上經行四十秋今朝始得駐扁舟老夫寧復重來日欲去殷勤更少留老大疏慵百不堪倦遊猶未脫征衫君王若許投簮去擬與頭陀共此巖北望瓜洲咫尺間向來白骨積如山欲論舊事慵開口且對髙僧共説間人言海上有三山弱水瀰茫去路難若欲目前尋髣佛只須來此憑欄干寄題隱靜三首五峯雙澗舊標名我恨當年去不成却羡箇中人自在飽看山色聽泉聲向來連嵗守江城到處題詩滿户庭獨欠兹山一轉語倩師與我謝山靈我師一出幾何年聞欲東歸未有緣何日扶藜能過我湖山深處共談禪玉山道中路繞孤村一徑微上連碧嶂下清溪水光山色渾如畫引得行人憶故棲西安道中二首平林環翠如山立野水涵空似鏡開道上人家多美竹欲行未去更徘徊水浸野苗森碧玉風翻早稻卧黃雲有年如許誠希見農父猶言未十分洪崖張老升仙不記年石崖遺迹尚流傳心期默契真如見何必追隨與拍肩過嘉禾呈方懋德昔嘗此地奉周旋倒指于今三十年今日相逢成二老那知又復到尊前和許守松棚插天修幹已鱗皴誰挽青枝架水濵却退炎威涼滿座都緣清蔭布如雲真止堂我有虛堂號真止坐來萬慮清如水君今更以止名堂想見了無塵念起待雪呈子儀二首曉見紛紛滿四山胡為未肯到人間化工若解呈新巧連剪冰花破我顔不須坐客苦言歸看取天花滿院飛已是雪床先到了夜深應與月交輝過上饒有感少日隨親官此州如今老矣復來遊此身縱健那能久何苦奔馳不自休讀劉與權壯士歌滿眼煙塵未息戈禦戎無䇿奈愁何一尊濁酒空庭晚獨自歌君壯士歌置酒與五客餞行因成一絶送盡行人我獨留老夫無計解離憂勸君今夜休辭醉明日江山總是愁留長河堰湖山堂下水聲寒夜半琮琤響珮環夢寐欲歸歸未得却來此處聽潺潺和龔漕二首我老強來分外閫君才端合在中臺語離正欲連宵醉應笑清齋不舉杯人生笑口苦難開故事當修戲馬臺已許為君拚一醉何妨今日且銜杯和劉與仁見寄莫為窮愁賦七歌會須終日飲無何人間佳士由來少世上浮名未足多安仁挹仙亭區區終日困塵勞長恨仙山去路遙豈謂一朝供顧挹坐令逸氣出層霄戊子孟夏二十二日登碧雲亭有感二首去年昨日我離家轉眼俄驚閲歲華春草池塘長入夢不堪兩度見荷花來時荷蓋翠相扶不謂經年尚守株縱使香風來不斷爭如歸去小西湖五月七日晚登碧雲亭有感連嵗芙蕖照眼明今年荷葉又青青老夫去此無他戀秖憶看花水上亭又登碧雲亭感懷三十首晚上危亭暑氣清薰風微動入疏櫺重重草樹髙低緑疊疊峰巒逺近青晚上危亭眼暫明風煙濃淡媚郊坰箇中妙處吟難盡分付人間作畫屏晚上危亭喜作晴亦思郊外一間行無端騎從相遮護不放山翁適野情晚上危亭瞰野塘藕花無數散清香若為荷葉分青緑一半紅粧半淡粧池中之蓮分兩色淺深各半故葉亦分青緑晚上危亭看緑荷風翻荷葉欲藏花使君要見紅粧靣莫放碧雲重疊遮晚上危亭逸興多却尋小艇下煙波酒狂聊作碧筒飲折盡花間幾柄荷晚上危亭側耳聽新蟬噪罷亂蛙鳴老來只是便幽靜頗厭人間強聒聲晚上危亭興未窮仰看星斗已懸空可憐熠耀飛撩亂也欲爭光逈野中晚上危亭一解顔公餘偷得半時間未能投紱尋歸路聊復銜杯對好山晚上危亭指顧間羊牛來下鳥飛還細思物理須知止何用區區秖強顔晚上危亭顧四隅小松環繞幾千株他年黛色侵天去應記栽時是老夫晚上危亭望彼蒼時時飛電迸流光嗟人生世須臾裏未必能如電久長晚上危亭詠式微封章再上未容歸羡他白鷺凌風去却向山前自在飛晚上危亭望逺山望中有水亦回環終然不似吾廬好上下山光水色間晚上危亭覽物華斜陽影裏度歸鴉暮山隔斷鄉關路矯首臨風眼欲花晚上危亭遮鬱蒸風生兩腋覺身輕更籌只是催歸去不到城頭月未生晚上危亭待月生雲頭俄湧一輪明終朝汩沒塵埃裏對此身心覺頓清晚上危亭為少留亭前暝色已供愁更聽畫角聲悲壯愈使愁人厭逺遊晚上危亭力已疲胡為歸計尚遲遲如今若便休官去也勝當初未有時晚上危亭與客同話頭只是説山中老來百念消磨盡只有歸心羡暮鴻晚上危亭望大江天教千古作金湯中流擊楫人何在徒感興亡對夕陽晚上危亭景色饒眼中突兀是凌歊三千粉黛知何許秖有江山鎖寂寥晚上危亭一憑欄青青最愛謝家山謝公陳迹雖磨滅餘韻遺風尚可攀晚上危亭想謫仙孤墳寂寂鎖寒煙髙風直節誰能繼只有詩萹後代傳晚上危亭望石城楚君曽向此間興城池蕪沒人何在只有空山幾箇僧晚上危亭憶孟君龍山一醉見天真堪嗟東道空遺臭爭似尊前落帽人晚上危亭憶令威凌虛山上悟玄機丹成不見升騰迹徒想當年化鶴飛晚上危亭憶隱居髙情逸氣古人無橫山秖有精廬在無復書堂舊藥爐晚上危亭懶舉頭竹椽蘆屋亦堪羞我將一變成雄觀長與邦人作宴遊晚上危亭喜有秋民安物阜本無憂鈴齋坐嘯雖多暇爭似歸田得自由寄龔漕六首自古知心不易逢君心還與我心同縱令自擇交成契更有何人得似公幾年湮塞豫章溝嵗嵗民間有水憂我意若非公善後不應城裏解通舟貢院門前並北湖有田百畝却荒蕪願君種取花千樹付與邦人作畫圖葺得南園過一春無從再見物華新匆匆相别休相憶已有風流賢主人天朝未許投簮去我幸已成全璧歸全璧歸來何所憾暮年只是惜分違聞公新有帥垣除一路逢人盡賀豫瓜代得賢人尚喜豫心歡喜更何如埀虹聞笛三十年前此憑欄醉聽漁笛暮江寒重來雖復聞三㺯老去終無舊日歡和王知府惠瓦硯文房四子舊周旋老去情踈秖自憐不謂陶泓猶見念逺來相顧不相捐得家書喜津病愈老懷鬱鬱苦難舒忽報吾兒病已除便覺身心無箇事萬錢不抵一封書得鄉書聞道交親知我還歡迎競欲越鄉關我於鄉里初無補又復勞人秖汗顔戊子春術者劉五星謂豫夀有八十一感而有作二首縱使誠如日者言此身只合在林泉從今便得休官去止有間居十五年多少同年盡溘然我今獨喜尚安全儻延朝夕誠為幸敢謂猶能十五年周相士謂豫夀至九十三又成一絶年登九九已云多相士猶添十載過萬事都捐無復念老而不死待如何覽洛中名園記有感厯官冉冉踰三紀閲世看看近七旬更覽名園興廢記愈令人憶故園春
